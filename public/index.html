<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8eaf0;font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.5;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0f1117}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px}
.mono{font-family:'IBM Plex Mono',monospace}
input,select,textarea{background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;padding:8px 12px;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color 0.2s}
input:focus,select:focus{border-color:#f5a623}
input::placeholder{color:#565d7a}
select option{background:#1a1d27}
button{font-family:'IBM Plex Sans',sans-serif;cursor:pointer;border:none;transition:all 0.2s}
table{width:100%;border-collapse:collapse}
th{background:#0f1117;color:#8890a8;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:10px 14px;text-align:left;border-bottom:1px solid #2a2d3e;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #1e2133;font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.5s ease infinite}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:#8890a8;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:#e8eaf0}
.tab.active{color:#f5a623;border-bottom-color:#f5a623}
.tab-bar{display:flex;border-bottom:1px solid #2a2d3e;overflow-x:auto}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:stretch;justify-content:center;padding:0}
.modal{background:#1a1d27;border-left:1px solid #2a2d3e;border-right:1px solid #2a2d3e;width:100%;max-width:960px;height:100vh;display:flex;flex-direction:column;margin:0 auto;overflow:hidden;border-radius:0}
.modal-header{padding:14px 20px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#1a1d27;z-index:10}
.modal-body{padding:18px 20px 40px 20px;overflow-y:auto;flex:1;scroll-behavior:smooth}
.card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between}
.form-field{margin-bottom:11px}
.form-label{display:block;font-size:11px;font-weight:600;color:#8890a8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;align-items:start}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px;align-items:start}
.stat-card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;padding:18px 20px;position:relative;overflow:hidden}
.stat-top{position:absolute;top:0;left:0;right:0;height:2px;opacity:.6}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;margin-bottom:2px;background:transparent;color:#8890a8;border:1px solid transparent;font-size:13px;text-align:left;cursor:pointer;transition:all .15s}
.nav-btn:hover{color:#e8eaf0;background:rgba(255,255,255,.03)}
.nav-btn.active{background:rgba(245,166,35,.12);color:#f5a623;border-color:rgba(245,166,35,.2);font-weight:600}
.drop-zone{border:2px dashed #2a2d3e;border-radius:10px;padding:36px;text-align:center;cursor:pointer;transition:border-color .2s}
.drop-zone:hover{border-color:#f5a623}
.alert-info{padding:10px 14px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:6px;font-size:12px;color:#ffd280}
.alert-success{padding:10px 14px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:6px;font-size:12px;color:#27ae60}
.alert-danger{padding:10px 14px;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:6px;font-size:12px;color:#e74c3c}
.progress-bar{height:6px;background:#0f1117;border-radius:3px;overflow:hidden;min-width:60px}
.progress-fill{height:100%;border-radius:3px;background:#f5a623;transition:width .3s}
</style>
</head>

// ── API CONFIG ──
const API_URL = window.location.hostname === "localhost"
  ? "http://localhost:3000"
  : window.location.origin;

const api = {
  get: async (path) => {
    try {
      const r = await fetch(`${API_URL}${path}`);
      if (!r.ok) throw new Error(await r.text());
      return await r.json();
    } catch(e) {
      console.error("API GET error:", path, e);
      return null;
    }
  },
  post: async (path, data) => {
    try {
      const r = await fetch(`${API_URL}${path}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error(await r.text());
      return await r.json();
    } catch(e) {
      console.error("API POST error:", path, e);
      return null;
    }
  },
  put: async (path, data) => {
    try {
      const r = await fetch(`${API_URL}${path}`, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error(await r.text());
      return await r.json();
    } catch(e) {
      console.error("API PUT error:", path, e);
      return null;
    }
  }
};

// HELPERS
const Badge = ({label, color}) => {
  const colors = {
    green:{bg:"rgba(39,174,96,.15)",text:"#27ae60",border:"rgba(39,174,96,.3)"},
    red:{bg:"rgba(231,76,60,.15)",text:"#e74c3c",border:"rgba(231,76,60,.3)"},
    orange:{bg:"rgba(245,166,35,.15)",text:"#f5a623",border:"rgba(245,166,35,.3)"},
    blue:{bg:"rgba(52,152,219,.15)",text:"#3498db",border:"rgba(52,152,219,.3)"},
    purple:{bg:"rgba(155,89,182,.15)",text:"#9b59b6",border:"rgba(155,89,182,.3)"},
    gray:{bg:"rgba(136,144,168,.15)",text:"#8890a8",border:"rgba(136,144,168,.3)"},
  };
  const c = colors[color]||colors.gray;
  return <span className="badge" style={{background:c.bg,color:c.text,border:`1px solid ${c.border}`}}>{label}</span>;
};

const Btn = ({children,onClick,variant="primary",size="md",disabled=false,style={}}) => {
  const v = {
    primary:{background:"#f5a623",color:"#000",fontWeight:600},
    secondary:{background:"transparent",color:"#e8eaf0",border:"1px solid #2a2d3e"},
    ghost:{background:"transparent",color:"#8890a8"},
    danger:{background:"rgba(231,76,60,.15)",color:"#e74c3c",border:"1px solid rgba(231,76,60,.3)"},
    success:{background:"rgba(39,174,96,.15)",color:"#27ae60",border:"1px solid rgba(39,174,96,.3)"},
  };
  const s = {sm:{padding:"5px 12px",fontSize:12,borderRadius:5},md:{padding:"8px 16px",fontSize:13,borderRadius:6},lg:{padding:"11px 22px",fontSize:14,borderRadius:8}};
  return <button onClick={onClick} disabled={disabled} style={{...v[variant],...s[size],opacity:disabled?.4:1,display:"inline-flex",alignItems:"center",gap:6,fontWeight:500,...style}}>{children}</button>;
};

const Modal = ({title,onClose,children,width=600}) => (

// ── SELECTOR CON FLECHAS ──
const SelectorFlechas = ({opciones, value, onChange, label}) => {
  const idx = opciones.findIndex(o => (o.value||o) === value);
  const actual = opciones[idx] || opciones[0];
  const prev = () => onChange((opciones[Math.max(0, idx-1)].value || opciones[Math.max(0, idx-1)]));
  const next = () => onChange((opciones[Math.min(opciones.length-1, idx+1)].value || opciones[Math.min(opciones.length-1, idx+1)]));
  return (
    <div style={{display:"flex",alignItems:"center",gap:0,background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,overflow:"hidden"}}>
      <button onClick={prev} disabled={idx===0} style={{
        padding:"8px 12px",background:"transparent",border:"none",
        color:idx===0?"#2a2d3e":"#8890a8",cursor:idx===0?"default":"pointer",
        fontSize:14,borderRight:"1px solid #2a2d3e"
      }}>‹</button>
      <span style={{flex:1,textAlign:"center",padding:"8px 12px",fontSize:13,color:"#e8eaf0",fontWeight:500}}>
        {actual.label || actual}
      </span>
      <button onClick={next} disabled={idx===opciones.length-1} style={{
        padding:"8px 12px",background:"transparent",border:"none",
        color:idx===opciones.length-1?"#2a2d3e":"#8890a8",cursor:idx===opciones.length-1?"default":"pointer",
        fontSize:14,borderLeft:"1px solid #2a2d3e"
      }}>›</button>
    </div>
  );
};

// ── DASHBOARD ──
const Dashboard = ({modulo}) => {

  const [movsReal,setMovsReal]=useState(null);
  const movs = movsReal !== null ? movsReal : mockMovimientos.filter(m=>m.modalidad===modulo);

  useEffect(()=>{
    api.get(`/api/movimientos?modalidad=${modulo}`)

      .catch(()=>setMovsReal(null));
  },[modulo]);

  const aLiquidar = movs.filter(m=>m.estado==="DESCARGADO"&&m.estado_liq!=="LIQUIDADO").length;
  return (
    <div className="fade-in">
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Dashboard — {modulo==="FORMAL"?"Operaciones Formales":"Operaciones Informales"}</h2>
        <p style={{color:"#8890a8",fontSize:13}}>Resumen operativo</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
        <StatCard label="Contratos Activos" value={contratos.filter(c=>c.estado!=="CANCELADO").length} sub={`${contratos.filter(c=>c.tipo==="COMPRA").length} compra · ${contratos.filter(c=>c.tipo==="VENTA").length} venta`}/>
        <StatCard label="En Tránsito" value={enTransito} sub="camiones en ruta" color="#3498db"/>
        <StatCard label="A Liquidar" value={aLiquidar} sub="movimientos descargados" color="#27ae60"/>
        <StatCard label="A Fijar" value={contratos.filter(c=>c.tipo_precio==="A_FIJAR").length} sub="contratos sin precio" color="#9b59b6"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div className="card">
          <div className="card-header"><span style={{fontWeight:600,fontSize:14}}>Últimos Movimientos</span></div>
          <table><thead><tr><th>N° Mov</th>{modulo==="FORMAL"&&<th>CTG</th>}<th>Especie</th><th>Kg Neto</th><th>Estado</th></tr></thead>
          <tbody>{movs.slice(0,5).map(m=>(
            <tr key={m.id}>
              <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
              {modulo==="FORMAL"&&<td><span className="mono" style={{fontSize:11,color:"#8890a8"}}>{m.nro_ctg||"—"}</span></td>}
              <td>{m.especie}</td>
              <td><span className="mono">{m.peso_neto_llegada?m.peso_neto_llegada.toLocaleString():m.peso_neto_salida.toLocaleString()}</span></td>
              <td><Badge label={m.estado} color={m.estado==="EN_TRANSITO"?"orange":m.estado==="DESCARGADO"?"blue":"green"}/></td>
            </tr>
          ))}</tbody></table>
        </div>
        <div className="card">
          <div className="card-header"><span style={{fontWeight:600,fontSize:14}}>Contratos Abiertos</span></div>
          <table><thead><tr><th>Número</th><th>Tipo</th><th>Especie</th><th>Progreso</th></tr></thead>

        </div>

// ── CONTRAPARTES ──
const Contrapartes = ({modulo}) => {
  const [showForm,setShowForm]=useState(false);
  const [search,setSearch]=useState("");
  const [lista,setLista]=useState([]);
  const [loading,setLoading]=useState(true);
  const [guardando,setGuardando]=useState(false);
  const [form,setForm]=useState({cuit:"",razon_social:"",es_productor:false,es_comprador:false,es_transportista:false,es_corredor:false,condicion_iva:"RI",provincia:"",localidad:"",telefono:"",email:""});

  const cargarContrapartes = async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if (modulo==="FORMAL") params.append("modalidad","FORMAL");
      if (search) params.append("search",search);
      const url = `/api/contrapartes?${params.toString()}`;
      const data = await api.get(url);
      setLista(Array.isArray(data) ? data : []);
    } catch(e) {
      console.error("Error:", e);
      setLista([]);
    } finally {
      setLoading(false);
    }
  };

  useEffect(()=>{ cargarContrapartes(); }, [modulo, search]);
  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>{modulo==="FORMAL"?"Contrapartes Formales":"Contrapartes Informales"}</h2>
          <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>{modulo==="FORMAL"?"Con CUIT registrado en AFIP":"Identificación interna del sistema"}</p>
        </div>
        <Btn onClick={()=>setShowForm(true)}>+ Nueva Contraparte</Btn>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{padding:"12px 16px"}}>
          <input placeholder="Buscar por nombre o CUIT..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:360}}/>
        </div>
      </div>
      <div className="card">
        <table><thead><tr>
          <th>Código</th>{modulo==="FORMAL"&&<th>CUIT</th>}<th>Razón Social</th><th>Rubros</th><th>Localidad</th><th>Provincia</th><th>Estado</th><th></th>
        </tr></thead>
        <tbody>
          {loading?(
            <tr><td colSpan={8} style={{textAlign:"center",padding:30,color:"#8890a8"}}>
              <span className="pulse">Cargando...</span>
            </td></tr>
          ):lista.length===0?(
            <tr><td colSpan={8} style={{textAlign:"center",padding:30,color:"#565d7a"}}>
              No hay contrapartes registradas. Usá "+ Nueva Contraparte" para agregar.
            </td></tr>
          ):lista.map(c=>(
            <tr key={c.id}>
              <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{c.codigo_interno}</span></td>
              {modulo==="FORMAL"&&<td><span className="mono" style={{fontSize:12}}>{c.cuit||"—"}</span></td>}
              <td style={{fontWeight:500}}>{c.razon_social}</td>
              <td>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {(c.tipo_contraparte==="PRODUCTOR"||c.tipo_contraparte==="AMBOS")&&<Badge label="Productor" color="orange"/>}
                  {(c.tipo_contraparte==="COMPRADOR"||c.tipo_contraparte==="AMBOS")&&<Badge label="Comprador" color="blue"/>}
                  {c.tipo_contraparte==="TRANSPORTISTA"&&<Badge label="Transportista" color="green"/>}
                  {c.tipo_contraparte==="CORREDOR"&&<Badge label="Corredor" color="purple"/>}
                </div>
              </td>
              <td style={{color:"#8890a8",fontSize:12}}>{c.localidad||"—"}</td>
              <td style={{color:"#8890a8",fontSize:12}}>{c.provincia||"—"}</td>
              <td><Badge label={c.activo?"Activo":"Inactivo"} color={c.activo?"green":"gray"}/></td>
              <td style={{display:"flex",gap:6}}>
                <Btn variant="ghost" size="sm" onClick={()=>{
                  setForm({
                    cuit:c.cuit||"",
                    razon_social:c.razon_social||"",
                    es_productor:c.tipo_contraparte==="PRODUCTOR"||c.tipo_contraparte==="AMBOS",
                    es_comprador:c.tipo_contraparte==="COMPRADOR"||c.tipo_contraparte==="AMBOS",
                    es_transportista:c.tipo_contraparte==="TRANSPORTISTA",
                    es_corredor:c.tipo_contraparte==="CORREDOR",
                    condicion_iva:c.condicion_iva||"RI",
                    provincia:c.provincia||"",
                    localidad:c.localidad||"",
                    telefono:c.telefono||"",
                    email:c.email||"",
                    _id:c.id,
                    _editando:true,
                  });
                  setShowForm(true);
                }}>Editar</Btn>
                <Btn variant="danger" size="sm" onClick={async()=>{
                  if(!confirm(`¿Eliminar ${c.razon_social}?`)) return;
                  try {
                    await fetch(`/api/contrapartes/${c.id}`, {method:"DELETE"});
                    cargarContrapartes();
                  } catch(e) {
                    alert("Error al eliminar: "+e.message);
                  }
                }}>✕</Btn>
              </td>
            </tr>
          ))
        }</tbody></table>
      </div>
      {showForm&&(
        <Modal title={form._editando?`Editar Contraparte`:`Nueva Contraparte ${modulo==="FORMAL"?"Formal":"Informal"}`} onClose={()=>setShowForm(false)} width={860}>
          <div className="form-grid-2">
            {modulo==="FORMAL"&&<FF label="CUIT" required><input placeholder="20-12345678-9" value={form.cuit} onChange={e=>setForm({...form,cuit:e.target.value})}/></FF>}
            <FF label="Razón Social / Nombre" required span={modulo==="INFORMAL"?2:1}><input placeholder="Nombre completo o razón social" value={form.razon_social} onChange={e=>setForm({...form,razon_social:e.target.value})}/></FF>
            <div className="form-field" style={{gridColumn:"span 2"}}>
              <label className="form-label">Rubros <span style={{color:"#f5a623",marginLeft:3}}>*</span></label>
              <div style={{display:"flex",gap:16,padding:"10px 14px",background:"#0f1117",borderRadius:6,border:"1px solid #2a2d3e",flexWrap:"wrap"}}>
                {[
                  {key:"es_productor", label:"Productor / Vendedor", desc:"Nos vende mercadería", color:"#f5a623"},
                  {key:"es_comprador", label:"Comprador", desc:"Le vendemos mercadería", color:"#3498db"},
                  {key:"es_transportista", label:"Transportista", desc:"Hace fletes", color:"#27ae60"},
                  {key:"es_corredor", label:"Corredor", desc:"Interviene en operaciones", color:"#9b59b6"},
                ].map(r=>(
                  <label key={r.key} style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer",padding:"8px 12px",borderRadius:6,border:`1px solid ${form[r.key]?r.color+"44":"#2a2d3e"}`,background:form[r.key]?r.color+"11":"transparent",flex:1,minWidth:150}}>
                    <input
                      type="checkbox"
                      checked={!!form[r.key]}
                      onChange={e=>setForm({...form,[r.key]:e.target.checked})}
                      style={{marginTop:2,accentColor:r.color,width:16,height:16,flexShrink:0}}
                    />
                    <div>
                      <div style={{fontWeight:600,fontSize:13,color:form[r.key]?r.color:"#e8eaf0"}}>{r.label}</div>
                      <div style={{fontSize:11,color:"#8890a8",marginTop:2}}>{r.desc}</div>
                    </div>
                  </label>
                ))}
              </div>
            </div>
            {modulo==="FORMAL"&&<FF label="Condición IVA"><select value={form.condicion_iva} onChange={e=>setForm({...form,condicion_iva:e.target.value})}><option value="RI">Responsable Inscripto</option><option value="MONO">Monotributo</option><option value="EXENTO">Exento</option></select></FF>}
            <FF label="Provincia"><select value={form.provincia} onChange={e=>setForm({...form,provincia:e.target.value})}><option value="">Seleccionar...</option>{PROVINCIAS.map(p=><option key={p} value={p}>{p}</option>)}</select></FF>
            <FF label="Localidad"><input placeholder="Ciudad / Localidad" value={form.localidad} onChange={e=>setForm({...form,localidad:e.target.value})}/></FF>
            <FF label="Teléfono"><input placeholder="Teléfono" value={form.telefono} onChange={e=>setForm({...form,telefono:e.target.value})}/></FF>
            <FF label="Email"><input placeholder="correo@ejemplo.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></FF>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
            <Btn variant="secondary" onClick={()=>setShowForm(false)}>Cancelar</Btn>
            <Btn disabled={guardando} onClick={async()=>{
              if(!form.razon_social){alert("El nombre es obligatorio");return;}
              if(!form.es_productor&&!form.es_comprador&&!form.es_transportista&&!form.es_corredor){
                alert("Seleccioná al menos un rubro");return;
              }
              setGuardando(true);
              try {
                const rubros = [];
                if(form.es_productor) rubros.push("PRODUCTOR");
                if(form.es_comprador) rubros.push("COMPRADOR");
                if(form.es_transportista) rubros.push("TRANSPORTISTA");
                if(form.es_corredor) rubros.push("CORREDOR");
                const tipo = rubros.length>1?"AMBOS":rubros[0];
                const datos = {
                  cuit: form.cuit||null,
                  razon_social: form.razon_social,
                  tipo_contraparte: tipo,
                  canal_operacion: modulo,
                  condicion_iva: form.condicion_iva||null,
                  localidad: form.localidad||null,
                  provincia: form.provincia||null,
                  telefono: form.telefono||null,
                  email: form.email||null,
                };
                if(form._editando && form._id) {
                  await api.put(`/api/contrapartes/${form._id}`, datos);
                  alert("✓ Contraparte actualizada");
                } else {
                  await api.post("/api/contrapartes", datos);
                  alert("✓ Contraparte guardada");
                }
                setShowForm(false);
                setForm({cuit:"",razon_social:"",es_productor:false,es_comprador:false,es_transportista:false,es_corredor:false,condicion_iva:"RI",provincia:"",localidad:"",telefono:"",email:"",_id:null,_editando:false});
                cargarContrapartes();
              } catch(e) {
                alert("Error: "+e.message);
              } finally {
                setGuardando(false);
              }
            }}>{guardando?"Guardando...":(form._editando?"Actualizar":"Guardar")}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

const Contratos = ({modulo}) => {
  const [tab,setTab]=useState("COMPRA");
  const [showForm,setShowForm]=useState(false);
  const [lista,setLista]=useState([]);
  const [contrapartes,setContrapartes]=useState([]);
  const [especies,setEspecies]=useState(ESPECIES.map((n,i)=>({id:i+1,nombre:n})));
  const [campanas,setCampanas]=useState(CAMPANAS.map((d,i)=>({id:i+1,descripcion:d})));
  const [guardando,setGuardando]=useState(false);
  const [form,setForm]=useState({tipo:"COMPRA",especie:"Soja",id_especie:1,campana:"2024/2025",id_campana:2,id_contraparte:"",tipo_precio:"PRECIO_HECHO",moneda:"PESOS",precio:"",diferencial:"",tipo_diferencial:"ARS",referencia:"MATBA_ROFEX",toneladas:"",tipo_entrega:"A_RETIRAR",tipo_liq:"INCISO_A",forma_pago:"TRANSFERENCIA",plazo:"0",precio_venta_est:"",flete_est:"",destino_est:""});

  useEffect(()=>{
    cargarContratos();
    cargarContrapartes();
    cargarEspecies();
    cargarCampanas();
  },[modulo,tab]);

  const cargarContratos = async () => {
    try {
      const data = await api.get(`/api/contratos?modalidad=${modulo}&tipo=${tab}`);
      setLista(data);
    } catch(e) {
      setLista(mockContratos.filter(c=>c.modalidad===modulo&&c.tipo===tab));
    }
  };

  const cargarContrapartes = async () => {
    try {
      const data = await api.get(`/api/contrapartes?modalidad=${modulo}`);
      setContrapartes(data);
    } catch(e) {
      setContrapartes(mockContrapartes);
    }
  };

  const cargarEspecies = async () => {
    try {
      const data = await api.get("/api/especies");
      if(data.length>0) setEspecies(data);
    } catch(e) {}
  };

  const cargarCampanas = async () => {
    try {
      const data = await api.get("/api/campanas");
      if(data.length>0) setCampanas(data);
    } catch(e) {}
  };
  const estadoColor = e=>({EN_CURSO:"green",CONFIRMADO:"blue",CUMPLIDO:"gray",CANCELADO:"red",BORRADOR:"gray"}[e]||"gray");
  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Contratos {modulo==="FORMAL"?"Formales":"Informales"}</h2>
        <Btn onClick={()=>setShowForm(true)}>+ Nuevo Contrato</Btn>
      </div>
      <div className="tab-bar" style={{marginBottom:16}}>
        {["COMPRA","VENTA","CANJE"].map(t=><button key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)}>{t==="COMPRA"?"Compras":t==="VENTA"?"Ventas":"Canjes"}</button>)}
      </div>
      <div className="card">
        <table><thead><tr>
          <th>Número</th><th>Fecha</th><th>Contraparte</th><th>Especie</th><th>Campaña</th><th>Tn Pact.</th><th>Cumplimiento</th><th>Precio</th>{modulo==="FORMAL"&&<th>Inc.</th>}<th>Estado</th><th></th>
        </tr></thead>
        <tbody>{lista.map(c=>(
          <tr key={c.id}>
            <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{c.numero}</span></td>
            <td style={{color:"#8890a8",fontSize:12}}>{c.fecha}</td>
            <td style={{fontWeight:500,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.contraparte}</td>
            <td>{c.especie}</td>
            <td><span className="mono" style={{fontSize:11}}>{c.campana}</span></td>
            <td><span className="mono">{c.toneladas} tn</span></td>
            <td>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div className="progress-bar" style={{width:70}}><div className="progress-fill" style={{width:`${Math.round((c.asignadas/c.toneladas)*100)}%`}}/></div>
                <span style={{fontSize:11,color:"#8890a8"}}>{Math.round((c.asignadas/c.toneladas)*100)}%</span>
              </div>
            </td>
            <td>{c.tipo_precio==="A_FIJAR"?<Badge label="A FIJAR" color="purple"/>:<span className="mono" style={{fontSize:12}}>${c.precio?.toLocaleString()}</span>}</td>
            {modulo==="FORMAL"&&<td>{c.tipo_liq?<Badge label={c.tipo_liq==="INCISO_A"?"Inc.A":"Inc.B"} color={c.tipo_liq==="INCISO_A"?"blue":"purple"}/>:"—"}</td>}
            <td><Badge label={c.estado} color={estadoColor(c.estado)}/></td>
            <td><Btn variant="ghost" size="sm">Ver</Btn></td>

                    <input type="checkbox" checked={!!form.aplica_cpe} onChange={e=>setForm({...form,aplica_cpe:e.target.checked,costo_cpe:e.target.checked?form.costo_cpe:""})}
                      style={{accentColor:"#f5a623",width:16,height:16}}/>
                    <span style={{fontSize:13,color:"#e8eaf0"}}>Corresponde</span>
                  </label>
                  {form.aplica_cpe&&(
                    <div style={{display:"flex",alignItems:"center",gap:4,flex:1}}>
                      <input type="number" step="0.01" placeholder="0.00" value={form.costo_cpe||""}
                        onChange={e=>setForm({...form,costo_cpe:e.target.value})}
                        style={{flex:1}}/>
                      <span style={{color:"#8890a8",fontSize:13}}>%</span>
                    </div>
                  )}
                </div>
              </div>
              <FF label="Costo Financiero (%)">
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <input type="number" step="0.01" placeholder="0.00" value={form.costo_financiero||""}
                    onChange={e=>setForm({...form,costo_financiero:e.target.value})}/>
                  <span style={{color:"#8890a8",fontSize:13,flexShrink:0}}>%</span>
                </div>
              </FF>
            </div>
            {form.precio&&form.precio_venta_est&&(()=>{
              const compra = parseFloat(form.precio)||0;
              const venta = parseFloat(form.precio_venta_est)||0;
              const flete = parseFloat(form.flete_est)||0;
              const pctCpe = (form.aplica_cpe && form.costo_cpe) ? parseFloat(form.costo_cpe)||0 : 0;
              const pctFin = parseFloat(form.costo_financiero)||0;
              const costoCpe = venta * pctCpe / 100;
              const costoFin = venta * pctFin / 100;
              const margen = venta - compra - flete - costoCpe - costoFin;
              return (
                <div style={{padding:"12px 14px",background:"#0a0c12",border:"1px solid #2a2d3e",borderRadius:6,marginTop:8}}>
                  <div style={{fontSize:11,color:"#8890a8",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>Cálculo del Margen</div>
                  {[
                    ["Precio Venta", venta, "#27ae60", "+"],
                    ["Precio Compra", compra, "#e74c3c", "-"],
                    flete>0 && ["Flete", flete, "#e74c3c", "-"],
                    pctCpe>0 && [`Carta de Porte (${pctCpe}%)`, costoCpe, "#e74c3c", "-"],
                    pctFin>0 && [`Costo Financiero (${pctFin}%)`, costoFin, "#e74c3c", "-"],
                  ].filter(Boolean).map(([label, valor, color, signo])=>(
                    <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #1e2133"}}>
                      <span style={{fontSize:13,color:"#8890a8"}}>{signo} {label}</span>
                      <span className="mono" style={{fontSize:13,color}}>${valor.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
                    </div>
                  ))}
                  <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,marginTop:4}}>
                    <span style={{fontWeight:700,fontSize:14,color:margen>=0?"#27ae60":"#e74c3c"}}>= MARGEN / tn</span>
                    <span className="mono" style={{fontWeight:700,fontSize:16,color:margen>=0?"#27ae60":"#e74c3c"}}>
                      ${margen.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}
                    </span>
                  </div>
                </div>
              );
            })()}
          </div>
          {/* COSTOS DE SERVICIOS */}
          <div style={{marginTop:8,padding:"14px 16px",background:"#0f1117",borderRadius:8,border:"1px solid #2a2d3e"}}>
            <div style={{fontSize:11,color:"#f5a623",marginBottom:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>📦 Costos Pactados con el Productor (lo que le cobramos)</div>
            <div className="form-grid-3">

              <FF label="Fumigación ($ fijo)"><input type="number" placeholder="0.00"/></FF>
              <FF label="Humedad máx. seco (%)"><input type="number" step="0.1" placeholder="13.5"/></FF>
              <FF label="Otros — Descripción"><input placeholder="Descripción del servicio"/></FF>
            </div>
          </div>
          <div style={{marginTop:8,padding:"14px 16px",background:"#0f1117",borderRadius:8,border:"1px solid #2a2d3e"}}>
            <div style={{fontSize:11,color:"#3498db",marginBottom:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>🏭 Costos que nos Cobran en Destino</div>
            <div className="form-grid-3">
              <FF label="Secada ($ por punto)"><input type="number" placeholder="0.00"/></FF>
              <FF label="Zarandeo ($ por tn)"><input type="number" placeholder="0.00"/></FF>
              <FF label="Paritaria ($ por tn)"><input type="number" placeholder="0.00"/></FF>
              <FF label="Fumigación ($ fijo)"><input type="number" placeholder="0.00"/></FF>
              <FF label="Otros — Descripción"><input placeholder="Descripción del servicio"/></FF>
              <FF label="Otros — Valor"><input type="number" placeholder="0.00"/></FF>
            </div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
            <Btn variant="secondary" onClick={()=>setShowForm(false)}>Cancelar</Btn>
            <Btn disabled={guardando} onClick={async()=>{
              if(!form.id_contraparte){alert("Seleccioná una contraparte");return;}
              if(!form.toneladas){alert("Las toneladas son obligatorias");return;}
              setGuardando(true);
              try {
                await api.post("/api/contratos",{
                  tipo_contrato: form.tipo,
                  modalidad: modulo,
                  tipo_liquidacion: modulo==="FORMAL"?form.tipo_liq:null,
                  fecha_contrato: new Date().toISOString().split("T")[0],
                  id_contraparte: parseInt(form.id_contraparte),
                  id_especie: form.id_especie,
                  id_campana: form.id_campana,
                  cantidad_toneladas_pactadas: parseFloat(form.toneladas),
                  tipo_precio: form.tipo_precio,
                  moneda: form.moneda,
                  precio_pactado: form.precio?parseFloat(form.precio):null,
                  referencia_fijacion: form.tipo_precio==="A_FIJAR"?form.referencia:null,
                  diferencial_fijacion: form.diferencial?parseFloat(form.diferencial):null,
                  tipo_diferencial: form.tipo_diferencial||null,
                  tipo_entrega: form.tipo_entrega,
                  forma_pago: form.forma_pago,
                  plazo_pago_dias: parseInt(form.plazo)||0,
                  precio_venta_estimado: form.precio_venta_est?parseFloat(form.precio_venta_est):null,
                  destino_venta_estimado: form.destino_est||null,
                  flete_estimado: form.flete_est?parseFloat(form.flete_est):null,
                });
                alert("✓ Contrato guardado correctamente");
                setShowForm(false);
                cargarContratos();
              } catch(e) {
                alert("Error al guardar contrato: "+e.message);
              } finally {
                setGuardando(false);
              }
            }}>{guardando?"Guardando...":"Guardar Contrato"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

};

        <StatCard label="Maíz — Total" value={`${totalMaiz} tn`} sub="todas las posiciones" color="#f1c40f"/>
        <StatCard label="Trigo — Total" value={`${totalTrigo} tn`} sub="todas las posiciones" color="#e74c3c"/>

      {/* POR PRODUCTOR */}
      {Object.values(porProductor).map(prod => {
        const tnTotal = prod.items.reduce((a,s)=>a+s.tn_total,0);
        const tnConContrato = prod.items.reduce((a,s)=>a+s.con_contrato.reduce((b,c)=>b+c.tn,0),0);

        const key = prod.productor;

            >

                <span style={{color:"#565d7a",fontSize:16}}>{isOpen?"▼":"▶"}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{prod.productor}</div>
                  <div style={{fontSize:12,color:"#8890a8",marginTop:2}}>{prod.cuit||"Informal"}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:24,alignItems:"center"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#8890a8",textTransform:"uppercase",letterSpacing:".06em"}}>Total</div>
                  <div className="mono" style={{fontWeight:700,fontSize:18,color:"#e8eaf0"}}>{tnTotal.toFixed(3)} tn</div>

                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#8890a8",textTransform:"uppercase",letterSpacing:".06em"}}>Con Contrato</div>

                <div style={{textAlign:"center"}}>

                </div>
              </div>
            </div>

            {/* DETALLE EXPANDIDO */}
            {isOpen && (
              <div style={{padding:"0 0 4px 0"}}>
                {prod.items.map((s,idx) => (
                  <div key={idx}>
                    {/* FILA ESPECIE */}

                    </div>

                    {/* CON CONTRATO */}
                    {s.con_contrato.length > 0 && s.con_contrato.map((cc,ci) => (
                      <div key={ci} style={{padding:"8px 18px 8px 40px",borderBottom:"1px solid #1a1d27",display:"flex",alignItems:"center",gap:12}}>

                          }
                        </span>
                        <Badge label={cc.estado} color={cc.estado==="EN_CURSO"?"green":"blue"} />
                      </div>
                    ))}

                    {/* SIN CONTRATO */}
                    {s.sin_contrato > 0 && (
                      <div style={{padding:"8px 18px 8px 40px",borderBottom:"1px solid #1a1d27",display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:"#9b59b6",flexShrink:0}}/>
                        <span style={{fontSize:12,color:"#9b59b6",fontWeight:600,minWidth:80}}>Sin contrato</span>
                        <span className="mono" style={{fontSize:12}}>{s.sin_contrato.toFixed(3)} tn</span>
                        <Badge label="POSICIÓN ABIERTA" color="purple"/>
                        <Badge label="A FIJAR" color="purple"/>

      })}

  );

// ── REPORTE FLETES ──
const ReporteFletes = ({modulo}) => {
  const [seleccionados, setSeleccionados] = useState([]);
  const [tarifaMasiva, setTarifaMasiva] = useState("");
  const [showPreliq, setShowPreliq] = useState(false);
  const [orden, setOrden] = useState({col:"numero", dir:"asc"});
  const [filtros, setFiltros] = useState({
    numero:"", especie:"", productor:"", comprador:"",
    origen:"", destino:"", transportista:"", chofer:"",
    patente_chasis:"", tarifa_real:"", calidad:"", estado_liq:""
  });

  const setFiltro = (k,v) => setFiltros(prev=>({...prev,[k]:v}));
  const limpiarFiltros = () => setFiltros({numero:"",especie:"",productor:"",comprador:"",origen:"",destino:"",transportista:"",chofer:"",patente_chasis:"",tarifa_real:"",calidad:"",estado_liq:""});
  const toggleOrden = (col) => setOrden(prev=>({col, dir: prev.col===col && prev.dir==="asc"?"desc":"asc"}));
  const iconOrden = (col) => orden.col===col?(orden.dir==="asc"?"↑":"↓"):"↕";

  const todosMovs = mockMovimientos.filter(m=>m.modalidad===modulo);

  const movsFiltrados = todosMovs
    .filter(m=>!filtros.numero||m.numero?.toLowerCase().includes(filtros.numero.toLowerCase()))
    .filter(m=>!filtros.especie||m.especie===filtros.especie)
    .filter(m=>!filtros.productor||m.productor===filtros.productor)
    .filter(m=>!filtros.origen||m.origen?.toLowerCase().includes(filtros.origen.toLowerCase()))
    .filter(m=>!filtros.destino||m.destino?.toLowerCase().includes(filtros.destino.toLowerCase()))
    .filter(m=>!filtros.transportista||m.transportista===filtros.transportista)
    .filter(m=>!filtros.chofer||m.chofer===filtros.chofer)
    .filter(m=>!filtros.patente_chasis||m.patente_chasis===filtros.patente_chasis)
    .filter(m=>!filtros.tarifa_real||String(m.tarifa_real)===filtros.tarifa_real)
    .filter(m=>!filtros.calidad||(filtros.calidad==="OK"?m.factor!==null:m.factor===null))
    .filter(m=>!filtros.estado_liq||m.estado_liq===filtros.estado_liq)
    .sort((a,b)=>{
      let va=a[orden.col]??"", vb=b[orden.col]??"";
      if(typeof va==="string") va=va.toLowerCase();
      if(typeof vb==="string") vb=vb.toLowerCase();
      return va<vb?(orden.dir==="asc"?-1:1):va>vb?(orden.dir==="asc"?1:-1):0;
    });

  const movs = movsFiltrados;
  const hayFiltros = Object.values(filtros).some(v=>v!=="");

  const toggleSelect = (id) => {
    setSeleccionados(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  };
  const toggleAll = () => {
    setSeleccionados(seleccionados.length === movs.length ? [] : movs.map(m=>m.id));
  };

  const puedePreLiq = (m) => m.factor !== null && m.kg_liquidables !== null;
  const todosConCalidad = seleccionados.every(id => {
    const m = movs.find(x=>x.id===id);
    return m && puedePreLiq(m);
  });

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>Reporte de Fletes</h2>
          <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>Modificación masiva de tarifas y preliquidación</p>
        </div>
      </div>

      {/* ACCIONES MASIVAS */}
      {seleccionados.length > 0 && (
        <div style={{padding:"14px 18px",background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.25)",borderRadius:8,marginBottom:16,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <span style={{color:"#f5a623",fontWeight:600,fontSize:13}}>{seleccionados.length} movimiento(s) seleccionado(s)</span>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="number" placeholder="Nueva tarifa $" value={tarifaMasiva} onChange={e=>setTarifaMasiva(e.target.value)}
                style={{width:150,padding:"6px 10px",fontSize:13}}/>
              <Btn variant="secondary" size="sm" onClick={()=>tarifaMasiva&&alert(`✓ Tarifa $${tarifaMasiva} aplicada a ${seleccionados.length} movimiento(s)`)}>
                Aplicar Tarifa
              </Btn>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <select style={{width:220,padding:"6px 8px",fontSize:13,background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,color:"#e8eaf0"}}>
                <option value="">Cambiar transportista...</option>
                {mockTransportistas.map(t=>(
                  <option key={t.id} value={t.razon_social}>
                    {t.razon_social} {t.cuit?"— "+t.cuit:"(Informal)"}
                  </option>
                ))}
              </select>
              <Btn variant="secondary" size="sm" onClick={()=>alert(`✓ Transportista actualizado en ${seleccionados.length} movimiento(s)`)}>
                Cambiar Transportista
              </Btn>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input placeholder="Nuevo chofer..." style={{width:180,padding:"6px 10px",fontSize:13}}/>
              <Btn variant="secondary" size="sm" onClick={()=>alert(`✓ Chofer actualizado en ${seleccionados.length} movimiento(s)`)}>
                Cambiar Chofer
              </Btn>
            </div>
          </div>
          <Btn
            variant={todosConCalidad?"success":"secondary"}
            size="sm"
            disabled={!todosConCalidad}
            onClick={()=>{
              if(!todosConCalidad){alert("⚠ Hay movimientos sin calidad cargada. Cargá las calidades primero.");return;}
              setShowPreliq(true);
            }}
          >
            {todosConCalidad ? "✓ Preliquidar Fletes" : "⚠ Faltan Calidades"}
          </Btn>
        </div>
      )}

      {/* INFO RESULTADOS */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:12,color:"#8890a8"}}>
          Mostrando <strong style={{color:"#e8eaf0"}}>{movsFiltrados.length}</strong> de {todosMovs.length} movimiento(s)
          {seleccionados.length>0&&<span style={{color:"#f5a623",marginLeft:8}}>· {seleccionados.length} seleccionado(s)</span>}
        </div>
        {hayFiltros&&<Btn variant="danger" size="sm" onClick={limpiarFiltros}>✕ Limpiar filtros</Btn>}
      </div>

      <div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead>
            <tr style={{borderBottom:"none"}}>
              <th rowSpan={2} style={{verticalAlign:"middle"}}><input type="checkbox" onChange={toggleAll} checked={seleccionados.length===movs.length&&movs.length>0}/></th>
              <th onClick={()=>toggleOrden("numero")} style={{cursor:"pointer",userSelect:"none"}}>N° Mov {iconOrden("numero")}</th>
              <th>CTG</th>
              <th onClick={()=>toggleOrden("productor")} style={{cursor:"pointer",userSelect:"none"}}>Productor {iconOrden("productor")}</th>
              <th onClick={()=>toggleOrden("destino")} style={{cursor:"pointer",userSelect:"none"}}>Destino {iconOrden("destino")}</th>
              <th onClick={()=>toggleOrden("origen")} style={{cursor:"pointer",userSelect:"none"}}>Procedencia {iconOrden("origen")}</th>
              <th onClick={()=>toggleOrden("peso_neto_salida")} style={{cursor:"pointer",userSelect:"none"}}>Kg Carga {iconOrden("peso_neto_salida")}</th>
              <th onClick={()=>toggleOrden("peso_neto_llegada")} style={{cursor:"pointer",userSelect:"none"}}>Kg Desc. {iconOrden("peso_neto_llegada")}</th>
              <th onClick={()=>toggleOrden("transportista")} style={{cursor:"pointer",userSelect:"none"}}>Transportista {iconOrden("transportista")}</th>
              <th onClick={()=>toggleOrden("chofer")} style={{cursor:"pointer",userSelect:"none"}}>Chofer {iconOrden("chofer")}</th>
              <th onClick={()=>toggleOrden("patente_chasis")} style={{cursor:"pointer",userSelect:"none"}}>Patente {iconOrden("patente_chasis")}</th>
              <th onClick={()=>toggleOrden("tarifa_real")} style={{cursor:"pointer",userSelect:"none"}}>Tarifa {iconOrden("tarifa_real")}</th>
              <th>Calidad</th>
              <th onClick={()=>toggleOrden("estado_liq")} style={{cursor:"pointer",userSelect:"none"}}>Estado {iconOrden("estado_liq")}</th>
            </tr>
            <tr style={{background:"#0a0c12"}}>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.numero)} value={filtros.numero} onChange={v=>setFiltro("numero",v)} tipo="text" placeholder="Buscar..."/></td>
              <td style={{padding:"4px 6px"}}></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.productor)} value={filtros.productor} onChange={v=>setFiltro("productor",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.destino?.split(",")[0])} value={filtros.destino} onChange={v=>setFiltro("destino",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.origen?.split(",")[0])} value={filtros.origen} onChange={v=>setFiltro("origen",v)}/></td>
              <td style={{padding:"4px 6px"}}></td>
              <td style={{padding:"4px 6px"}}></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.transportista)} value={filtros.transportista} onChange={v=>setFiltro("transportista",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.chofer)} value={filtros.chofer} onChange={v=>setFiltro("chofer",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.patente_chasis)} value={filtros.patente_chasis} onChange={v=>setFiltro("patente_chasis",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>String(m.tarifa_real||""))} value={filtros.tarifa_real} onChange={v=>setFiltro("tarifa_real",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={["OK","Falta"]} value={filtros.calidad} onChange={v=>setFiltro("calidad",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.estado_liq)} value={filtros.estado_liq} onChange={v=>setFiltro("estado_liq",v)}/></td>
            </tr>
          </thead>
          <tbody>
            {movs.map(m=>(
              <tr key={m.id} style={{background:seleccionados.includes(m.id)?"rgba(245,166,35,.05)":""}}>
                <td><input type="checkbox" checked={seleccionados.includes(m.id)} onChange={()=>toggleSelect(m.id)}/></td>
                <td style={{color:"#8890a8",fontSize:12,whiteSpace:"nowrap"}}>16/02/2026</td>
                <td>
                  <div><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></div>

                    <div style={{display:"flex",alignItems:"center",gap:2}}>
                      <span style={{color:"#8890a8",fontSize:12}}>$</span>
                      <input
                        defaultValue={m.tarifa_real||""}
                        type="number"
                        placeholder="—"
                        style={{width:70,padding:"3px 5px",fontSize:12,background:"transparent",border:"1px solid transparent",borderRadius:4,color:"#f5a623",fontFamily:"'IBM Plex Mono',monospace"}}
                        onFocus={e=>{e.target.style.background="#0f1117";e.target.style.borderColor="#2a2d3e";}}
                        onBlur={e=>{e.target.style.background="transparent";e.target.style.borderColor="transparent";}}
                        title="Click para editar tarifa"
                      />
                    </div>
                  ):(
                    <div>
                      <span className="mono" style={{fontSize:12}}>$ {m.tarifa_real||"—"}</span>
                      <div style={{fontSize:10,color:"#565d7a"}}>🔒 bloqueada</div>
                    </div>
                  )}
                </td>
                <td>
                  {puedePreLiq(m)
                    ? <Badge label="OK" color="green"/>
                    : <Badge label="Falta" color="red"/>
                  }
                </td>
                <td>
                  <Badge
                    label={m.estado_liq==="LIQUIDADO"?"Liquidado":m.estado_liq==="PRELIQUIDADO"?"Preliq.":"Pendiente"}
                    color={m.estado_liq==="LIQUIDADO"?"green":m.estado_liq==="PRELIQUIDADO"?"blue":"orange"}
                  />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* MODAL PRELIQUIDACION */}
      {showPreliq&&(
        <Modal title="Confirmar Preliquidación de Fletes" onClose={()=>setShowPreliq(false)}>
          <div className="alert-info" style={{marginBottom:16}}>
            Se van a preliquidar {seleccionados.length} flete(s). Una vez confirmado no se podrán modificar kilos ni calidad.
          </div>
          <table>
            <thead><tr><th>Movimiento</th><th>Transportista</th><th>Kg Liq.</th><th>Tarifa</th><th>Monto Est.</th></tr></thead>
            <tbody>
              {seleccionados.map(id=>{
                const m = movs.find(x=>x.id===id);
                if(!m) return null;
                const monto = m.km && m.tarifa_real && m.kg_liquidables
                  ? Math.round(m.km * m.tarifa_real * m.kg_liquidables/1000/100)
                  : 0;
                return (
                  <tr key={id}>
                    <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                    <td style={{fontSize:12}}>{m.transportista}</td>
                    <td><span className="mono">{m.kg_liquidables?.toLocaleString()}</span></td>
                    <td><span className="mono">$ {m.tarifa_real}</span></td>
                    <td><span className="mono" style={{color:"#f5a623",fontWeight:700}}>$ {monto.toLocaleString()}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
            <Btn variant="secondary" onClick={()=>setShowPreliq(false)}>Cancelar</Btn>
            <Btn variant="success" onClick={()=>{alert(`✓ ${seleccionados.length} flete(s) preliquidados. Kilos y calidad bloqueados.`);setShowPreliq(false);setSeleccionados([]);}}>
              Confirmar Preliquidación
            </Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ── REPORTE CALIDADES ──
const ReporteCalidades = ({modulo}) => {
  const [seleccionados, setSeleccionados] = useState([]);
  const [factorMasivo, setFactorMasivo] = useState("");
  const [orden, setOrden] = useState({col:"numero", dir:"asc"});
  const [filtros, setFiltros] = useState({
    numero:"", especie:"", productor:"", kg_liquidables:"",
    factor:"", humedad_llegada:"", estado_liq:""
  });

  const setFiltro = (k,v) => setFiltros(prev=>({...prev,[k]:v}));
  const limpiarFiltros = () => setFiltros({numero:"",especie:"",productor:"",kg_liquidables:"",factor:"",humedad_llegada:"",estado_liq:""});
  const toggleOrden = (col) => setOrden(prev=>({col, dir:prev.col===col&&prev.dir==="asc"?"desc":"asc"}));
  const iconOrden = (col) => orden.col===col?(orden.dir==="asc"?"↑":"↓"):"↕";
  const hayFiltros = Object.values(filtros).some(v=>v!=="");

  const todosMovs = mockMovimientos.filter(m=>m.modalidad===modulo);

  const aplicar = (lista) => lista
    .filter(m=>!filtros.numero||m.numero?.toLowerCase().includes(filtros.numero.toLowerCase()))
    .filter(m=>!filtros.especie||m.especie===filtros.especie)
    .filter(m=>!filtros.productor||m.productor===filtros.productor)
    .filter(m=>!filtros.estado_liq||m.estado_liq===filtros.estado_liq)
    .sort((a,b)=>{
      let va=a[orden.col]??"", vb=b[orden.col]??"";
      if(typeof va==="string") va=va.toLowerCase();
      if(typeof vb==="string") vb=vb.toLowerCase();
      return va<vb?(orden.dir==="asc"?-1:1):va>vb?(orden.dir==="asc"?1:-1):0;
    });

  const movsSinCalidad = aplicar(todosMovs.filter(m=>m.estado==="DESCARGADO"&&m.factor===null));
  const movsConCalidad = aplicar(todosMovs.filter(m=>m.factor!==null));

  const toggleSelect = (id) => setSeleccionados(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const toggleAll = () => setSeleccionados(seleccionados.length===movsSinCalidad.length?[]:movsSinCalidad.map(m=>m.id));

  return (
    <div className="fade-in">
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Reporte de Calidades</h2>
        <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>Calidades pendientes de carga y asignación masiva</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
        <StatCard label="Sin Calidad Cargada" value={movsSinCalidad.length} sub="requieren calidad para preliquidar" color="#e74c3c"/>
        <StatCard label="Con Calidad OK" value={movsConCalidad.length} sub="listos para preliquidar" color="#27ae60"/>
      </div>

      {/* INFO + LIMPIAR */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:12,color:"#8890a8"}}>
          Sin calidad: <strong style={{color:"#e74c3c"}}>{movsSinCalidad.length}</strong>
          <span style={{margin:"0 8px",color:"#2a2d3e"}}>|</span>
          Con calidad: <strong style={{color:"#27ae60"}}>{movsConCalidad.length}</strong>
          {seleccionados.length>0&&<span style={{color:"#f5a623",marginLeft:8}}>· {seleccionados.length} seleccionado(s)</span>}
        </div>
        {hayFiltros&&<Btn variant="danger" size="sm" onClick={limpiarFiltros}>✕ Limpiar filtros</Btn>}
      </div>

      {/* PENDIENTES SIN CALIDAD */}
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header">
          <span style={{fontWeight:600,fontSize:14}}>⚠ Pendientes sin Calidad</span>
          {seleccionados.length>0&&(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" step="0.001" placeholder="Factor directo (ej: 0.980)" value={factorMasivo}
                onChange={e=>setFactorMasivo(e.target.value)}
                style={{width:200,padding:"5px 10px",fontSize:13}}/>
              <Btn variant="primary" size="sm"
                onClick={()=>factorMasivo&&alert(`✓ Factor ${factorMasivo} aplicado a ${seleccionados.length} movimiento(s)`)}>
                Aplicar Factor Masivo
              </Btn>
            </div>
          )}
        </div>
        {movsSinCalidad.length===0?(
          <div style={{padding:30,textAlign:"center",color:"#27ae60",fontWeight:600}}>
            ✓ Todos los movimientos tienen calidad cargada
          </div>
        ):(
          <table>
            <thead>
              <tr>
                <th><input type="checkbox" onChange={toggleAll} checked={seleccionados.length===movsSinCalidad.length&&movsSinCalidad.length>0}/></th>
                <th>N° Mov</th><th>Especie</th><th>Productor</th>
                <th>Fecha Descarga</th><th>Kg Llegada</th><th>Humedad</th><th>Acción</th>
              </tr>
            </thead>
            <tbody>
              {movsSinCalidad.map(m=>(
                <tr key={m.id} style={{background:seleccionados.includes(m.id)?"rgba(231,76,60,.05)":""}}>
                  <td><input type="checkbox" checked={seleccionados.includes(m.id)} onChange={()=>toggleSelect(m.id)}/></td>
                  <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                  <td>{m.especie}</td>
                  <td>{m.productor}</td>
                  <td style={{color:"#8890a8",fontSize:12}}>—</td>
                  <td><span className="mono">{m.peso_neto_llegada?.toLocaleString()||"—"}</span></td>
                  <td><span className="mono">{m.humedad_llegada||"—"}</span></td>
                  <td><Btn variant="ghost" size="sm" onClick={()=>alert("Cargar calidad rubro a rubro para "+m.numero)}>Cargar Calidad</Btn></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* CON CALIDAD OK */}
      <div className="card">
        <div className="card-header"><span style={{fontWeight:600,fontSize:14}}>✓ Con Calidad Cargada</span></div>
        <table>
          <thead>
            <tr>
              <th onClick={()=>toggleOrden("numero")} style={{cursor:"pointer",userSelect:"none"}}>N° Mov {iconOrden("numero")}</th>
              <th onClick={()=>toggleOrden("especie")} style={{cursor:"pointer",userSelect:"none"}}>Especie {iconOrden("especie")}</th>
              <th onClick={()=>toggleOrden("productor")} style={{cursor:"pointer",userSelect:"none"}}>Productor {iconOrden("productor")}</th>
              <th onClick={()=>toggleOrden("kg_liquidables")} style={{cursor:"pointer",userSelect:"none"}}>Kg Liquidables {iconOrden("kg_liquidables")}</th>
              <th onClick={()=>toggleOrden("factor")} style={{cursor:"pointer",userSelect:"none"}}>Factor {iconOrden("factor")}</th>
              <th onClick={()=>toggleOrden("estado_liq")} style={{cursor:"pointer",userSelect:"none"}}>Estado Liq. {iconOrden("estado_liq")}</th>
            </tr>
            <tr style={{background:"#0a0c12"}}>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.numero)} value={filtros.numero} onChange={v=>setFiltro("numero",v)} tipo="text" placeholder="Buscar..."/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.especie)} value={filtros.especie} onChange={v=>setFiltro("especie",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.productor)} value={filtros.productor} onChange={v=>setFiltro("productor",v)}/></td>
              <td style={{padding:"4px 6px"}}></td>
              <td style={{padding:"4px 6px"}}></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.estado_liq)} value={filtros.estado_liq} onChange={v=>setFiltro("estado_liq",v)}/></td>
            </tr>
          </thead>
          <tbody>
            {movsConCalidad.map(m=>(
              <tr key={m.id}>
                <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                <td>{m.especie}</td>
                <td>{m.productor}</td>
                <td><span className="mono" style={{color:"#27ae60",fontWeight:600}}>{m.kg_liquidables?.toLocaleString()}</span></td>
                <td><span className="mono" style={{color:"#f5a623"}}>{m.factor}</span></td>
                <td><Badge label={m.estado_liq} color={m.estado_liq==="LIQUIDADO"?"green":m.estado_liq==="ASIGNADO"?"blue":"orange"}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ── POSICIÓN ABIERTA ──
const PosicionAbierta = ({modulo}) => {
  const [showAsignar, setShowAsignar] = useState(false);
  const [seleccionado, setSeleccionado] = useState(null);

  // Movimientos sin contrato asignado
  const movsSinContrato = mockMovimientos.filter(m =>
    m.modalidad === modulo && !m.contrato_compra
  );

  // Agrupar por productor y especie
  const posiciones = mockContrapartes
    .filter(c => c.tipo === "PRODUCTOR" || c.tipo === "AMBOS")
    .map(prod => {
      const movs = movsSinContrato.filter(m => m.productor === prod.razon_social);
      if (movs.length === 0) return null;
      const tn = movs.reduce((a, m) => a + (m.kg_liquidables || m.peso_neto_salida || 0) / 1000, 0);
      return { productor: prod, movs, tn };
    })
    .filter(Boolean);

  return (
    <div className="fade-in">
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Posición Abierta Sin Contrato</h2>
        <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>
          Mercadería recibida sin contrato asignado — stock a fijar sin condiciones prepactadas
        </p>
      </div>

      {posiciones.length === 0 ? (
        <div style={{padding:40,textAlign:"center",color:"#27ae60",fontWeight:600,fontSize:15}}>
          ✓ No hay mercadería sin contrato asignado
        </div>
      ) : (
        posiciones.map(pos => (
          <div key={pos.productor.id} className="card" style={{marginBottom:14}}>
            <div className="card-header">
              <div>
                <span style={{fontWeight:700,fontSize:15}}>{pos.productor.razon_social}</span>
                <span style={{color:"#8890a8",fontSize:12,marginLeft:12}}>{pos.productor.cuit||"Informal"}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span className="mono" style={{color:"#f5a623",fontWeight:700,fontSize:16}}>
                  {pos.tn.toFixed(3)} tn sin asignar
                </span>
                <Badge label="A FIJAR" color="purple"/>
              </div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>N° Mov</th><th>Especie</th><th>Campaña</th>
                  <th>Comprador</th><th>Kg Liquidables</th>
                  <th>Humedad</th><th>Factor</th><th>Estado Calidad</th><th>Acción</th>
                </tr>
              </thead>
              <tbody>
                {pos.movs.map(m => (
                  <tr key={m.id}>
                    <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                    <td>{m.especie}</td>
                    <td><span className="mono" style={{fontSize:11}}>{m.campana}</span></td>
                    <td style={{color:"#8890a8",fontSize:12}}>{m.destino?.split(",")[0]||"—"}</td>
                    <td>
                      <span className="mono" style={{fontWeight:600}}>
                        {m.kg_liquidables?.toLocaleString() || <span style={{color:"#565d7a"}}>Sin calidad</span>}
                      </span>
                    </td>
                    <td><span className="mono">{m.humedad_llegada||"—"}</span></td>
                    <td>
                      {m.factor
                        ? <span className="mono" style={{color:"#f5a623"}}>{m.factor}</span>
                        : <Badge label="Falta" color="red"/>
                      }
                    </td>
                    <td>
                      {m.factor
                        ? <Badge label="OK" color="green"/>
                        : <Badge label="Sin calidad" color="red"/>
                      }
                    </td>
                    <td>
                      <div style={{display:"flex",gap:6}}>
                        <Btn variant="secondary" size="sm"
                          onClick={()=>{setSeleccionado(m);setShowAsignar(true);}}>
                          Asignar Contrato
                        </Btn>
                        <Btn variant="ghost" size="sm"
                          onClick={()=>alert("Crear venta directa desde posición abierta para "+m.numero)}>
                          Vender
                        </Btn>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ))
      )}

      {/* MODAL ASIGNAR CONTRATO */}
      {showAsignar && seleccionado && (
        <Modal title={`Asignar Contrato — ${seleccionado.numero}`} onClose={()=>setShowAsignar(false)}>
          <div className="alert-info" style={{marginBottom:16}}>
            Seleccioná un contrato existente o creá uno nuevo para asignar esta mercadería.
          </div>
          <div style={{padding:"12px 14px",background:"#0f1117",borderRadius:8,border:"1px solid #2a2d3e",marginBottom:16}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[
                ["Productor", seleccionado.productor],
                ["Especie", seleccionado.especie],
                ["Kg Liquidables", seleccionado.kg_liquidables?.toLocaleString()||"Sin calidad"],
              ].map(([l,v])=>(
                <div key={l}>
                  <div style={{fontSize:11,color:"#8890a8"}}>{l}</div>
                  <div style={{fontWeight:600,marginTop:2}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="form-grid-2">
            <FF label="Asignar a Contrato de Compra Existente">
              <select>
                <option value="">Seleccionar contrato...</option>
                {mockContratos.filter(c=>c.tipo==="COMPRA").map(c=>(
                  <option key={c.id}>{c.numero} — {c.contraparte} — {c.especie}</option>
                ))}
              </select>
            </FF>
            <FF label="Asignar a Contrato de Venta Existente">
              <select>
                <option value="">Seleccionar contrato...</option>
                {mockContratos.filter(c=>c.tipo==="VENTA").map(c=>(
                  <option key={c.id}>{c.numero} — {c.contraparte} — {c.especie}</option>
                ))}
              </select>
            </FF>
          </div>
          <div style={{padding:"12px 14px",background:"rgba(39,174,96,.06)",border:"1px solid rgba(39,174,96,.2)",borderRadius:6,marginTop:8,marginBottom:16,fontSize:12,color:"#27ae60"}}>
            ¿No hay contrato? → Podés crear uno nuevo desde el módulo de Contratos y después volver acá a asignarlo.
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn variant="secondary" onClick={()=>setShowAsignar(false)}>Cancelar</Btn>
            <Btn onClick={()=>{alert("✓ Contrato asignado al movimiento "+seleccionado.numero);setShowAsignar(false);}}>
              Confirmar Asignación
            </Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};
