  const [errores, setErrores] = useState([]);
  const [procesando, setProcesando] = useState(false);
  const [seleccionados, setSeleccionados] = useState([]);

  // Columnas esperadas en el Excel
  const COLUMNAS = [
    {key:"productor", label:"Productor", requerido:true, tipo:"text"},
    {key:"comprador", label:"Comprador / Destino", requerido:true, tipo:"text"},
    {key:"especie", label:"Especie", requerido:true, tipo:"select"},
    {key:"campana", label:"Campaña", requerido:true, tipo:"text"},
    {key:"nro_ctg", label:"N° CTG", requerido:false, tipo:"text"},
    {key:"nro_cpe", label:"N° CPE", requerido:false, tipo:"text"},
    {key:"patente_chasis", label:"Patente Chasis", requerido:true, tipo:"text"},
    {key:"patente_acoplado", label:"Patente Acoplado", requerido:false, tipo:"text"},
    {key:"transportista", label:"Transportista", requerido:true, tipo:"text"},
    {key:"chofer", label:"Chofer", requerido:false, tipo:"text"},
    {key:"localidad_origen", label:"Localidad Origen", requerido:false, tipo:"text"},
    {key:"provincia_origen", label:"Provincia Origen", requerido:false, tipo:"text"},
    {key:"localidad_destino", label:"Localidad Destino", requerido:false, tipo:"text"},
    {key:"km", label:"Km", requerido:false, tipo:"number"},
    {key:"tarifa_catac", label:"Tarifa CATAC", requerido:false, tipo:"number"},
    {key:"tarifa_real", label:"Tarifa Real", requerido:false, tipo:"number"},
    {key:"kg_bruto_salida", label:"Kg Bruto Salida", requerido:true, tipo:"number"},
    {key:"kg_tara_salida", label:"Kg Tara Salida", requerido:true, tipo:"number"},
    {key:"humedad_salida", label:"Humedad Salida %", requerido:false, tipo:"number"},
    // DESCARGA — opcionales
    {key:"kg_bruto_llegada", label:"Kg Bruto Llegada", requerido:false, tipo:"number"},
    {key:"kg_tara_llegada", label:"Kg Tara Llegada", requerido:false, tipo:"number"},
    {key:"humedad_llegada", label:"Humedad Llegada %", requerido:false, tipo:"number"},
    {key:"nro_turno", label:"N° Turno", requerido:false, tipo:"text"},
    // CALIDAD — opcional
    {key:"factor", label:"Factor Calidad", requerido:false, tipo:"number"},
    {key:"contrato_compra", label:"Contrato Compra", requerido:false, tipo:"text"},
    {key:"contrato_venta", label:"Contrato Venta", requerido:false, tipo:"text"},
  ];

  const COLS_REQUERIDAS = COLUMNAS.filter(c=>c.requerido);

  const [nombreArchivo, setNombreArchivo] = useState("");

  const MAPA_COLUMNAS = {
    "FECHA":"fecha","CEREAL":"especie","CTG":"ctg","CPE/REMITOS":"cpe_remito",
    "CHOFER":"chofer","TRANSPORTE":"transportista","PAT.CHAS":"patente_chasis",
    "PAT.AC":"patente_acoplado","PRODUTOR":"productor","PRODUCTOR":"productor",
    "ORIGEN":"origen","DESTINO":"destino","DESTINATARIO":"comprador",
    "TN.CARGA":"kg_carga","TN.DESC":"kg_desc","H°":"humedad",
    "MERMA X H°":"neto_humedad","NETO":"neto_humedad",
    "KM":"km","TARIFA":"tarifa","TOTAL FLETE":"total_flete",
    "OBSERVACIONES":"observaciones","CAMPAÑA":"campana",
    "ESPECIE":"especie","PRODUCTOR *":"productor",
    "COMPRADOR/DEST *":"comprador","TRANSPORTISTA *":"transportista",
    "PAT. CHASIS *":"patente_chasis","PAT. ACOPLADO":"patente_acoplado",
    "KG CARGA *":"kg_carga","KG DESC.":"kg_desc","HUMEDAD %":"humedad",
    "NETO HUM.":"neto_humedad","TOTAL FLETE":"total_flete",
  };

  const MAPA_ESPECIES = {
    "MAIZ":"Maíz","MAÍZ":"Maíz","EX.SOJA":"Soja","SOJA":"Soja",
    "GIRASOL":"Girasol","TRIGO":"Trigo","CEBADA":"Cebada",
    "S.AVENA":"Sorgo","AVENA":"Sorgo","SORGO":"Sorgo",
  };

  const procesarArchivo = (file) => {
    if (!file) return;
    setNombreArchivo(file.name);
    setProcesando(true);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:"array", cellDates:true});

        // Buscar hoja de movimientos
        const hojaNombre = wb.SheetNames.find(n=>
          n.toUpperCase().includes("MOVIMIENTO") || n.toUpperCase().includes("MOV")
        ) || wb.SheetNames[0];

        const ws = wb.Sheets[hojaNombre];
        const filas = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false});

        // Encontrar fila de headers (busca la que tenga FECHA o CEREAL o PRODUCTOR)
        let headerIdx = -1;
        let headers = [];
        for (let i=0; i<Math.min(filas.length,10); i++) {
          const fila = filas[i];
          const tieneHeaders = fila && fila.some(c=>
            c && ["FECHA","CEREAL","PRODUCTOR","PRODUTOR","CHOFER","TRANSPORTE"].includes(String(c).trim().toUpperCase())
          );
          if (tieneHeaders) { headerIdx = i; headers = fila; break; }
        }

        if (headerIdx === -1) {
          alert("No se encontró la fila de encabezados. Verificá que el Excel tenga columnas como FECHA, CEREAL, PRODUCTOR, etc.");
          setProcesando(false);
          return;
        }

        // Mapear headers
        const colMap = {};
        headers.forEach((h,i)=>{
          if (!h) return;
          const key = MAPA_COLUMNAS[String(h).trim().toUpperCase()] || MAPA_COLUMNAS[String(h).trim()];
          if (key) colMap[i] = key;
        });

        // Procesar filas de datos
        const registros = [];
        for (let i=headerIdx+1; i<filas.length; i++) {
          const fila = filas[i];
          if (!fila || fila.every(c=>!c)) continue;

          const r = {_fila: i+1};
          Object.entries(colMap).forEach(([col, key])=>{
            r[key] = fila[col] !== null && fila[col] !== undefined ? fila[col] : null;
          });

          // Normalizar especie
          if (r.especie) {
            const esp = String(r.especie).trim().toUpperCase();
            r.especie = MAPA_ESPECIES[esp] || r.especie;
          }

          // Campaña por defecto
          if (!r.campana) r.campana = "2024/2025";

          // Calcular kg netos y faltante
          const kgCarga = parseFloat(r.kg_carga) || null;
          const kgDesc = parseFloat(r.kg_desc) || null;
          r._kg_neto_salida = kgCarga;
          r._kg_neto_llegada = kgDesc;
          if (kgCarga && kgDesc) {
            const dif = kgCarga - kgDesc;
            const tol = kgCarga * 0.0003;
            r._faltante = Math.max(0, dif - tol);
          } else {
            r._faltante = null;
          }

          r._tiene_descarga = !!kgDesc;
          r._tiene_calidad = !!(r.factor || r.humedad);

          // Validar campos requeridos
          const errores = [];
          if (!r.productor) errores.push("Productor requerido");
          if (!r.transportista) errores.push("Transportista requerido");
          if (!r.patente_chasis) errores.push("Patente chasis requerida");
          if (!kgCarga) errores.push("Kg Carga requerido");
          if (!r.especie) errores.push("Especie requerida");

          r._errores = errores;
          r._estado = errores.length > 0 ? "ERROR" : "OK";

          registros.push(r);
        }

        setDatos(registros);
        setSeleccionados(registros.filter(r=>r._estado==="OK").map((_,i)=>i));
        setProcesando(false);
        setPaso(2);
      } catch(err) {
        console.error(err);
        alert("Error al leer el archivo: " + err.message);
        setProcesando(false);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const simularImport = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".xlsx,.xls,.csv";
    input.onchange = (e) => procesarArchivo(e.target.files[0]);
    input.click();
  };

  const confirmarImport = () => {
    setProcesando(true);
    setTimeout(()=>{
      setProcesando(false);
      setPaso(3);
    },1200);
  };

  const toggleSel = (i) => setSeleccionados(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i]);
  const ok = datos.filter(r=>r._estado==="OK");
  const err = datos.filter(r=>r._estado==="ERROR");

  return (
    <div className="fade-in">
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Importar Movimientos desde Excel</h2>
        <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>
          Cargá múltiples movimientos a la vez. Si tienen datos de descarga y calidad también los importa.
        </p>
      </div>

      {/* PASOS */}
      <div style={{display:"flex",gap:0,marginBottom:24}}>
        {[
          {n:1,label:"Subir archivo"},
          {n:2,label:"Revisar y validar"},
          {n:3,label:"Importado"},
        ].map((p,i)=>(
          <div key={p.n} style={{display:"flex",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",borderRadius:6,background:paso===p.n?"rgba(245,166,35,.12)":paso>p.n?"rgba(39,174,96,.1)":"transparent",border:`1px solid ${paso===p.n?"rgba(245,166,35,.3)":paso>p.n?"rgba(39,174,96,.3)":"#2a2d3e"}`}}>
              <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:paso===p.n?"#f5a623":paso>p.n?"#27ae60":"#2a2d3e",color:paso>=p.n?"#000":"#8890a8"}}>
                {paso>p.n?"✓":p.n}
              </div>
              <span style={{fontSize:13,fontWeight:paso===p.n?600:400,color:paso===p.n?"#f5a623":paso>p.n?"#27ae60":"#8890a8"}}>{p.label}</span>
            </div>
            {i<2&&<div style={{width:30,height:1,background:"#2a2d3e"}}/>}
          </div>
        ))}
      </div>

      {/* PASO 1 — SUBIR */}
      {paso===1&&(
        <div>
          {/* PLANTILLA */}
          <div className="card" style={{marginBottom:16,padding:"18px 20px"}}>
            <div style={{fontWeight:600,marginBottom:8,fontSize:14}}>📋 Plantilla de Excel</div>
            <p style={{color:"#8890a8",fontSize:13,marginBottom:14}}>
              Usá esta estructura de columnas. Las marcadas con * son obligatorias. Si tenés datos de descarga completá esas columnas también — el sistema las importa automáticamente.
            </p>
            <div style={{overflowX:"auto"}}>
              <table style={{fontSize:11}}>
                <thead>
                  <tr>
                    {COLUMNAS.map(c=>(
                      <th key={c.key} style={{background:c.requerido?"rgba(245,166,35,.15)":"rgba(52,152,219,.1)",color:c.requerido?"#f5a623":"#3498db",whiteSpace:"nowrap",padding:"6px 10px"}}>
                        {c.label}{c.requerido?" *":""}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    {COLUMNAS.map(c=>(
                      <td key={c.key} style={{color:"#565d7a",fontSize:11,whiteSpace:"nowrap",padding:"5px 10px"}}>
                        {c.tipo==="number"?"0.000":c.tipo==="select"?ESPECIES[0]:"Ejemplo"}
                      </td>
                    ))}
                  </tr>
                </tbody>
              </table>
            </div>
            <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{padding:"4px 10px",background:"rgba(245,166,35,.1)",border:"1px solid rgba(245,166,35,.2)",borderRadius:4,fontSize:11,color:"#f5a623"}}>* Columnas obligatorias</div>
              <div style={{padding:"4px 10px",background:"rgba(52,152,219,.1)",border:"1px solid rgba(52,152,219,.2)",borderRadius:4,fontSize:11,color:"#3498db"}}>Columnas opcionales</div>
              <div style={{padding:"4px 10px",background:"rgba(39,174,96,.1)",border:"1px solid rgba(39,174,96,.2)",borderRadius:4,fontSize:11,color:"#27ae60"}}>Si tenés Kg Bruto/Tara Llegada → importa descarga</div>
              <div style={{padding:"4px 10px",background:"rgba(155,89,182,.1)",border:"1px solid rgba(155,89,182,.2)",borderRadius:4,fontSize:11,color:"#9b59b6"}}>Si tenés Factor → importa calidad</div>
            </div>
          </div>

          {/* DROP ZONE */}
          <div
            className="drop-zone"
            style={{marginBottom:16}}
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#f5a623";}}
            onDragLeave={e=>{e.currentTarget.style.borderColor="#2a2d3e";}}
            onDrop={e=>{
              e.preventDefault();
              e.currentTarget.style.borderColor="#2a2d3e";
              const file = e.dataTransfer.files[0];
              if(file) procesarArchivo(file);
            }}
            onClick={()=>{
              const input = document.createElement("input");
              input.type="file";
              input.accept=".xlsx,.xls,.csv";
              input.onchange=(e)=>procesarArchivo(e.target.files[0]);
              input.click();
            }}
          >
            <div style={{fontSize:40,marginBottom:12}}>📊</div>
            <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>
              {nombreArchivo ? `✓ ${nombreArchivo}` : "Arrastrá el archivo Excel acá"}
            </div>
            <div style={{color:"#8890a8",fontSize:13,marginBottom:16}}>
              {nombreArchivo ? "Click para cambiar el archivo" : "Formatos soportados: .xlsx / .xls / .csv"}
            </div>
            <Btn variant="secondary" onClick={e=>e.stopPropagation()}>Seleccionar archivo</Btn>
          </div>

          <div className="alert-info" style={{marginBottom:16}}>
            💡 El sistema valida cada fila antes de importar. Las filas con errores se muestran en rojo y podés corregirlas o saltearlas. Las filas OK se importan todas juntas.
          </div>

          {procesando?(
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <div className="pulse" style={{color:"#f5a623",fontWeight:600,marginBottom:6}}>Procesando archivo...</div>
              <div style={{color:"#8890a8",fontSize:13}}>Leyendo Excel y validando filas...</div>
            </div>
          ):(
            <Btn
              onClick={()=>{
                const input = document.createElement("input");
                input.type="file";
                input.accept=".xlsx,.xls,.csv";
                input.onchange=(e)=>procesarArchivo(e.target.files[0]);
                input.click();
              }}
              style={{width:"100%",justifyContent:"center",padding:12,fontSize:14}}
            >
              📂 Seleccionar y procesar Excel
            </Btn>
          )}
        </div>
      )}

      {/* PASO 2 — PREVIEW */}
      {paso===2&&(
        <div>
          {/* RESUMEN */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:16}}>
            <StatCard label="Total Filas" value={datos.length} sub="en el archivo" color="#3498db"/>
            <StatCard label="Filas OK" value={ok.length} sub="listas para importar" color="#27ae60"/>
            <StatCard label="Con Errores" value={err.length} sub="no se importarán" color="#e74c3c"/>
            <StatCard label="Seleccionadas" value={seleccionados.length} sub="se van a importar" color="#f5a623"/>
          </div>

          {/* ALERTAS */}
          {datos.some(r=>r._tiene_descarga)&&(
            <div className="alert-success" style={{marginBottom:10}}>
              ✓ {datos.filter(r=>r._tiene_descarga).length} fila(s) tienen datos de descarga — se importarán automáticamente
            </div>
          )}
          {datos.some(r=>r._tiene_calidad)&&(
            <div style={{padding:"10px 14px",background:"rgba(155,89,182,.1)",border:"1px solid rgba(155,89,182,.3)",borderRadius:6,marginBottom:10,fontSize:12,color:"#9b59b6"}}>
              ✓ {datos.filter(r=>r._tiene_calidad).length} fila(s) tienen factor de calidad — se importarán automáticamente
            </div>
          )}
          {err.length>0&&(
            <div className="alert-danger" style={{marginBottom:10}}>
              ⚠ {err.length} fila(s) tienen errores y no se importarán. Revisalas abajo.
            </div>
          )}

          {/* TABLA PREVIEW */}
          <div className="card" style={{overflowX:"auto",marginBottom:16}}>
            <table style={{fontSize:12}}>
              <thead>
                <tr>
                  <th>
                    <input type="checkbox"
                      checked={seleccionados.length===ok.length&&ok.length>0}
                      onChange={()=>setSeleccionados(seleccionados.length===ok.length?[]:ok.map((_,i)=>datos.indexOf(_)))}
                    />
                  </th>
                  <th>Estado</th>
                  <th>Productor</th>
                  <th>Comprador</th>
                  <th>Especie</th>
                  <th>Campaña</th>
                  <th>CTG</th>
                  <th>Patente</th>
                  <th>Transportista</th>
                  <th>Kg Neto Salida</th>
                  <th>Kg Neto Llegada</th>
                  <th>Faltante</th>
                  <th>Factor</th>
                  <th>Contrato C.</th>
                  <th>Descarga</th>
                  <th>Calidad</th>
                </tr>
              </thead>
              <tbody>
                {datos.map((r,i)=>(
                  <tr key={i} style={{background:r._estado==="ERROR"?"rgba(231,76,60,.08)":seleccionados.includes(i)?"rgba(245,166,35,.05)":""}}>
                    <td>
                      {r._estado==="OK"&&(
                        <input type="checkbox" checked={seleccionados.includes(i)} onChange={()=>toggleSel(i)}/>
                      )}
                    </td>
                    <td>
                      {r._estado==="OK"
                        ?<Badge label="OK" color="green"/>
                        :<div>
                          <Badge label="ERROR" color="red"/>
                          <div style={{marginTop:4}}>
                            {r._errores.map((e,j)=>(
                              <div key={j} style={{fontSize:10,color:"#e74c3c"}}>• {e}</div>
                            ))}
                          </div>
                        </div>
                      }
                    </td>
                    <td style={{fontWeight:500}}>{r.productor||<span style={{color:"#e74c3c"}}>—</span>}</td>
                    <td style={{color:"#8890a8",fontSize:11}}>{r.comprador||"—"}</td>
                    <td>{r.especie}</td>
                    <td><span className="mono" style={{fontSize:11}}>{r.campana}</span></td>
                    <td><span className="mono" style={{fontSize:11,color:"#8890a8"}}>{r.ctg||r.cpe_remito||"—"}</span></td>
                    <td><span className="mono" style={{fontSize:11}}>{r.patente_chasis||<span style={{color:"#e74c3c"}}>—</span>}</span></td>
                    <td style={{fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.transportista||<span style={{color:"#e74c3c"}}>—</span>}</td>
                    <td><span className="mono">{r._kg_neto_salida?.toLocaleString()||"—"}</span></td>
                    <td><span className="mono" style={{color:r._tiene_descarga?"#27ae60":"#565d7a"}}>{r._kg_neto_llegada?.toLocaleString()||"—"}</span></td>
                    <td>
                      {r._faltante>0
                        ?<span className="mono" style={{color:"#e74c3c"}}>-{r._faltante}</span>
                        :r._tiene_descarga?<span style={{color:"#27ae60"}}>✓</span>:"—"
                      }
                    </td>
                    <td>
                      {r.factor
                        ?<span className="mono" style={{color:"#9b59b6"}}>{r.factor}</span>
                        :"—"
                      }
                    </td>
                    <td><span className="mono" style={{fontSize:11,color:"#f5a623"}}>{r.contrato_compra||"Sin contrato"}</span></td>
                    <td>{r._tiene_descarga?<Badge label="Sí" color="green"/>:<Badge label="No" color="gray"/>}</td>
                    <td>{r._tiene_calidad?<Badge label="Sí" color="purple"/>:<Badge label="No" color="gray"/>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn variant="secondary" onClick={()=>{setPaso(1);setDatos([]);setSeleccionados([]);}}>← Volver</Btn>
            <Btn
              disabled={seleccionados.length===0||procesando}
              onClick={confirmarImport}
            >
              {procesando
                ? <span className="pulse">Importando...</span>
                : `Importar ${seleccionados.length} movimiento(s)`
              }
            </Btn>
          </div>
        </div>
      )}

      {/* PASO 3 — RESULTADO */}
      {paso===3&&(
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:60,marginBottom:16}}>✅</div>
          <div style={{fontWeight:700,fontSize:22,marginBottom:8}}>
            {seleccionados.length} movimiento(s) importados correctamente
          </div>
          <div style={{color:"#8890a8",fontSize:14,marginBottom:8}}>
            {datos.filter((_,i)=>seleccionados.includes(i)&&datos[i]._tiene_descarga).length} con descarga incluida
          </div>
          <div style={{color:"#9b59b6",fontSize:14,marginBottom:32}}>
            {datos.filter((_,i)=>seleccionados.includes(i)&&datos[i]._tiene_calidad).length} con calidad/factor incluido
          </div>
          {err.length>0&&(
            <div className="alert-danger" style={{maxWidth:400,margin:"0 auto 24px",textAlign:"left"}}>
              ⚠ {err.length} fila(s) no se importaron por errores. Corregí el Excel y volvé a importarlas.
            </div>
          )}
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <Btn variant="secondary" onClick={()=>{setPaso(1);setDatos([]);setSeleccionados([]);}}>
              Importar otro archivo
            </Btn>
            <Btn onClick={()=>alert("Ir a Movimientos")}>
              Ver Movimientos →
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
};

// ── DASHBOARD CONSOLIDADO ──

  const totalMovs = mockMovimientos.length;
  const enTransito = mockMovimientos.filter(m=>m.estado==="EN_TRANSITO").length;
  const formales = mockMovimientos.filter(m=>m.modalidad==="FORMAL").length;
  const informales = mockMovimientos.filter(m=>m.modalidad==="INFORMAL").length;

  return (
    <div className="fade-in">
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>
          <span style={{color:"#27ae60"}}>⊞</span> Dashboard Consolidado
        </h2>
        <p style={{color:"#8890a8",fontSize:13}}>Vista unificada Formal + Informal</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
        <StatCard label="Total Movimientos" value={totalMovs} sub={`${formales} formales · ${informales} informales`} color="#27ae60"/>
        <StatCard label="En Tránsito" value={enTransito} sub="todos los canales" color="#3498db"/>
        <StatCard label="Contratos Activos" value={mockContratos.length} sub={`${mockContratos.filter(c=>c.modalidad==="FORMAL").length} F · ${mockContratos.filter(c=>c.modalidad==="INFORMAL").length} I`} color="#f5a623"/>
        <StatCard label="A Fijar Global" value={mockContratos.filter(c=>c.tipo_precio==="A_FIJAR").length} sub="contratos sin precio" color="#9b59b6"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div className="card">
          <div className="card-header">
            <span style={{fontWeight:600}}>Comparativa Formal vs Informal</span>
          </div>
          <div style={{padding:"16px 20px"}}>
            {[
              {label:"Movimientos",f:formales,i:informales},
              {label:"Contratos",f:mockContratos.filter(c=>c.modalidad==="FORMAL").length,i:mockContratos.filter(c=>c.modalidad==="INFORMAL").length},
            ].map(row=>(

const Configuracion = () => {
  const [tab,setTab]=useState("especies");
  const [especies,setEspecies]=useState([]);
  const [campanas,setCampanas]=useState([]);
  const [nuevaEspecie,setNuevaEspecie]=useState({nombre:"",codigo:""});
  const [nuevaCampana,setNuevaCampana]=useState({descripcion:"",anio_inicio:"",anio_fin:""});
  const [guardando,setGuardando]=useState(false);

  useEffect(()=>{
    api.get("/api/especies").then(d=>setEspecies(d)).catch(()=>{});
    api.get("/api/campanas").then(d=>setCampanas(d)).catch(()=>{});
  },[]);

  const guardarEspecie = async() => {
    if(!nuevaEspecie.nombre||!nuevaEspecie.codigo){alert("Nombre y código son obligatorios");return;}
    setGuardando(true);
    try {
      const r = await api.post("/api/especies",nuevaEspecie);
      setEspecies([...especies,r]);
      setNuevaEspecie({nombre:"",codigo:""});
      alert("✓ Especie guardada");
    } catch(e){alert("Error: "+e.message);}
    finally{setGuardando(false);}
  };

  const guardarCampana = async() => {
    if(!nuevaCampana.descripcion||!nuevaCampana.anio_inicio||!nuevaCampana.anio_fin){alert("Todos los campos son obligatorios");return;}
    setGuardando(true);
    try {
      const r = await api.post("/api/campanas",nuevaCampana);
      setCampanas([...campanas,r]);
      setNuevaCampana({descripcion:"",anio_inicio:"",anio_fin:""});
      alert("✓ Campaña guardada");

    finally{setGuardando(false);}

  return (
    <div className="fade-in">

  if(!logueado) return <Login onLogin={(u)=>{setLogueado(true);setUsuario(u);}}/>;

  const handleAccesoOculto = () => {
    if(codigoOculto==="invdelsal"){
      setInformalUnlocked(true);

      setShowAccesoOculto(false);
      setCodigoOculto("");

  };

  const menuActual = modulo==="FORMAL"?MENU_FORMAL:modulo==="INFORMAL"?MENU_INFORMAL:MENU_CONSOLIDADO;

      switch(sec){

        case "posicion_abierta": return <PosicionAbierta modulo="CONSOLIDADO"/>;

      case "contratos": return <Contratos {...p}/>;
      case "movimientos": return <Movimientos {...p}/>;
      case "liquidaciones": return <Liquidaciones {...p}/>;
      case "cc": return <CuentaCorriente {...p}/>;

      case "rep_calidades": return <ReporteCalidades modulo={modulo}/>;
      case "posicion_abierta": return <PosicionAbierta modulo={modulo}/>;

      default: return <Dashboard {...p}/>;

        <div style={{padding:"18px 18px 14px",borderBottom:"1px solid #2a2d3e",position:"relative"}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:17,color:"#f5a623",letterSpacing:"-.02em"}}>GRANO<span style={{color:"#e8eaf0"}}>SYS</span></div>
          <div style={{fontSize:10,color:"#565d7a",marginTop:2,letterSpacing:".05em",textTransform:"uppercase"}}>Comercialización</div>
          {showAccesoOculto&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}
               onClick={e=>{if(e.target===e.currentTarget){setShowAccesoOculto(false);setCodigoOculto("");}}}>
              <div style={{background:"#1a1d27",border:"1px solid #2a2d3e",borderRadius:10,padding:"24px 28px",width:260}}>
                <input
                  type="password"
                  value={codigoOculto}
                  onChange={e=>setCodigoOculto(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")handleAccesoOculto();if(e.key==="Escape"){setShowAccesoOculto(false);setCodigoOculto("");}}}
                  placeholder="•"
                  autoFocus
                  style={{width:"100%",padding:"10px 14px",fontSize:18,textAlign:"center",letterSpacing:"0.3em"}}
                />
              </div>
            </div>
          )}
        </div>
        <div style={{padding:"10px 12px",borderBottom:"1px solid #2a2d3e"}}>
          <div style={{fontSize:10,color:"#565d7a",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Módulo</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {(() => {
              const modulos = [
                {id:"FORMAL",label:"📋 Formal",color:"#3498db"}
              ];
              if (informalUnlocked) {
                modulos.push({id:"INFORMAL",label:"📝 Informal",color:"#f5a623"});
                modulos.push({id:"CONSOLIDADO",label:"⊞ Consolidado",color:"#27ae60"});
              }
              return modulos.map(m=>(
                <button key={m.id} onClick={()=>{setModulo(m.id);setSec("dashboard");}} style={{
                  padding:"7px 10px",fontSize:12,fontWeight:600,borderRadius:6,
                  border:`1px solid ${modulo===m.id?m.color+"44":"#2a2d3e"}`,
                  cursor:"pointer",textAlign:"left",
                  background:modulo===m.id?m.color+"18":"transparent",
                  color:modulo===m.id?m.color:"#8890a8",
                  transition:"all .2s"
                }}>
                  {m.label}
                </button>
              ));
            })()}
          </div>
        </div>
        <nav style={{flex:1,padding:"8px 8px",overflowY:"auto"}}>
          {menuActual.map(item=>(
            <button key={item.id} onClick={()=>setSec(item.id)} className={`nav-btn ${sec===item.id?"active":""}`}>
              <span style={{fontSize:14}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </nav>
        <div style={{padding:"10px 16px",borderTop:"1px solid #2a2d3e"}}>
          <div style={{fontSize:10,color:"#565d7a",userSelect:"none"}}>
            v2.1.0 — GranoSYS - <span
              onDoubleClick={()=>setShowAccesoOculto(true)}
              style={{cursor:"default",color:"#565d7a"}}
            >INVDELSAL</span>
          </div>
        </div>
      </div>
      {/* MAIN */}
      <div style={{flex:1,overflow:"auto",padding:22,background:"#0f1117"}}>
        {render()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
