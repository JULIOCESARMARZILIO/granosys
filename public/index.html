        <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>
          Cargá múltiples movimientos a la vez. Si tienen datos de descarga y calidad también los importa.
        </p>
      </div>

      {/* PASOS */}
      <div style={{display:"flex",gap:0,marginBottom:24}}>
        {[
          {n:1,label:"Subir archivo"},
          {n:2,label:"Revisar y validar"},
          {n:3,label:"Importado"},
        ].map((p,i)=>(
          <div key={p.n} style={{display:"flex",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",borderRadius:6,background:paso===p.n?"rgba(245,166,35,.12)":paso>p.n?"rgba(39,174,96,.1)":"transparent",border:`1px solid ${paso===p.n?"rgba(245,166,35,.3)":paso>p.n?"rgba(39,174,96,.3)":"#2a2d3e"}`}}>
              <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:paso===p.n?"#f5a623":paso>p.n?"#27ae60":"#2a2d3e",color:paso>=p.n?"#000":"#8890a8"}}>
                {paso>p.n?"✓":p.n}
              </div>
              <span style={{fontSize:13,fontWeight:paso===p.n?600:400,color:paso===p.n?"#f5a623":paso>p.n?"#27ae60":"#8890a8"}}>{p.label}</span>
            </div>
            {i<2&&<div style={{width:30,height:1,background:"#2a2d3e"}}/>}
          </div>
        ))}
      </div>

      {/* PASO 1 — SUBIR */}
      {paso===1&&(
        <div>
          {/* PLANTILLA */}
          <div className="card" style={{marginBottom:16,padding:"18px 20px"}}>
            <div style={{fontWeight:600,marginBottom:8,fontSize:14}}>📋 Plantilla de Excel</div>
            <p style={{color:"#8890a8",fontSize:13,marginBottom:14}}>
              Usá esta estructura de columnas. Las marcadas con * son obligatorias. Si tenés datos de descarga completá esas columnas también — el sistema las importa automáticamente.
            </p>
            <div style={{overflowX:"auto"}}>
              <table style={{fontSize:11}}>
                <thead>
                  <tr>
                    {COLUMNAS.map(c=>(
                      <th key={c.key} style={{background:c.requerido?"rgba(245,166,35,.15)":"rgba(52,152,219,.1)",color:c.requerido?"#f5a623":"#3498db",whiteSpace:"nowrap",padding:"6px 10px"}}>
                        {c.label}{c.requerido?" *":""}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    {COLUMNAS.map(c=>(
                      <td key={c.key} style={{color:"#565d7a",fontSize:11,whiteSpace:"nowrap",padding:"5px 10px"}}>
                        {c.tipo==="number"?"0.000":c.tipo==="select"?ESPECIES[0]:"Ejemplo"}
                      </td>
                    ))}
                  </tr>
                </tbody>
              </table>
            </div>
            <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{padding:"4px 10px",background:"rgba(245,166,35,.1)",border:"1px solid rgba(245,166,35,.2)",borderRadius:4,fontSize:11,color:"#f5a623"}}>* Columnas obligatorias</div>
              <div style={{padding:"4px 10px",background:"rgba(52,152,219,.1)",border:"1px solid rgba(52,152,219,.2)",borderRadius:4,fontSize:11,color:"#3498db"}}>Columnas opcionales</div>
              <div style={{padding:"4px 10px",background:"rgba(39,174,96,.1)",border:"1px solid rgba(39,174,96,.2)",borderRadius:4,fontSize:11,color:"#27ae60"}}>Si tenés Kg Bruto/Tara Llegada → importa descarga</div>
              <div style={{padding:"4px 10px",background:"rgba(155,89,182,.1)",border:"1px solid rgba(155,89,182,.2)",borderRadius:4,fontSize:11,color:"#9b59b6"}}>Si tenés Factor → importa calidad</div>
            </div>
          </div>

          {/* DROP ZONE */}
          <div
            className="drop-zone"
            style={{marginBottom:16}}
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#f5a623";}}
            onDragLeave={e=>{e.currentTarget.style.borderColor="#2a2d3e";}}
            onDrop={e=>{
              e.preventDefault();
              e.currentTarget.style.borderColor="#2a2d3e";
              const file = e.dataTransfer.files[0];
              if(file) procesarArchivo(file);
            }}
            onClick={()=>{
              const input = document.createElement("input");
              input.type="file";
              input.accept=".xlsx,.xls,.csv";
              input.onchange=(e)=>procesarArchivo(e.target.files[0]);
              input.click();
            }}
          >
            <div style={{fontSize:40,marginBottom:12}}>📊</div>
            <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>
              {nombreArchivo ? `✓ ${nombreArchivo}` : "Arrastrá el archivo Excel acá"}
            </div>
            <div style={{color:"#8890a8",fontSize:13,marginBottom:16}}>

          {datos.some(r=>r._tiene_descarga)&&(

                      checked={seleccionados.length===ok.length&&ok.length>0}

                    />
                  </th>
                  <th>Estado</th>
                  <th>Productor</th>
                  <th>Comprador</th>
                  <th>Especie</th>
                  <th>Campaña</th>
                  <th>CTG</th>
                  <th>Patente</th>
                  <th>Transportista</th>
                  <th>Kg Neto Salida</th>
                  <th>Kg Neto Llegada</th>
                  <th>Faltante</th>
                  <th>Factor</th>
                  <th>Contrato C.</th>
                  <th>Descarga</th>
                  <th>Calidad</th>

              </thead>

                      {r._estado==="OK"&&(
                        <input type="checkbox" checked={seleccionados.includes(i)} onChange={()=>toggleSel(i)}/>
                      )}
                    </td>
                    <td>
                      {r._estado==="OK"
                        ?<Badge label="OK" color="green"/>
                        :<div>
                          <Badge label="ERROR" color="red"/>
                          <div style={{marginTop:4}}>

                            ))}

                    <td style={{color:"#8890a8",fontSize:11}}>{r.comprador||"—"}</td>
                    <td>{r.especie}</td>
                    <td><span className="mono" style={{fontSize:11}}>{r.campana}</span></td>

                    <td><span className="mono" style={{fontSize:11}}>{r.patente_chasis||<span style={{color:"#e74c3c"}}>—</span>}</span></td>
                    <td style={{fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.transportista||<span style={{color:"#e74c3c"}}>—</span>}</td>
                    <td><span className="mono">{r._kg_neto_salida?.toLocaleString()||"—"}</span></td>
                    <td><span className="mono" style={{color:r._tiene_descarga?"#27ae60":"#565d7a"}}>{r._kg_neto_llegada?.toLocaleString()||"—"}</span></td>
                    <td>
                      {r._faltante>0
                        ?<span className="mono" style={{color:"#e74c3c"}}>-{r._faltante}</span>
                        :r._tiene_descarga?<span style={{color:"#27ae60"}}>✓</span>:"—"
                      }
                    </td>
                    <td>
                      {r.factor
                        ?<span className="mono" style={{color:"#9b59b6"}}>{r.factor}</span>
                        :"—"
                      }
                    </td>
                    <td><span className="mono" style={{fontSize:11,color:"#f5a623"}}>{r.contrato_compra||"Sin contrato"}</span></td>
                    <td>{r._tiene_descarga?<Badge label="Sí" color="green"/>:<Badge label="No" color="gray"/>}</td>
                    <td>{r._tiene_calidad?<Badge label="Sí" color="purple"/>:<Badge label="No" color="gray"/>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn variant="secondary" onClick={()=>{setPaso(1);setDatos([]);setSeleccionados([]);}}>← Volver</Btn>
            <Btn
              disabled={seleccionados.length===0||procesando}
              onClick={confirmarImport}
            >
              {procesando
                ? <span className="pulse">Importando...</span>
                : `Importar ${seleccionados.length} movimiento(s)`
              }
            </Btn>
          </div>
        </div>
      )}

      {/* PASO 3 — RESULTADO */}
      {paso===3&&(
        <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:60,marginBottom:16}}>✅</div>
          <div style={{fontWeight:700,fontSize:22,marginBottom:8}}>
            {seleccionados.length} movimiento(s) importados correctamente
          </div>
          <div style={{color:"#8890a8",fontSize:14,marginBottom:8}}>
            {datos.filter((_,i)=>seleccionados.includes(i)&&datos[i]._tiene_descarga).length} con descarga incluida
          </div>
          <div style={{color:"#9b59b6",fontSize:14,marginBottom:32}}>
            {datos.filter((_,i)=>seleccionados.includes(i)&&datos[i]._tiene_calidad).length} con calidad/factor incluido
          </div>
          {err.length>0&&(
            <div className="alert-danger" style={{maxWidth:400,margin:"0 auto 24px",textAlign:"left"}}>
              ⚠ {err.length} fila(s) no se importaron por errores. Corregí el Excel y volvé a importarlas.
            </div>
          )}
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <Btn variant="secondary" onClick={()=>{setPaso(1);setDatos([]);setSeleccionados([]);}}>
              Importar otro archivo
            </Btn>
            <Btn onClick={()=>alert("Ir a Movimientos")}>
              Ver Movimientos →
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
};

function App() {
  const [logueado,setLogueado]=useState(false);
  const [usuario,setUsuario]=useState("");
  const [modulo,setModulo]=useState("FORMAL");
  const [sec,setSec]=useState("dashboard");
  const [showAccesoOculto,setShowAccesoOculto]=useState(false);
  const [codigoOculto,setCodigoOculto]=useState("");
  const [informalUnlocked,setInformalUnlocked]=useState(false);

  if(!logueado) return <Login onLogin={(u)=>{setLogueado(true);setUsuario(u);}}/>;

  const handleAccesoOculto = () => {
    if(codigoOculto==="invdelsal"){
      setInformalUnlocked(true);
      setModulo("INFORMAL");
      setSec("dashboard");
      setShowAccesoOculto(false);
      setCodigoOculto("");
    } else {
      setCodigoOculto("");
      alert("Clave incorrecta");
    }
  };

  const menuActual = modulo==="FORMAL"?MENU_FORMAL:modulo==="INFORMAL"?MENU_INFORMAL:MENU_CONSOLIDADO;

  const render = () => {
    const p = {modulo};
    if (modulo === "CONSOLIDADO") {
      switch(sec){
        case "dashboard": return <DashboardConsolidado/>;
        case "stock": return <StockConsolidado/>;
        case "cc": return <CCConsolidada/>;
        case "posicion_abierta": return <PosicionAbierta modulo="CONSOLIDADO"/>;
        default: return <DashboardConsolidado/>;
      }
    }
    switch(sec){
      case "dashboard": return <Dashboard {...p}/>;
      case "contrapartes": return <Contrapartes {...p}/>;
      case "contratos": return <Contratos {...p}/>;
      case "movimientos": return <Movimientos {...p}/>;
      case "liquidaciones": return <Liquidaciones {...p}/>;
      case "cc": return <CuentaCorriente {...p}/>;
      case "stock": return <Stock/>;
      case "rep_fletes": return <ReporteFletes modulo={modulo}/>;
      case "rep_calidades": return <ReporteCalidades modulo={modulo}/>;
      case "posicion_abierta": return <PosicionAbierta modulo={modulo}/>;
      case "importador_excel": return <ImportadorExcel modulo={modulo}/>;
      case "configuracion": return <Configuracion/>;
      default: return <Dashboard {...p}/>;
    }
  };

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* SIDEBAR */}
      <div style={{width:215,background:"#1a1d27",borderRight:"1px solid #2a2d3e",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"18px 18px 14px",borderBottom:"1px solid #2a2d3e",position:"relative"}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:17,color:"#f5a623",letterSpacing:"-.02em"}}>GRANO<span style={{color:"#e8eaf0"}}>SYS</span></div>
          <div style={{fontSize:10,color:"#565d7a",marginTop:2,letterSpacing:".05em",textTransform:"uppercase"}}>Comercialización</div>
          {showAccesoOculto&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}
               onClick={e=>{if(e.target===e.currentTarget){setShowAccesoOculto(false);setCodigoOculto("");}}}>
              <div style={{background:"#1a1d27",border:"1px solid #2a2d3e",borderRadius:10,padding:"24px 28px",width:260}}>
                <input
                  type="password"
                  value={codigoOculto}
                  onChange={e=>setCodigoOculto(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")handleAccesoOculto();if(e.key==="Escape"){setShowAccesoOculto(false);setCodigoOculto("");}}}
                  placeholder="•"
                  autoFocus
                  style={{width:"100%",padding:"10px 14px",fontSize:18,textAlign:"center",letterSpacing:"0.3em"}}
                />
              </div>
            </div>
          )}
        </div>
        <div style={{padding:"10px 12px",borderBottom:"1px solid #2a2d3e"}}>
          <div style={{fontSize:10,color:"#565d7a",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Módulo</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {(() => {
              const modulos = [
                {id:"FORMAL",label:"📋 Formal",color:"#3498db"}
              ];
              if (informalUnlocked) {
                modulos.push({id:"INFORMAL",label:"📝 Informal",color:"#f5a623"});
                modulos.push({id:"CONSOLIDADO",label:"⊞ Consolidado",color:"#27ae60"});
              }
              return modulos.map(m=>(
                <button key={m.id} onClick={()=>{setModulo(m.id);setSec("dashboard");}} style={{
                  padding:"7px 10px",fontSize:12,fontWeight:600,borderRadius:6,
                  border:`1px solid ${modulo===m.id?m.color+"44":"#2a2d3e"}`,
                  cursor:"pointer",textAlign:"left",
                  background:modulo===m.id?m.color+"18":"transparent",
                  color:modulo===m.id?m.color:"#8890a8",
                  transition:"all .2s"
                }}>
                  {m.label}
                </button>
              ));
            })()}
          </div>
        </div>
        <nav style={{flex:1,padding:"8px 8px",overflowY:"auto"}}>
          {menuActual.map(item=>(
            <button key={item.id} onClick={()=>setSec(item.id)} className={`nav-btn ${sec===item.id?"active":""}`}>
              <span style={{fontSize:14}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </nav>
        <div style={{padding:"10px 16px",borderTop:"1px solid #2a2d3e"}}>
          <div style={{fontSize:10,color:"#565d7a",userSelect:"none"}}>
            v2.1.0 — GranoSYS - <span
              onDoubleClick={()=>setShowAccesoOculto(true)}
              style={{cursor:"default",color:"#565d7a"}}
            >INVDELSAL</span>
          </div>
        </div>
      </div>
      {/* MAIN */}
      <div style={{flex:1,overflow:"auto",padding:22,background:"#0f1117"}}>
        {render()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
