<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8eaf0;font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.5;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0f1117}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px}
.mono{font-family:'IBM Plex Mono',monospace}
input,select,textarea{background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;padding:8px 12px;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color 0.2s}
input:focus,select:focus{border-color:#f5a623}
input::placeholder{color:#565d7a}
select option{background:#1a1d27}
button{font-family:'IBM Plex Sans',sans-serif;cursor:pointer;border:none;transition:all 0.2s}
table{width:100%;border-collapse:collapse}
th{background:#0f1117;color:#8890a8;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:10px 14px;text-align:left;border-bottom:1px solid #2a2d3e;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #1e2133;font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.5s ease infinite}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:#8890a8;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:#e8eaf0}
.tab.active{color:#f5a623;border-bottom-color:#f5a623}
.tab-bar{display:flex;border-bottom:1px solid #2a2d3e;overflow-x:auto}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:stretch;justify-content:center;padding:0}
.modal{background:#1a1d27;border-left:1px solid #2a2d3e;border-right:1px solid #2a2d3e;width:100%;max-width:960px;height:100vh;display:flex;flex-direction:column;margin:0 auto;overflow:hidden;border-radius:0}
.modal-header{padding:14px 20px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#1a1d27;z-index:10}
.modal-body{padding:18px 20px 40px 20px;overflow-y:auto;flex:1;scroll-behavior:smooth}
.card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between}
.form-field{margin-bottom:11px}
.form-label{display:block;font-size:11px;font-weight:600;color:#8890a8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;align-items:start}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px;align-items:start}
.stat-card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;padding:18px 20px;position:relative;overflow:hidden}
.stat-top{position:absolute;top:0;left:0;right:0;height:2px;opacity:.6}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;margin-bottom:2px;background:transparent;color:#8890a8;border:1px solid transparent;font-size:13px;text-align:left;cursor:pointer;transition:all .15s}
.nav-btn:hover{color:#e8eaf0;background:rgba(255,255,255,.03)}
.nav-btn.active{background:rgba(245,166,35,.12);color:#f5a623;border-color:rgba(245,166,35,.2);font-weight:600}
.drop-zone{border:2px dashed #2a2d3e;border-radius:10px;padding:36px;text-align:center;cursor:pointer;transition:border-color .2s}
.drop-zone:hover{border-color:#f5a623}
.alert-info{padding:10px 14px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:6px;font-size:12px;color:#ffd280}
.alert-success{padding:10px 14px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:6px;font-size:12px;color:#27ae60}
.alert-danger{padding:10px 14px;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:6px;font-size:12px;color:#e74c3c}
.progress-bar{height:6px;background:#0f1117;border-radius:3px;overflow:hidden;min-width:60px}
.progress-fill{height:100%;border-radius:3px;background:#f5a623;transition:width .3s}
</style>

// ── API CONFIG ──
const API_URL = window.location.hostname === "localhost"
  ? "http://localhost:3000"
  : window.location.origin;

const api = {
  get: async (path) => {
    try {
      const r = await fetch(`${API_URL}${path}`);
      if (!r.ok) throw new Error(await r.text());
      return await r.json();
    } catch(e) {
      console.error("API GET error:", path, e);
      return null;
    }
  },
  post: async (path, data) => {
    try {
      const r = await fetch(`${API_URL}${path}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error(await r.text());
      return await r.json();
    } catch(e) {
      console.error("API POST error:", path, e);
      return null;
    }
  },
  put: async (path, data) => {
    try {
      const r = await fetch(`${API_URL}${path}`, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error(await r.text());
      return await r.json();
    } catch(e) {
      console.error("API PUT error:", path, e);
      return null;
    }
  }
};

// HELPERS
const Badge = ({label, color}) => {
  const colors = {
    green:{bg:"rgba(39,174,96,.15)",text:"#27ae60",border:"rgba(39,174,96,.3)"},
    red:{bg:"rgba(231,76,60,.15)",text:"#e74c3c",border:"rgba(231,76,60,.3)"},
    orange:{bg:"rgba(245,166,35,.15)",text:"#f5a623",border:"rgba(245,166,35,.3)"},
    blue:{bg:"rgba(52,152,219,.15)",text:"#3498db",border:"rgba(52,152,219,.3)"},
    purple:{bg:"rgba(155,89,182,.15)",text:"#9b59b6",border:"rgba(155,89,182,.3)"},
    gray:{bg:"rgba(136,144,168,.15)",text:"#8890a8",border:"rgba(136,144,168,.3)"},
  };
  const c = colors[color]||colors.gray;
  return <span className="badge" style={{background:c.bg,color:c.text,border:`1px solid ${c.border}`}}>{label}</span>;
};

const Btn = ({children,onClick,variant="primary",size="md",disabled=false,style={}}) => {
  const v = {
    primary:{background:"#f5a623",color:"#000",fontWeight:600},
    secondary:{background:"transparent",color:"#e8eaf0",border:"1px solid #2a2d3e"},
    ghost:{background:"transparent",color:"#8890a8"},
    danger:{background:"rgba(231,76,60,.15)",color:"#e74c3c",border:"1px solid rgba(231,76,60,.3)"},
    success:{background:"rgba(39,174,96,.15)",color:"#27ae60",border:"1px solid rgba(39,174,96,.3)"},
  };
  const s = {sm:{padding:"5px 12px",fontSize:12,borderRadius:5},md:{padding:"8px 16px",fontSize:13,borderRadius:6},lg:{padding:"11px 22px",fontSize:14,borderRadius:8}};
  return <button onClick={onClick} disabled={disabled} style={{...v[variant],...s[size],opacity:disabled?.4:1,display:"inline-flex",alignItems:"center",gap:6,fontWeight:500,...style}}>{children}</button>;
};

const Modal = ({title,onClose,children,width=600}) => (
  <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal fade-in" style={{maxWidth:width}}>
      <div className="modal-header">
        <span style={{fontWeight:600,fontSize:15}}>{title}</span>

const FF = ({label,children,required,span}) => (

    <div className="mono" style={{fontSize:24,fontWeight:700,color,letterSpacing:"-.02em"}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:"#565d7a",marginTop:4}}>{sub}</div>}
  </div>
);

// ── SELECTOR CON FLECHAS ──
const SelectorFlechas = ({opciones, value, onChange, label}) => {
  const idx = opciones.findIndex(o => (o.value||o) === value);
  const actual = opciones[idx] || opciones[0];
  const prev = () => onChange((opciones[Math.max(0, idx-1)].value || opciones[Math.max(0, idx-1)]));
  const next = () => onChange((opciones[Math.min(opciones.length-1, idx+1)].value || opciones[Math.min(opciones.length-1, idx+1)]));
  return (
    <div style={{display:"flex",alignItems:"center",gap:0,background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,overflow:"hidden"}}>
      <button onClick={prev} disabled={idx===0} style={{
        padding:"8px 12px",background:"transparent",border:"none",
        color:idx===0?"#2a2d3e":"#8890a8",cursor:idx===0?"default":"pointer",
        fontSize:14,borderRight:"1px solid #2a2d3e"
      }}>‹</button>
      <span style={{flex:1,textAlign:"center",padding:"8px 12px",fontSize:13,color:"#e8eaf0",fontWeight:500}}>
        {actual.label || actual}
      </span>
      <button onClick={next} disabled={idx===opciones.length-1} style={{
        padding:"8px 12px",background:"transparent",border:"none",
        color:idx===opciones.length-1?"#2a2d3e":"#8890a8",cursor:idx===opciones.length-1?"default":"pointer",
        fontSize:14,borderLeft:"1px solid #2a2d3e"
      }}>›</button>
    </div>
  );
};

// ── DASHBOARD ──
const Dashboard = ({modulo}) => {
  const contratos = mockContratos.filter(c=>c.modalidad===modulo);
  const [movsReal,setMovsReal]=useState(null);
  const movs = movsReal !== null ? movsReal : mockMovimientos.filter(m=>m.modalidad===modulo);

  useEffect(()=>{
    api.get(`/api/movimientos?modalidad=${modulo}`)
      .then(data=>{
        const mapped = data.map(m => ({
          id: m.id,
          numero: m.numero_movimiento,
          nro_ctg: m.nro_ctg,
          nro_cpe: m.nro_cpe,
          especie: m.especie_nombre || 'Soja',
          campana: m.campana_desc,
          contrato_compra: m.nro_contrato_compra,
          contrato_venta: m.nro_contrato_venta,
          productor: m.remitente_comercial_productor_nombre || m.titular_cpe_nombre,
          comprador: m.destinatario_nombre,
          peso_neto_salida: parseFloat(m.peso_neto_salida_kg) || 0,
          peso_neto_llegada: m.peso_neto_llegada_kg ? parseFloat(m.peso_neto_llegada_kg) : null,
          estado: m.estado,
          estado_liq: m.estado_liquidacion,
          kg_liquidables: m.kg_liquidables ? parseFloat(m.kg_liquidables) : null,
          modalidad: m.modalidad
        }));
        setMovsReal(mapped);
      })
      .catch(()=>setMovsReal(null));
  },[modulo]);
  const enTransito = movs.filter(m=>m.estado==="EN_TRANSITO").length;
  const aLiquidar = movs.filter(m=>m.estado==="DESCARGADO"&&m.estado_liq!=="LIQUIDADO").length;
  return (
    <div className="fade-in">
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Dashboard — {modulo==="FORMAL"?"Operaciones Formales":"Operaciones Informales"}</h2>
        <p style={{color:"#8890a8",fontSize:13}}>Resumen operativo</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
        <StatCard label="Contratos Activos" value={contratos.filter(c=>c.estado!=="CANCELADO").length} sub={`${contratos.filter(c=>c.tipo==="COMPRA").length} compra · ${contratos.filter(c=>c.tipo==="VENTA").length} venta`}/>
        <StatCard label="En Tránsito" value={enTransito} sub="camiones en ruta" color="#3498db"/>
        <StatCard label="A Liquidar" value={aLiquidar} sub="movimientos descargados" color="#27ae60"/>
        <StatCard label="A Fijar" value={contratos.filter(c=>c.tipo_precio==="A_FIJAR").length} sub="contratos sin precio" color="#9b59b6"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div className="card">
          <div className="card-header"><span style={{fontWeight:600,fontSize:14}}>Últimos Movimientos</span></div>
          <table><thead><tr><th>N° Mov</th>{modulo==="FORMAL"&&<th>CTG</th>}<th>Especie</th><th>Kg Neto</th><th>Estado</th></tr></thead>
          <tbody>{movs.slice(0,5).map(m=>(
            <tr key={m.id}>

        </div>
        <div className="card">
          <div className="card-header"><span style={{fontWeight:600,fontSize:14}}>Contratos Abiertos</span></div>
          <table><thead><tr><th>Número</th><th>Tipo</th><th>Especie</th><th>Progreso</th></tr></thead>
          <tbody>{contratos.filter(c=>c.estado!=="CUMPLIDO"&&c.estado!=="CANCELADO").map(c=>(
            <tr key={c.id}>
              <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{c.numero}</span></td>
              <td><Badge label={c.tipo} color={c.tipo==="COMPRA"?"orange":"blue"}/></td>
              <td>{c.especie}</td>
              <td>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div className="progress-bar" style={{flex:1}}><div className="progress-fill" style={{width:`${(c.asignadas/c.toneladas)*100}%`}}/></div>
                  <span className="mono" style={{fontSize:11,color:"#8890a8",minWidth:60}}>{c.asignadas}/{c.toneladas}tn</span>
                </div>
              </td>
            </tr>
          ))}</tbody></table>
        </div>
      </div>
    </div>
  );
};

// ── CONTRAPARTES ──
const Contrapartes = ({modulo}) => {
  const [showForm,setShowForm]=useState(false);
  const [search,setSearch]=useState("");
  const [lista,setLista]=useState([]);
  const [loading,setLoading]=useState(true);
  const [guardando,setGuardando]=useState(false);
  const [consultandoArca,setConsultandoArca]=useState(false);
  const [form,setForm]=useState({cuit:"",razon_social:"",es_productor:false,es_comprador:false,es_transportista:false,es_corredor:false,condicion_iva:"RI",provincia:"",localidad:"",telefono:"",email:"",domicilio:""});

  const consultarCuitEnArca = async () => {
    const cuitLimpio = form.cuit.replace(/[^0-9]/g, '');
    if (cuitLimpio.length !== 11) {
      alert("Por favor, ingresá un CUIT de 11 dígitos");
      return;
    }
    setConsultandoArca(true);
    try {
      const data = await api.get(`/api/contrapartes/consulta-arca/${cuitLimpio}`);
      if (data && data.razon_social) {
        setForm(prev => ({
          ...prev,
          cuit: data.cuit || prev.cuit,
          razon_social: data.razon_social || prev.razon_social,
          condicion_iva: data.condicion_iva || prev.condicion_iva,
          domicilio: data.domicilio || prev.domicilio,
          localidad: data.localidad || prev.localidad,
          provincia: data.provincia || prev.provincia
        }));
        alert("✓ Datos recuperados de ARCA exitosamente");
      }
    } catch (e) {
      console.error(e);
      alert(e.message || "Error al consultar en ARCA. Podés ingresar los datos manualmente.");
    } finally {
      setConsultandoArca(false);
    }
  };

  const cargarContrapartes = async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams();
      if (search) params.append("search",search);
      const url = `/api/contrapartes?${params.toString()}`;
      const data = await api.get(url);
      setLista(Array.isArray(data) ? data : []);
    } catch(e) {
      console.error("Error:", e);
      setLista([]);
    } finally {
      setLoading(false);
    }
  };

  useEffect(()=>{ cargarContrapartes(); }, [modulo, search]);
  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>{modulo==="FORMAL"?"Contrapartes Formales":"Contrapartes Informales"}</h2>
          <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>{modulo==="FORMAL"?"Con CUIT registrado en AFIP":"Identificación interna del sistema"}</p>
        </div>
        <Btn onClick={()=>setShowForm(true)}>+ Nueva Contraparte</Btn>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{padding:"12px 16px"}}>
          <input placeholder="Buscar por nombre o CUIT..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:360}}/>
        </div>
      </div>
      <div className="card">
        <table><thead><tr>
          <th>Código</th><th>CUIT</th><th>Razón Social</th><th>Rubros</th><th>Localidad</th><th>Provincia</th><th>Estado</th><th></th>
        </tr></thead>
        <tbody>
          {loading?(
            <tr><td colSpan={8} style={{textAlign:"center",padding:30,color:"#8890a8"}}>
              <span className="pulse">Cargando...</span>
            </td></tr>
          ):lista.length===0?(
            <tr><td colSpan={8} style={{textAlign:"center",padding:30,color:"#565d7a"}}>
              No hay contrapartes registradas. Usá "+ Nueva Contraparte" para agregar.
            </td></tr>
          ):lista.map(c=>(
            <tr key={c.id}>
              <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{c.codigo_interno}</span></td>
              <td><span className="mono" style={{fontSize:12}}>{c.cuit||"—"}</span></td>
              <td style={{fontWeight:500}}>{c.razon_social}</td>
              <td>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {(c.tipo_contraparte==="PRODUCTOR"||c.tipo_contraparte==="AMBOS")&&<Badge label="Productor" color="orange"/>}
                  {(c.tipo_contraparte==="COMPRADOR"||c.tipo_contraparte==="AMBOS")&&<Badge label="Comprador" color="blue"/>}
                  {c.tipo_contraparte==="TRANSPORTISTA"&&<Badge label="Transportista" color="green"/>}
                  {c.tipo_contraparte==="CORREDOR"&&<Badge label="Corredor" color="purple"/>}
                </div>
              </td>
              <td style={{color:"#8890a8",fontSize:12}}>{c.localidad||"—"}</td>
              <td style={{color:"#8890a8",fontSize:12}}>{c.provincia||"—"}</td>
              <td><Badge label={c.activo?"Activo":"Inactivo"} color={c.activo?"green":"gray"}/></td>
              <td style={{display:"flex",gap:6}}>
                <Btn variant="ghost" size="sm" onClick={()=>{
                   setForm({
                     cuit:c.cuit||"",
                     razon_social:c.razon_social||"",
                     es_productor:c.tipo_contraparte==="PRODUCTOR"||c.tipo_contraparte==="AMBOS",
                     es_comprador:c.tipo_contraparte==="COMPRADOR"||c.tipo_contraparte==="AMBOS",
                     es_transportista:c.tipo_contraparte==="TRANSPORTISTA",
                     es_corredor:c.tipo_contraparte==="CORREDOR",
                     condicion_iva:c.condicion_iva||"RI",
                     provincia:c.provincia||"",
                     localidad:c.localidad||"",
                     telefono:c.telefono||"",
                     email:c.email||"",
                     domicilio:c.domicilio||"",
                     _id:c.id,
                     _editando:true,
                   });
                   setShowForm(true);
                }}>Editar</Btn>
                <Btn variant="danger" size="sm" onClick={async()=>{
                  if(!confirm(`¿Eliminar ${c.razon_social}?`)) return;
                  try {
                    await fetch(`/api/contrapartes/${c.id}`, {method:"DELETE"});
                    cargarContrapartes();
                  } catch(e) {
                    alert("Error al eliminar: "+e.message);
                  }
                }}>✕</Btn>
              </td>
            </tr>
          ))
        }</tbody></table>
      </div>
      {showForm&&(
        <Modal title={form._editando?`Editar Contraparte`:`Nueva Contraparte`} onClose={()=>setShowForm(false)} width={860}>
          <div className="form-grid-2">
            <FF label="CUIT" required>
              <div style={{display:"flex",gap:8}}>
                <input 
                  placeholder="20-12345678-9" 
                  value={form.cuit} 
                  disabled={consultandoArca}
                  onChange={e=>setForm({...form,cuit:e.target.value})}
                  style={{flex:1}}
                />
                <Btn 
                  type="button" 
                  disabled={consultandoArca || !form.cuit} 
                  onClick={consultarCuitEnArca}
                  style={{flexShrink:0,background:"#27ae60",color:"#000",fontWeight:600}}
                >
                  {consultandoArca ? "Consultando..." : "Consultar ARCA"}
                </Btn>
              </div>
            </FF>
            <FF label="Razón Social / Nombre" required><input placeholder="Nombre completo o razón social" value={form.razon_social} onChange={e=>setForm({...form,razon_social:e.target.value})}/></FF>
            <div className="form-field" style={{gridColumn:"span 2"}}>
              <label className="form-label">Rubros <span style={{color:"#f5a623",marginLeft:3}}>*</span></label>
              <div style={{display:"flex",gap:16,padding:"10px 14px",background:"#0f1117",borderRadius:6,border:"1px solid #2a2d3e",flexWrap:"wrap"}}>
                {[
                  {key:"es_productor", label:"Productor / Vendedor", desc:"Nos vende mercadería", color:"#f5a623"},
                  {key:"es_comprador", label:"Comprador", desc:"Le vendemos mercadería", color:"#3498db"},
                  {key:"es_transportista", label:"Transportista", desc:"Hace fletes", color:"#27ae60"},
                  {key:"es_corredor", label:"Corredor", desc:"Interviene en operaciones", color:"#9b59b6"},
                ].map(r=>(
                  <label key={r.key} style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer",padding:"8px 12px",borderRadius:6,border:`1px solid ${form[r.key]?r.color+"44":"#2a2d3e"}`,background:form[r.key]?r.color+"11":"transparent",flex:1,minWidth:150}}>
                    <input
                      type="checkbox"
                      checked={!!form[r.key]}
                      onChange={e=>setForm({...form,[r.key]:e.target.checked})}
                      style={{marginTop:2,accentColor:r.color,width:16,height:16,flexShrink:0}}
                    />
                    <div>
                      <div style={{fontWeight:600,fontSize:13,color:form[r.key]?r.color:"#e8eaf0"}}>{r.label}</div>
                      <div style={{fontSize:11,color:"#8890a8",marginTop:2}}>{r.desc}</div>
                    </div>
                  </label>
                ))}
              </div>
            </div>
            <FF label="Domicilio / Dirección"><input placeholder="Calle, número, piso, depto" value={form.domicilio} onChange={e=>setForm({...form,domicilio:e.target.value})}/></FF>
            <FF label="Condición IVA"><select value={form.condicion_iva} onChange={e=>setForm({...form,condicion_iva:e.target.value})}><option value="RI">Responsable Inscripto</option><option value="MONO">Monotributo</option><option value="EXENTO">Exento</option></select></FF>
            <FF label="Provincia"><select value={form.provincia} onChange={e=>setForm({...form,provincia:e.target.value})}><option value="">Seleccionar...</option>{PROVINCIAS.map(p=><option key={p} value={p}>{p}</option>)}</select></FF>
            <FF label="Localidad"><input placeholder="Ciudad / Localidad" value={form.localidad} onChange={e=>setForm({...form,localidad:e.target.value})}/></FF>
            <FF label="Teléfono"><input placeholder="Teléfono" value={form.telefono} onChange={e=>setForm({...form,telefono:e.target.value})}/></FF>
            <FF label="Email"><input placeholder="correo@ejemplo.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></FF>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
            <Btn variant="secondary" onClick={()=>setShowForm(false)}>Cancelar</Btn>
            <Btn disabled={guardando} onClick={async()=>{
              if(!form.cuit){alert("El CUIT es obligatorio");return;}
              if(!form.razon_social){alert("La razón social es obligatoria");return;}
              if(!form.es_productor&&!form.es_comprador&&!form.es_transportista&&!form.es_corredor){
                alert("Seleccioná al menos un rubro");return;
              }
              setGuardando(true);
              try {
                const rubros = [];
                if(form.es_productor) rubros.push("PRODUCTOR");
                if(form.es_comprador) rubros.push("COMPRADOR");
                if(form.es_transportista) rubros.push("TRANSPORTISTA");
                if(form.es_corredor) rubros.push("CORREDOR");
                const tipo = rubros.length>1?"AMBOS":rubros[0];
                const datos = {
                  cuit: form.cuit,
                  razon_social: form.razon_social,
                  tipo_contraparte: tipo,
                  canal_operacion: "AMBOS",
                  condicion_iva: form.condicion_iva||null,
                  domicilio: form.domicilio||null,
                  localidad: form.localidad||null,
                  provincia: form.provincia||null,
                  telefono: form.telefono||null,
                  email: form.email||null,
                };
                if(form._editando && form._id) {
                  await api.put(`/api/contrapartes/${form._id}`, datos);
                  alert("✓ Contraparte actualizada");
                } else {
                  await api.post("/api/contrapartes", datos);
                  alert("✓ Contraparte guardada");
                }
                setShowForm(false);
                setForm({cuit:"",razon_social:"",es_productor:false,es_comprador:false,es_transportista:false,es_corredor:false,condicion_iva:"RI",provincia:"",localidad:"",telefono:"",email:"",domicilio:"",_id:null,_editando:false});
                cargarContrapartes();
              } catch(e) {
                alert("Error: "+e.message);
              } finally {
                setGuardando(false);
              }
            }}>{guardando?"Guardando...":(form._editando?"Actualizar":"Guardar")}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ── CONTRATOS ──
const Contratos = ({modulo}) => {
  const [tab,setTab]=useState("COMPRA");
  const [showForm,setShowForm]=useState(false);
  const [lista,setLista]=useState([]);
  const [contrapartes,setContrapartes]=useState([]);
  const [especies,setEspecies]=useState(ESPECIES.map((n,i)=>({id:i+1,nombre:n})));
  const [campanas,setCampanas]=useState(CAMPANAS.map((d,i)=>({id:i+1,descripcion:d})));
  const [guardando,setGuardando]=useState(false);
  const [form,setForm]=useState({tipo:"COMPRA",especie:"Soja",id_especie:1,campana:"2024/2025",id_campana:2,id_contraparte:"",tipo_precio:"PRECIO_HECHO",moneda:"PESOS",precio:"",diferencial:"",tipo_diferencial:"ARS",referencia:"MATBA_ROFEX",toneladas:"",tipo_entrega:"A_RETIRAR",tipo_liq:"INCISO_A",forma_pago:"TRANSFERENCIA",plazo:"0",precio_venta_est:"",flete_est:"",destino_est:""});
  const [selectedContract, setSelectedContract] = useState(null);

  const abrirDetalleContrato = async (c) => {
    try {
      const data = await api.get(`/api/contratos/${c.id}`);
      setSelectedContract({
        ...c,
        movimientos: data.movimientos || []
      });
    } catch(err) {
      alert("Error al cargar detalles: " + err.message);
    }
  };

  const abrirEditarContrato = async (c) => {
    try {
      const checkLiqs = await api.get(`/api/liquidaciones?modalidad=${modulo}`);
      const hasLiq = checkLiqs.some(l => l.id_contrato === c.id);
      if (hasLiq) {
        alert("⚠️ No se puede modificar este contrato porque ya tiene liquidaciones asociadas.");
        return;
      }
    } catch(err) {
      console.error(err);
    }

    setForm({
      tipo: c.tipo_contrato || "COMPRA",
      id_especie: c.id_especie || 1,
      id_campana: c.id_campana || 2,
      id_contraparte: c.id_contraparte || "",
      tipo_precio: c.tipo_precio || "PRECIO_HECHO",
      moneda: c.moneda || "PESOS",
      precio: c.precio_pactado || "",
      diferencial: c.diferencial_fijacion || "",
      tipo_diferencial: c.tipo_diferencial || "ARS",
      referencia: c.referencia_fijacion || "MATBA_ROFEX",
      toneladas: c.toneladas || "",
      tipo_entrega: c.tipo_entrega || "A_RETIRAR",
      tipo_liq: c.tipo_liq || "INCISO_A",
      forma_pago: c.forma_pago || "TRANSFERENCIA",
      plazo: c.plazo_pago_dias || "0",
      precio_venta_est: c.precio_venta_estimado || "",
      flete_est: c.flete_estimado || "",
      destino_est: c.destino_venta_estimado || "",
      aplica_cpe: !!c.aplica_cpe,
      costo_cpe: c.costo_cpe_pct || "",
      costo_financiero: c.costo_financiero_pct || "",
      comprador_estimado_id: c.comprador_estimado_id || "",
      _id: c.id,
      _editando: true
    });
    setShowForm(true);
  };

  const eliminarContrato = async (c) => {
    try {
      const data = await api.get(`/api/contratos/${c.id}`);
      if (data.movimientos && data.movimientos.length > 0) {
        alert(`⚠️ No se puede eliminar este contrato porque tiene ${data.movimientos.length} camiones/movimientos asociados.`);
        return;
      }
    } catch(err) {
      console.error(err);
    }

    if (!confirm(`¿Eliminar contrato ${c.numero}?`)) return;
    try {
      await api.delete(`/api/contratos/${c.id}`);
      alert("✓ Contrato eliminado correctamente");
      cargarContratos();
    } catch(err) {
      alert("Error al eliminar: " + (err.response?.data?.error || err.message));
    }
  };

  useEffect(()=>{
    cargarContratos();
    cargarContrapartes();
    cargarEspecies();
    cargarCampanas();
  },[modulo,tab]);

  const cargarContratos = async () => {
    try {
      const data = await api.get(`/api/contratos?modalidad=${modulo}&tipo=${tab}`);
      const mapped = data.map(c => ({
        ...c,
        id: c.id,
        numero: c.numero_contrato,
        fecha: c.fecha_contrato ? c.fecha_contrato.split('T')[0] : '',
        contraparte: c.contraparte_nombre,
        especie: c.especie_nombre,
        campana: c.campana_desc,
        toneladas: parseFloat(c.cantidad_toneladas_pactadas) || 0,
        asignadas: parseFloat(c.cantidad_toneladas_asignadas) || 0,
        tipo_precio: c.tipo_precio,
        precio: c.precio_pactado ? parseFloat(c.precio_pactado) : null,
        moneda: c.moneda,
        tipo_entrega: c.tipo_entrega,
        estado: c.estado,
        tipo_liq: c.tipo_liquidacion,
        tipo: c.tipo_contrato
      }));
      setLista(mapped);
    } catch(e) {
      setLista(mockContratos.filter(c=>c.modalidad===modulo&&c.tipo===tab));
    }
  };

  const cargarContrapartes = async () => {
    try {
      const data = await api.get(`/api/contrapartes?modalidad=${modulo}`);
      const mapped = data.map(c => ({
        ...c,
        tipo: c.tipo_contraparte || c.tipo,
        tipo_contraparte: c.tipo_contraparte || c.tipo,
        codigo: c.codigo_interno || c.codigo,
        codigo_interno: c.codigo_interno || c.codigo
      }));
      setContrapartes(mapped);
    } catch(e) {
      const mappedMock = mockContrapartes.map(c => ({
        ...c,
        tipo: c.tipo_contraparte || c.tipo,
        tipo_contraparte: c.tipo_contraparte || c.tipo,
        codigo: c.codigo_interno || c.codigo,
        codigo_interno: c.codigo_interno || c.codigo
      }));
      setContrapartes(mappedMock);
    }
  };

  const cargarEspecies = async () => {
    try {
      const data = await api.get("/api/especies");
      if(data.length>0) setEspecies(data);
    } catch(e) {}
  };

  const cargarCampanas = async () => {
    try {
      const data = await api.get("/api/campanas");
      if(data.length>0) setCampanas(data);
    } catch(e) {}
  };
  const estadoColor = e=>({EN_CURSO:"green",CONFIRMADO:"blue",CUMPLIDO:"gray",CANCELADO:"red",BORRADOR:"gray"}[e]||"gray");
  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Contratos {modulo==="FORMAL"?"Formales":"Informales"}</h2>
        <Btn onClick={()=>{
          setForm({tipo:"COMPRA",especie:"Soja",id_especie:1,campana:"2024/2025",id_campana:2,id_contraparte:"",tipo_precio:"PRECIO_HECHO",moneda:"PESOS",precio:"",diferencial:"",tipo_diferencial:"ARS",referencia:"MATBA_ROFEX",toneladas:"",tipo_entrega:"A_RETIRAR",tipo_liq:"INCISO_A",forma_pago:"TRANSFERENCIA",plazo:"0",precio_venta_est:"",flete_est:"",destino_est:"",_editando:false,_id:null});
          setShowForm(true);
        }}>+ Nuevo Contrato</Btn>
      </div>
      <div className="tab-bar" style={{marginBottom:16}}>
        {["COMPRA","VENTA","CANJE"].map(t=><button key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)}>{t==="COMPRA"?"Compras":t==="VENTA"?"Ventas":"Canjes"}</button>)}
      </div>
      <div className="card">
        <table><thead><tr>
          <th>Número</th><th>Fecha</th><th>Contraparte</th><th>Especie</th><th>Campaña</th><th>Tn Pact.</th><th>Cumplimiento</th><th>Precio</th>{modulo==="FORMAL"&&<th>Inc.</th>}<th>Estado</th><th></th>
        </tr></thead>
        <tbody>{lista.map(c=>(
          <tr key={c.id}>
            <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{c.numero}</span></td>
            <td style={{color:"#8890a8",fontSize:12}}>{c.fecha}</td>
            <td style={{fontWeight:500,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.contraparte}</td>
            <td>{c.especie}</td>
            <td><span className="mono" style={{fontSize:11}}>{c.campana}</span></td>
            <td><span className="mono">{c.toneladas} tn</span></td>
            <td>

const Movimientos = ({modulo}) => {
  const [showForm,setShowForm]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [showRapido,setShowRapido]=useState(false);
  const [selected,setSelected]=useState(null);
  const [tab,setTab]=useState("salida");
  const [importing,setImporting]=useState(false);
  const [importResult,setImportResult]=useState(null);
  const [showImportTicket, setShowImportTicket] = useState(false);
  const [ticketResult, setTicketResult] = useState(null);
  const [importingTicket, setImportingTicket] = useState(false);
  const [mappings, setMappings] = useState([]);
  const [showImportExcel, setShowImportExcel] = useState(false);
  const [excelRows, setExcelRows] = useState([]);
  const [importingExcel, setImportingExcel] = useState(false);
  const [excelFileName, setExcelFileName] = useState("");
  const [movsReal,setMovsReal]=useState(null);
  const movs = movsReal !== null ? movsReal : mockMovimientos.filter(m=>m.modalidad===modulo);
  const [contratosReal,setContratosReal]=useState(null);
  const contratos = contratosReal !== null ? contratosReal : mockContratos.filter(c=>c.modalidad===modulo);
  const [contrapartesReal, setContrapartesReal] = useState(null);
  const contrapartes = (contrapartesReal !== null ? contrapartesReal : mockContrapartes).map(c => ({
    ...c,
    tipo: c.tipo_contraparte || c.tipo,
    tipo_contraparte: c.tipo_contraparte || c.tipo,
    codigo: c.codigo_interno || c.codigo,
    codigo_interno: c.codigo_interno || c.codigo
  }));
  const [tempFactor, setTempFactor] = useState(null);

  // Estados locales para persistencia de llegada
  const [brutoLlegada, setBrutoLlegada] = useState(null);
  const [taraLlegada, setTaraLlegada] = useState(null);
  const [humedadLlegada, setHumedadLlegada] = useState(null);
  const [fechaArribo, setFechaArribo] = useState("");
  const [fechaDescarga, setFechaDescarga] = useState("");
  const [nroTurno, setNroTurno] = useState("");
  const [mermas, setMermas] = useState({});

  const formatDateTimeLocal = (isoString) => {
    if (!isoString) return "";
    try {
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return "";
      const offset = d.getTimezoneOffset() * 60000;
      return (new Date(d.getTime() - offset)).toISOString().slice(0, 16);
    } catch(e) {
      return "";
    }
  };

  const openModal = (m) => {
    setSelected(m);
    setTempFactor(m.factor);
    setBrutoLlegada(m.peso_bruto_llegada);
    setTaraLlegada(m.peso_tara_llegada);
    setHumedadLlegada(m.humedad_llegada);
    setFechaArribo(formatDateTimeLocal(m.fecha_arribo));
    setFechaDescarga(formatDateTimeLocal(m.fecha_descarga));
    setNroTurno(m.nro_turno || "");
    setTab("salida");
    setShowForm(true);
  };

  const cargarContrapartes = async () => {
    try {
      const data = await api.get("/api/contrapartes");
      setContrapartesReal(data);
    } catch(e) {
      setContrapartesReal(null);
    }
  };

  const cargarContratos = async () => {
    try {
      const data = await api.get(`/api/contratos?modulo=${modulo}`); // Corregido el parámetro de query
      const mapped = data.map(c => ({
        id: c.id,
        numero: c.numero_contrato,
        fecha: c.fecha_contrato ? c.fecha_contrato.split('T')[0] : '',
        contraparte: c.contraparte_nombre,
        especie: c.especie_nombre,
        campana: c.campana_desc,
        toneladas: parseFloat(c.cantidad_toneladas_pactadas) || 0,
        asignadas: parseFloat(c.cantidad_toneladas_asignadas) || 0,
        tipo_precio: c.tipo_precio,
        precio: c.precio_pactado ? parseFloat(c.precio_pactado) : null,

  const getMermaHumedadPct = (idEspecie, humedad) => {
    if (!humedad || humedad <= 0) return 0;
    
    let base = 13.5; // Soja
    if (idEspecie === 2) base = 14.0; // Trigo
    else if (idEspecie === 3) base = 14.5; // Maíz
    else if (idEspecie === 4) base = 11.0; // Girasol
    
    if (humedad <= base) return 0;
    
    const key = `${idEspecie}-${parseFloat(humedad).toFixed(1)}`;
    if (mermas[key] !== undefined) {
      return mermas[key];
    }
    
    const roundedHum = Math.round(humedad * 10) / 10;
    if (roundedHum > 25.0) {
      const maxKey = `${idEspecie}-25.0`;
      const maxMerma = mermas[maxKey] || 0;
      return maxMerma + (roundedHum - 25.0) * 1.15;
    }

        const wsName = wb.SheetNames[0];
        const ws = wb.Sheets[wsName];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
        
        if (rows.length < 2) {
          alert("El archivo Excel está vacío o no contiene el formato de columnas requerido.");
          setImportingExcel(false);
          return;
        }
        
        // Find headers
        const headers = rows[0].map(h => String(h).trim().toLowerCase());
        const colMap = {
          remitente: headers.findIndex(h => h.includes("remitente") || h.includes("productor") || h.includes("origen")),
          comprador: headers.findIndex(h => h.includes("comprador") || h.includes("destinatario")),

          chofer: headers.findIndex(h => h.includes("chofer") || h.includes("conductor")),
          lugar: headers.findIndex(h => h.includes("lugar") || h.includes("destino") || h.includes("entrega")),

          bruto_salida: headers.findIndex(h => h.includes("bruto carga") || h.includes("bruto salida")),
          tara_salida: headers.findIndex(h => h.includes("tara carga") || h.includes("tara salida")),
          neto_salida: headers.findIndex(h => h.includes("kilos") || h.includes("neto carga") || h.includes("neto salida")),
          humedad_salida: headers.findIndex(h => h.includes("humedad carga") || h.includes("humedad salida") || h.includes("h° carga")),
          
          // Arrival (Descarga)
          bruto_llegada: headers.findIndex(h => h.includes("bruto descarga") || h.includes("bruto llegada")),
          tara_llegada: headers.findIndex(h => h.includes("tara descarga") || h.includes("tara llegada")),
          humedad_llegada: headers.findIndex(h => h.includes("humedad descarga") || h.includes("humedad llegada") || h.includes("h° descarga")),
          
          // Quality (Calidad)
          factor: headers.findIndex(h => h.includes("factor") || h.includes("coeficiente") || h.includes("calidad"))
        };
        
        if (colMap.remitente === -1 || colMap.comprador === -1 || colMap.patente === -1) {
          alert("No se pudieron encontrar los encabezados obligatorios (Remitente/Productor, Comprador/Destinatario, Patente Chasis). Verifique la primera fila.");
          setImportingExcel(false);
          return;
        }
        
        const parsedRows = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r || r.every(c => c === "")) continue;
          
          // Parse cargo weights
          let brutoSalida = colMap.bruto_salida !== -1 ? parseFloat(String(r[colMap.bruto_salida]).replace(/[^\d.-]/g, '')) || 0 : 0;
          let taraSalida = colMap.tara_salida !== -1 ? parseFloat(String(r[colMap.tara_salida]).replace(/[^\d.-]/g, '')) || 0 : 0;
          let netoSalida = brutoSalida - taraSalida;
          
          // Fallback to "Kilos" or single net weight column
          if (brutoSalida === 0 && colMap.neto_salida !== -1) {
            brutoSalida = parseFloat(String(r[colMap.neto_salida]).replace(/[^\d.-]/g, '')) || 0;
            taraSalida = 0;
            netoSalida = brutoSalida;
          }
          
          // Parse discharge weights
          const brutoLlegada = colMap.bruto_llegada !== -1 && String(r[colMap.bruto_llegada]).trim() !== "" ? parseFloat(String(r[colMap.bruto_llegada]).replace(/[^\d.-]/g, '')) || null : null;
          const taraLlegada = colMap.tara_llegada !== -1 && String(r[colMap.tara_llegada]).trim() !== "" ? parseFloat(String(r[colMap.tara_llegada]).replace(/[^\d.-]/g, '')) || null : null;
          let netoLlegada = null;
          if (brutoLlegada !== null && taraLlegada !== null && !isNaN(brutoLlegada) && !isNaN(taraLlegada)) {
            netoLlegada = brutoLlegada - taraLlegada;
          }
          
          // Parse quality factor
          let factor = colMap.factor !== -1 && String(r[colMap.factor]).trim() !== "" ? parseFloat(String(r[colMap.factor]).replace(/[^\d.-]/g, '')) || null : null;
          if (factor !== null && factor > 1) {
            factor = factor / 100;
          }
          
          const parsed = {
            remitente: String(r[colMap.remitente] || "").trim(),
            comprador: String(r[colMap.comprador] || "").trim(),
            especie: colMap.especie !== -1 && String(r[colMap.especie]).trim() !== "" ? String(r[colMap.especie] || "").trim() : "Soja",
            campana: colMap.campana !== -1 && String(r[colMap.campana]).trim() !== "" ? String(r[colMap.campana] || "").trim() : "2024/2025",
            patente: String(r[colMap.patente] || "").trim(),
            acoplado: colMap.acoplado !== -1 ? String(r[colMap.acoplado] || "").trim() : "",
            chofer: colMap.chofer !== -1 ? String(r[colMap.chofer] || "").trim() : "",
            lugar: colMap.lugar !== -1 ? String(r[colMap.lugar] || "").trim() : "",
            
            // Weights
            bruto_salida: brutoSalida,
            tara_salida: taraSalida,
            neto_salida: netoSalida,
            humedad_salida: colMap.humedad_salida !== -1 && String(r[colMap.humedad_salida]).trim() !== "" ? parseFloat(String(r[colMap.humedad_salida]).replace(/[^\d.-]/g, '')) || null : null,
            
            // Arrival / Discharge
            bruto_llegada: brutoLlegada,
            tara_llegada: taraLlegada,
            neto_llegada: netoLlegada,
            humedad_llegada: colMap.humedad_llegada !== -1 && String(r[colMap.humedad_llegada]).trim() !== "" ? parseFloat(String(r[colMap.humedad_llegada]).replace(/[^\d.-]/g, '')) || null : null,
            
            // Factor
            factor: factor,
            _index: i + 1
          };
          
          parsedRows.push(parsed);
        }
        
        setExcelRows(parsedRows);
      } catch (err) {
        alert("Error al procesar el archivo Excel: " + err.message);

      </div>

      {/* POR PRODUCTOR */}
      {Object.values(porProductor).map(prod => {
        const tnTotal = prod.items.reduce((a,s)=>a+s.tn_total,0);
        const tnConContrato = prod.items.reduce((a,s)=>a+s.con_contrato.reduce((b,c)=>b+c.tn,0),0);
        const tnSinContrato = prod.items.reduce((a,s)=>a+s.sin_contrato,0);
        const key = prod.productor;
        const isOpen = expandido[key];

        return (
          <div key={key} className="card" style={{marginBottom:14}}>
            {/* CABECERA PRODUCTOR */}
            <div
              onClick={()=>toggle(key)}
              style={{padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:isOpen?"1px solid #2a2d3e":"none"}}
            >
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <span style={{color:"#565d7a",fontSize:16}}>{isOpen?"▼":"▶"}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{prod.productor}</div>
                  <div style={{fontSize:12,color:"#8890a8",marginTop:2}}>{prod.cuit||"Informal"}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:24,alignItems:"center"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#8890a8",textTransform:"uppercase",letterSpacing:".06em"}}>Total</div>
                  <div className="mono" style={{fontWeight:700,fontSize:18,color:"#e8eaf0"}}>{tnTotal.toFixed(3)} tn</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#8890a8",textTransform:"uppercase",letterSpacing:".06em"}}>Con Contrato</div>
                  <div className="mono" style={{fontWeight:700,fontSize:16,color:"#27ae60"}}>{tnConContrato.toFixed(3)} tn</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#8890a8",textTransform:"uppercase",letterSpacing:".06em"}}>Sin Contrato</div>
                  <div className="mono" style={{fontWeight:700,fontSize:16,color:tnSinContrato>0?"#9b59b6":"#565d7a"}}>{tnSinContrato.toFixed(3)} tn</div>
                </div>
              </div>
            </div>

            {/* DETALLE EXPANDIDO */}
            {isOpen && (
              <div style={{padding:"0 0 4px 0"}}>
                {prod.items.map((s,idx) => (
                  <div key={idx}>
                    {/* FILA ESPECIE */}
                    <div style={{padding:"10px 18px 6px 18px",background:"rgba(255,255,255,.02)",borderBottom:"1px solid #1e2133",display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontWeight:600,fontSize:13,minWidth:60}}>{s.especie}</span>
                      <span className="mono" style={{fontSize:11,color:"#565d7a"}}>{s.campana}</span>
                      <span style={{fontSize:12,color:"#8890a8"}}>{s.ubicacion}</span>
                      <span className="mono" style={{marginLeft:"auto",fontWeight:700,color:"#f5a623"}}>{s.tn_total.toFixed(3)} tn total</span>
                    </div>

                    {/* CON CONTRATO */}
                    {s.con_contrato.length > 0 && s.con_contrato.map((cc,ci) => (
                      <div key={ci} style={{padding:"8px 18px 8px 40px",borderBottom:"1px solid #1a1d27",display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:"#27ae60",flexShrink:0}}/>
                        <span style={{fontSize:12,color:"#27ae60",fontWeight:600,minWidth:80}}>Con contrato</span>
                        <span className="mono" style={{fontSize:12,color:"#f5a623"}}>{cc.contrato}</span>
                        <span className="mono" style={{fontSize:12}}>{cc.tn.toFixed(3)} tn</span>
                        <span style={{fontSize:12,color:"#8890a8"}}>
                          {cc.tipo==="A_FIJAR"
                            ? <Badge label="A FIJAR" color="purple"/>
                            : `$ ${cc.precio?.toLocaleString()} ${cc.moneda==="PESOS"?"$":cc.moneda==="DOLARES"?"USD":"USD Bill."}`
                          }
                        </span>
                        <Badge label={cc.estado} color={cc.estado==="EN_CURSO"?"green":"blue"} />
                      </div>
                    ))}

                    {/* SIN CONTRATO */}
                    {s.sin_contrato > 0 && (
                      <div style={{padding:"8px 18px 8px 40px",borderBottom:"1px solid #1a1d27",display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:"#9b59b6",flexShrink:0}}/>
                        <span style={{fontSize:12,color:"#9b59b6",fontWeight:600,minWidth:80}}>Sin contrato</span>
                        <span className="mono" style={{fontSize:12}}>{s.sin_contrato.toFixed(3)} tn</span>
                        <Badge label="POSICIÓN ABIERTA" color="purple"/>
                        <Badge label="A FIJAR" color="purple"/>
                        <Btn variant="ghost" size="sm" onClick={()=>alert("Ir a Posición Abierta para asignar contrato")}>
                          Asignar contrato →
                        </Btn>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ── COMPONENTE FILTRO COLUMNA ──
const FiltroColumna = ({values, value, onChange, tipo="select", placeholder=""}) => {
  const unicos = [...new Set(values.filter(Boolean))].sort();
  if (tipo === "text") return (
    <input
      value={value} onChange={e=>onChange(e.target.value)}
      placeholder={placeholder||"Filtrar..."}
      style={{width:"100%",padding:"3px 6px",fontSize:11,background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:4,color:"#e8eaf0",marginTop:3}}
    />
  );
  return (
    <select
      value={value} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",padding:"3px 4px",fontSize:11,background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:4,color:"#e8eaf0",marginTop:3}}
    >
      <option value="">Todos</option>
      {unicos.map(v=><option key={v} value={v}>{v}</option>)}
    </select>
  );
};

// ── REPORTE FLETES ──
const ReporteFletes = ({modulo}) => {
  const [seleccionados, setSeleccionados] = useState([]);
  const [tarifaMasiva, setTarifaMasiva] = useState("");
  const [showPreliq, setShowPreliq] = useState(false);
  const [orden, setOrden] = useState({col:"numero", dir:"asc"});
  const [filtros, setFiltros] = useState({
    numero:"", especie:"", productor:"", comprador:"",
    origen:"", destino:"", transportista:"", chofer:"",
    patente_chasis:"", tarifa_real:"", calidad:"", estado_liq:""
  });

  const setFiltro = (k,v) => setFiltros(prev=>({...prev,[k]:v}));
  const limpiarFiltros = () => setFiltros({numero:"",especie:"",productor:"",comprador:"",origen:"",destino:"",transportista:"",chofer:"",patente_chasis:"",tarifa_real:"",calidad:"",estado_liq:""});
  const toggleOrden = (col) => setOrden(prev=>({col, dir: prev.col===col && prev.dir==="asc"?"desc":"asc"}));
  const iconOrden = (col) => orden.col===col?(orden.dir==="asc"?"↑":"↓"):"↕";

  const todosMovs = mockMovimientos.filter(m=>m.modalidad===modulo);

  const movsFiltrados = todosMovs
    .filter(m=>!filtros.numero||m.numero?.toLowerCase().includes(filtros.numero.toLowerCase()))
    .filter(m=>!filtros.especie||m.especie===filtros.especie)
    .filter(m=>!filtros.productor||m.productor===filtros.productor)
    .filter(m=>!filtros.origen||m.origen?.toLowerCase().includes(filtros.origen.toLowerCase()))
    .filter(m=>!filtros.destino||m.destino?.toLowerCase().includes(filtros.destino.toLowerCase()))
    .filter(m=>!filtros.transportista||m.transportista===filtros.transportista)
    .filter(m=>!filtros.chofer||m.chofer===filtros.chofer)
    .filter(m=>!filtros.patente_chasis||m.patente_chasis===filtros.patente_chasis)
    .filter(m=>!filtros.tarifa_real||String(m.tarifa_real)===filtros.tarifa_real)
    .filter(m=>!filtros.calidad||(filtros.calidad==="OK"?m.factor!==null:m.factor===null))
    .filter(m=>!filtros.estado_liq||m.estado_liq===filtros.estado_liq)
    .sort((a,b)=>{
      let va=a[orden.col]??"", vb=b[orden.col]??"";
      if(typeof va==="string") va=va.toLowerCase();
      if(typeof vb==="string") vb=vb.toLowerCase();
      return va<vb?(orden.dir==="asc"?-1:1):va>vb?(orden.dir==="asc"?1:-1):0;
    });

  const movs = movsFiltrados;
  const hayFiltros = Object.values(filtros).some(v=>v!=="");

  const toggleSelect = (id) => {
    setSeleccionados(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  };
  const toggleAll = () => {
    setSeleccionados(seleccionados.length === movs.length ? [] : movs.map(m=>m.id));
  };

  const puedePreLiq = (m) => m.factor !== null && m.kg_liquidables !== null;
  const todosConCalidad = seleccionados.every(id => {
    const m = movs.find(x=>x.id===id);
    return m && puedePreLiq(m);
  });

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>Reporte de Fletes</h2>
          <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>Modificación masiva de tarifas y preliquidación</p>
        </div>
      </div>

      {/* ACCIONES MASIVAS */}
      {seleccionados.length > 0 && (
        <div style={{padding:"14px 18px",background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.25)",borderRadius:8,marginBottom:16,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <span style={{color:"#f5a623",fontWeight:600,fontSize:13}}>{seleccionados.length} movimiento(s) seleccionado(s)</span>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="number" placeholder="Nueva tarifa $" value={tarifaMasiva} onChange={e=>setTarifaMasiva(e.target.value)}
                style={{width:150,padding:"6px 10px",fontSize:13}}/>
              <Btn variant="secondary" size="sm" onClick={()=>tarifaMasiva&&alert(`✓ Tarifa $${tarifaMasiva} aplicada a ${seleccionados.length} movimiento(s)`)}>
                Aplicar Tarifa
              </Btn>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <select style={{width:220,padding:"6px 8px",fontSize:13,background:"#0f1117",border:"1px solid #2a2d3e",borderRadius:6,color:"#e8eaf0"}}>
                <option value="">Cambiar transportista...</option>
                {mockTransportistas.map(t=>(
                  <option key={t.id} value={t.razon_social}>
                    {t.razon_social} {t.cuit?"— "+t.cuit:"(Informal)"}
                  </option>
                ))}
              </select>
              <Btn variant="secondary" size="sm" onClick={()=>alert(`✓ Transportista actualizado en ${seleccionados.length} movimiento(s)`)}>
                Cambiar Transportista
              </Btn>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input placeholder="Nuevo chofer..." style={{width:180,padding:"6px 10px",fontSize:13}}/>
              <Btn variant="secondary" size="sm" onClick={()=>alert(`✓ Chofer actualizado en ${seleccionados.length} movimiento(s)`)}>
                Cambiar Chofer
              </Btn>
            </div>
          </div>
          <Btn
            variant={todosConCalidad?"success":"secondary"}
            size="sm"
            disabled={!todosConCalidad}
            onClick={()=>{
              if(!todosConCalidad){alert("⚠ Hay movimientos sin calidad cargada. Cargá las calidades primero.");return;}
              setShowPreliq(true);
            }}
          >
            {todosConCalidad ? "✓ Preliquidar Fletes" : "⚠ Faltan Calidades"}
          </Btn>
        </div>
      )}

      {/* INFO RESULTADOS */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:12,color:"#8890a8"}}>
          Mostrando <strong style={{color:"#e8eaf0"}}>{movsFiltrados.length}</strong> de {todosMovs.length} movimiento(s)
          {seleccionados.length>0&&<span style={{color:"#f5a623",marginLeft:8}}>· {seleccionados.length} seleccionado(s)</span>}
        </div>
        {hayFiltros&&<Btn variant="danger" size="sm" onClick={limpiarFiltros}>✕ Limpiar filtros</Btn>}
      </div>

      <div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead>
            <tr style={{borderBottom:"none"}}>
              <th rowSpan={2} style={{verticalAlign:"middle"}}><input type="checkbox" onChange={toggleAll} checked={seleccionados.length===movs.length&&movs.length>0}/></th>
              <th onClick={()=>toggleOrden("numero")} style={{cursor:"pointer",userSelect:"none"}}>N° Mov {iconOrden("numero")}</th>
              <th>CTG</th>
              <th onClick={()=>toggleOrden("productor")} style={{cursor:"pointer",userSelect:"none"}}>Productor {iconOrden("productor")}</th>
              <th onClick={()=>toggleOrden("destino")} style={{cursor:"pointer",userSelect:"none"}}>Destino {iconOrden("destino")}</th>
              <th onClick={()=>toggleOrden("origen")} style={{cursor:"pointer",userSelect:"none"}}>Procedencia {iconOrden("origen")}</th>
              <th onClick={()=>toggleOrden("peso_neto_salida")} style={{cursor:"pointer",userSelect:"none"}}>Kg Carga {iconOrden("peso_neto_salida")}</th>
              <th onClick={()=>toggleOrden("peso_neto_llegada")} style={{cursor:"pointer",userSelect:"none"}}>Kg Desc. {iconOrden("peso_neto_llegada")}</th>
              <th onClick={()=>toggleOrden("transportista")} style={{cursor:"pointer",userSelect:"none"}}>Transportista {iconOrden("transportista")}</th>
              <th onClick={()=>toggleOrden("chofer")} style={{cursor:"pointer",userSelect:"none"}}>Chofer {iconOrden("chofer")}</th>
              <th onClick={()=>toggleOrden("patente_chasis")} style={{cursor:"pointer",userSelect:"none"}}>Patente {iconOrden("patente_chasis")}</th>
              <th onClick={()=>toggleOrden("tarifa_real")} style={{cursor:"pointer",userSelect:"none"}}>Tarifa {iconOrden("tarifa_real")}</th>
              <th>Calidad</th>
              <th onClick={()=>toggleOrden("estado_liq")} style={{cursor:"pointer",userSelect:"none"}}>Estado {iconOrden("estado_liq")}</th>
            </tr>
            <tr style={{background:"#0a0c12"}}>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.numero)} value={filtros.numero} onChange={v=>setFiltro("numero",v)} tipo="text" placeholder="Buscar..."/></td>
              <td style={{padding:"4px 6px"}}></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.productor)} value={filtros.productor} onChange={v=>setFiltro("productor",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.destino?.split(",")[0])} value={filtros.destino} onChange={v=>setFiltro("destino",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.origen?.split(",")[0])} value={filtros.origen} onChange={v=>setFiltro("origen",v)}/></td>
              <td style={{padding:"4px 6px"}}></td>
              <td style={{padding:"4px 6px"}}></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.transportista)} value={filtros.transportista} onChange={v=>setFiltro("transportista",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.chofer)} value={filtros.chofer} onChange={v=>setFiltro("chofer",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.patente_chasis)} value={filtros.patente_chasis} onChange={v=>setFiltro("patente_chasis",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>String(m.tarifa_real||""))} value={filtros.tarifa_real} onChange={v=>setFiltro("tarifa_real",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={["OK","Falta"]} value={filtros.calidad} onChange={v=>setFiltro("calidad",v)}/></td>
              <td style={{padding:"4px 6px"}}><FiltroColumna values={todosMovs.map(m=>m.estado_liq)} value={filtros.estado_liq} onChange={v=>setFiltro("estado_liq",v)}/></td>
            </tr>
          </thead>
          <tbody>
            {movs.map(m=>(
              <tr key={m.id} style={{background:seleccionados.includes(m.id)?"rgba(245,166,35,.05)":""}}>
                <td><input type="checkbox" checked={seleccionados.includes(m.id)} onChange={()=>toggleSelect(m.id)}/></td>
                <td style={{color:"#8890a8",fontSize:12,whiteSpace:"nowrap"}}>16/02/2026</td>
                <td>
                  <div><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></div>
                  {m.nro_ctg&&<div><span className="mono" style={{fontSize:10,color:"#565d7a"}}>{m.nro_ctg}</span></div>}
                </td>
                <td style={{fontWeight:500,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.productor}</td>
                <td style={{color:"#8890a8",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.contrato_venta?mockContrapartes.find(c=>c.tipo==="COMPRADOR")?.razon_social:"—"}</td>
                <td style={{fontSize:12,color:"#8890a8",whiteSpace:"nowrap"}}>{m.origen}</td>
                <td style={{fontSize:12,color:"#8890a8",whiteSpace:"nowrap"}}>{m.destino}</td>
                <td><span className="mono">{m.peso_neto_salida?.toLocaleString()}</span></td>
                <td><span className="mono">{m.peso_neto_llegada?.toLocaleString()||<span style={{color:"#565d7a"}}>—</span>}</span></td>
                <td style={{fontSize:12,maxWidth:160}}>
                  <select
                      defaultValue={m.transportista||""}
                      style={{width:"100%",padding:"3px 5px",fontSize:12,background:"transparent",border:"1px solid transparent",borderRadius:4,color:"#e8eaf0"}}
                      onFocus={e=>{e.target.style.background="#0f1117";e.target.style.borderColor="#2a2d3e";}}
                      onBlur={e=>{e.target.style.background="transparent";e.target.style.borderColor="transparent";}}
                      title="Seleccionar transportista registrado"
                    >
                      <option value="">Sin registrar</option>
                      {mockTransportistas.map(t=>(
                        <option key={t.id} value={t.razon_social}>
                          {t.razon_social} {t.cuit?"("+t.cuit+")":"(Informal)"}
                        </option>
                      ))}
                    </select>
                </td>
                <td style={{fontSize:12,maxWidth:130}}>
                  <select
                      defaultValue={m.chofer||""}
                      style={{width:"100%",padding:"3px 5px",fontSize:12,background:"transparent",border:"1px solid transparent",borderRadius:4,color:"#e8eaf0"}}
                      onFocus={e=>{e.target.style.background="#0f1117";e.target.style.borderColor="#2a2d3e";}}
                      onBlur={e=>{e.target.style.background="transparent";e.target.style.borderColor="transparent";}}
                      title="Seleccionar chofer"
                    >
                      <option value="">—</option>
                      {mockChoferes.map(c=>(
                        <option key={c.id} value={c.nombre}>{c.nombre} ({c.cuit_dni})</option>
                      ))}
                    </select>
                </td>
                <td><span className="mono" style={{fontSize:12}}>{m.patente_chasis}</span></td>
                <td>
                  {(m.estado_liq!=="LIQUIDADO"&&m.estado_liq!=="PRELIQUIDADO")?(
                    <div style={{display:"flex",alignItems:"center",gap:2}}>
                      <span style={{color:"#8890a8",fontSize:12}}>$</span>
                      <input
                        defaultValue={m.tarifa_real||""}
                        type="number"
                        placeholder="—"
                        style={{width:70,padding:"3px 5px",fontSize:12,background:"transparent",border:"1px solid transparent",borderRadius:4,color:"#f5a623",fontFamily:"'IBM Plex Mono',monospace"}}
                        onFocus={e=>{e.target.style.background="#0f1117";e.target.style.borderColor="#2a2d3e";}}
                        onBlur={e=>{e.target.style.background="transparent";e.target.style.borderColor="transparent";}}
                        title="Click para editar tarifa"
                      />
                    </div>
                  ):(
                    <div>
                      <span className="mono" style={{fontSize:12}}>$ {m.tarifa_real||"—"}</span>
                      <div style={{fontSize:10,color:"#565d7a"}}>🔒 bloqueada</div>
                    </div>
                  )}
                </td>
                <td>
                  {puedePreLiq(m)
                    ? <Badge label="OK" color="green"/>
                    : <Badge label="Falta" color="red"/>
                  }
                </td>
                <td>
                  <Badge
                    label={m.estado_liq==="LIQUIDADO"?"Liquidado":m.estado_liq==="PRELIQUIDADO"?"Preliq.":"Pendiente"}
                    color={m.estado_liq==="LIQUIDADO"?"green":m.estado_liq==="PRELIQUIDADO"?"blue":"orange"}
                  />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* MODAL PRELIQUIDACION */}
      {showPreliq&&(
        <Modal title="Confirmar Preliquidación de Fletes" onClose={()=>setShowPreliq(false)}>
          <div className="alert-info" style={{marginBottom:16}}>
            Se van a preliquidar {seleccionados.length} flete(s). Una vez confirmado no se podrán modificar kilos ni calidad.
          </div>
          <table>
            <thead><tr><th>Movimiento</th><th>Transportista</th><th>Kg Liq.</th><th>Tarifa</th><th>Monto Est.</th></tr></thead>
            <tbody>
              {seleccionados.map(id=>{
                const m = movs.find(x=>x.id===id);
                if(!m) return null;
                const monto = m.km && m.tarifa_real && m.kg_liquidables
                  ? Math.round(m.km * m.tarifa_real * m.kg_liquidables/1000/100)
                  : 0;
                return (
                  <tr key={id}>
                    <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                    <td style={{fontSize:12}}>{m.transportista}</td>
                    <td><span className="mono">{m.kg_liquidables?.toLocaleString()}</span></td>
                    <td><span className="mono">$ {m.tarifa_real}</span></td>
                    <td><span className="mono" style={{color:"#f5a623",fontWeight:700}}>$ {monto.toLocaleString()}</span></td>
                  </tr>
                );

const ReporteCalidades = ({modulo}) => {
  const [seleccionados, setSeleccionados] = useState([]);
  const [factorMasivo, setFactorMasivo] = useState("");
  const [orden, setOrden] = useState({col:"numero", dir:"asc"});
  const [filtros, setFiltros] = useState({
    numero:"", especie:"", productor:"", kg_liquidables:"",
    factor:"", humedad_llegada:"", estado_liq:""
  });

  const setFiltro = (k,v) => setFiltros(prev=>({...prev,[k]:v}));
  const limpiarFiltros = () => setFiltros({numero:"",especie:"",productor:"",kg_liquidables:"",factor:"",humedad_llegada:"",estado_liq:""});
  const toggleOrden = (col) => setOrden(prev=>({col, dir:prev.col===col&&prev.dir==="asc"?"desc":"asc"}));
  const iconOrden = (col) => orden.col===col?(orden.dir==="asc"?"↑":"↓"):"↕";
  const hayFiltros = Object.values(filtros).some(v=>v!=="");

  const todosMovs = mockMovimientos.filter(m=>m.modalidad===modulo);

  const aplicar = (lista) => lista
    .filter(m=>!filtros.numero||m.numero?.toLowerCase().includes(filtros.numero.toLowerCase()))
    .filter(m=>!filtros.especie||m.especie===filtros.especie)
    .filter(m=>!filtros.productor||m.productor===filtros.productor)
    .filter(m=>!filtros.estado_liq||m.estado_liq===filtros.estado_liq)
    .sort((a,b)=>{
      let va=a[orden.col]??"", vb=b[orden.col]??"";
      if(typeof va==="string") va=va.toLowerCase();
      if(typeof vb==="string") vb=vb.toLowerCase();
      return va<vb?(orden.dir==="asc"?-1:1):va>vb?(orden.dir==="asc"?1:-1):0;
    });

  const movsSinCalidad = aplicar(todosMovs.filter(m=>m.estado==="DESCARGADO"&&m.factor===null));
  const movsConCalidad = aplicar(todosMovs.filter(m=>m.factor!==null));

  const toggleSelect = (id) => setSeleccionados(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const toggleAll = () => setSeleccionados(seleccionados.length===movsSinCalidad.length?[]:movsSinCalidad.map(m=>m.id));

  return (
    <div className="fade-in">
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Reporte de Calidades</h2>
        <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>Calidades pendientes de carga y asignación masiva</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
        <StatCard label="Sin Calidad Cargada" value={movsSinCalidad.length} sub="requieren calidad para preliquidar" color="#e74c3c"/>
        <StatCard label="Con Calidad OK" value={movsConCalidad.length} sub="listos para preliquidar" color="#27ae60"/>
      </div>

      {/* INFO + LIMPIAR */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:12,color:"#8890a8"}}>
          Sin calidad: <strong style={{color:"#e74c3c"}}>{movsSinCalidad.length}</strong>
          <span style={{margin:"0 8px",color:"#2a2d3e"}}>|</span>
          Con calidad: <strong style={{color:"#27ae60"}}>{movsConCalidad.length}</strong>
          {seleccionados.length>0&&<span style={{color:"#f5a623",marginLeft:8}}>· {seleccionados.length} seleccionado(s)</span>}
        </div>
        {hayFiltros&&<Btn variant="danger" size="sm" onClick={limpiarFiltros}>✕ Limpiar filtros</Btn>}
      </div>

      {/* PENDIENTES SIN CALIDAD */}
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header">
          <span style={{fontWeight:600,fontSize:14}}>⚠ Pendientes sin Calidad</span>
          {seleccionados.length>0&&(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" step="0.001" placeholder="Factor directo (ej: 0.980)" value={factorMasivo}

        ):(

const ImportadorExcel = ({modulo}) => {
  const [paso, setPaso] = useState(1); // 1=subir, 2=preview, 3=resultado
  const [datos, setDatos] = useState([]);
  const [errores, setErrores] = useState([]);
  const [procesando, setProcesando] = useState(false);
  const [seleccionados, setSeleccionados] = useState([]);

  // Columnas esperadas en el Excel
  const COLUMNAS = [
    {key:"productor", label:"Productor", requerido:true, tipo:"text"},
    {key:"comprador", label:"Comprador / Destino", requerido:true, tipo:"text"},
    {key:"especie", label:"Especie", requerido:true, tipo:"select"},
    {key:"campana", label:"Campaña", requerido:true, tipo:"text"},
    {key:"nro_ctg", label:"N° CTG", requerido:false, tipo:"text"},
    {key:"nro_cpe", label:"N° CPE", requerido:false, tipo:"text"},
    {key:"patente_chasis", label:"Patente Chasis", requerido:true, tipo:"text"},
    {key:"patente_acoplado", label:"Patente Acoplado", requerido:false, tipo:"text"},
    {key:"transportista", label:"Transportista", requerido:true, tipo:"text"},
    {key:"chofer", label:"Chofer", requerido:false, tipo:"text"},
    {key:"localidad_origen", label:"Localidad Origen", requerido:false, tipo:"text"},
    {key:"provincia_origen", label:"Provincia Origen", requerido:false, tipo:"text"},
    {key:"localidad_destino", label:"Localidad Destino", requerido:false, tipo:"text"},
    {key:"km", label:"Km", requerido:false, tipo:"number"},
    {key:"tarifa_catac", label:"Tarifa CATAC", requerido:false, tipo:"number"},
    {key:"tarifa_real", label:"Tarifa Real", requerido:false, tipo:"number"},
    {key:"kg_bruto_salida", label:"Kg Bruto Salida", requerido:true, tipo:"number"},
    {key:"kg_tara_salida", label:"Kg Tara Salida", requerido:true, tipo:"number"},
    {key:"humedad_salida", label:"Humedad Salida %", requerido:false, tipo:"number"},
    // DESCARGA — opcionales
    {key:"kg_bruto_llegada", label:"Kg Bruto Llegada", requerido:false, tipo:"number"},
    {key:"kg_tara_llegada", label:"Kg Tara Llegada", requerido:false, tipo:"number"},
    {key:"humedad_llegada", label:"Humedad Llegada %", requerido:false, tipo:"number"},
    {key:"nro_turno", label:"N° Turno", requerido:false, tipo:"text"},
    // CALIDAD — opcional
    {key:"factor", label:"Factor Calidad", requerido:false, tipo:"number"},
    {key:"contrato_compra", label:"Contrato Compra", requerido:false, tipo:"text"},
    {key:"contrato_venta", label:"Contrato Venta", requerido:false, tipo:"text"},
  ];

  const COLS_REQUERIDAS = COLUMNAS.filter(c=>c.requerido);

  const [nombreArchivo, setNombreArchivo] = useState("");

  const MAPA_COLUMNAS = {
    "FECHA":"fecha","CEREAL":"especie","CTG":"ctg","CPE/REMITOS":"cpe_remito",
    "CHOFER":"chofer","TRANSPORTE":"transportista","PAT.CHAS":"patente_chasis",
    "PAT.AC":"patente_acoplado","PRODUTOR":"productor","PRODUCTOR":"productor",
    "ORIGEN":"origen","DESTINO":"destino","DESTINATARIO":"comprador",
    "TN.CARGA":"kg_carga","TN.DESC":"kg_desc","H°":"humedad",
    "MERMA X H°":"neto_humedad","NETO":"neto_humedad",
    "KM":"km","TARIFA":"tarifa","TOTAL FLETE":"total_flete",
    "OBSERVACIONES":"observaciones","CAMPAÑA":"campana",
    "ESPECIE":"especie","PRODUCTOR *":"productor",
    "COMPRADOR/DEST *":"comprador","TRANSPORTISTA *":"transportista",
    "PAT. CHASIS *":"patente_chasis","PAT. ACOPLADO":"patente_acoplado",
    "KG CARGA *":"kg_carga","KG DESC.":"kg_desc","HUMEDAD %":"humedad",
    "NETO HUM.":"neto_humedad","TOTAL FLETE":"total_flete",
  };

  const MAPA_ESPECIES = {
    "MAIZ":"Maíz","MAÍZ":"Maíz","EX.SOJA":"Soja","SOJA":"Soja",
    "GIRASOL":"Girasol","TRIGO":"Trigo","CEBADA":"Cebada",
    "S.AVENA":"Sorgo","AVENA":"Sorgo","SORGO":"Sorgo",
  };

  const procesarArchivo = (file) => {
    if (!file) return;
    setNombreArchivo(file.name);
    setProcesando(true);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:"array", cellDates:true});

        // Buscar hoja de movimientos
        const hojaNombre = wb.SheetNames.find(n=>
          n.toUpperCase().includes("MOVIMIENTO") || n.toUpperCase().includes("MOV")
        ) || wb.SheetNames[0];

        const ws = wb.Sheets[hojaNombre];
        const filas = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false});

        // Encontrar fila de headers (busca la que tenga FECHA o CEREAL o PRODUCTOR)
        let headerIdx = -1;
        let headers = [];
        for (let i=0; i<Math.min(filas.length,10); i++) {
          const fila = filas[i];
          const tieneHeaders = fila && fila.some(c=>
            c && ["FECHA","CEREAL","PRODUCTOR","PRODUTOR","CHOFER","TRANSPORTE"].includes(String(c).trim().toUpperCase())
          );
          if (tieneHeaders) { headerIdx = i; headers = fila; break; }
        }

        if (headerIdx === -1) {
          alert("No se encontró la fila de encabezados. Verificá que el Excel tenga columnas como FECHA, CEREAL, PRODUCTOR, etc.");
          setProcesando(false);
          return;
        }

        // Mapear headers
        const colMap = {};
        headers.forEach((h,i)=>{
          if (!h) return;
          const key = MAPA_COLUMNAS[String(h).trim().toUpperCase()] || MAPA_COLUMNAS[String(h).trim()];
          if (key) colMap[i] = key;
        });

        // Procesar filas de datos
        const registros = [];
        for (let i=headerIdx+1; i<filas.length; i++) {
          const fila = filas[i];
          if (!fila || fila.every(c=>!c)) continue;

          const r = {_fila: i+1};
          Object.entries(colMap).forEach(([col, key])=>{
            r[key] = fila[col] !== null && fila[col] !== undefined ? fila[col] : null;
          });

          // Normalizar especie
          if (r.especie) {
            const esp = String(r.especie).trim().toUpperCase();
            r.especie = MAPA_ESPECIES[esp] || r.especie;
          }

          // Campaña por defecto
          if (!r.campana) r.campana = "2024/2025";

          // Calcular kg netos y faltante
          const kgCarga = parseFloat(r.kg_carga) || null;
          const kgDesc = parseFloat(r.kg_desc) || null;
          r._kg_neto_salida = kgCarga;
          r._kg_neto_llegada = kgDesc;
          if (kgCarga && kgDesc) {
            const dif = kgCarga - kgDesc;
            const tol = kgCarga * 0.0003;
            r._faltante = Math.max(0, dif - tol);
          } else {
            r._faltante = null;
          }

          r._tiene_descarga = !!kgDesc;
          r._tiene_calidad = !!(r.factor || r.humedad);

          // Validar campos requeridos
          const errores = [];
          if (!r.productor) errores.push("Productor requerido");
          if (!r.transportista) errores.push("Transportista requerido");
          if (!r.patente_chasis) errores.push("Patente chasis requerida");
          if (!kgCarga) errores.push("Kg Carga requerido");
          if (!r.especie) errores.push("Especie requerida");

          r._errores = errores;
          r._estado = errores.length > 0 ? "ERROR" : "OK";

          registros.push(r);
        }

        setDatos(registros);
        setSeleccionados(registros.filter(r=>r._estado==="OK").map((_,i)=>i));
        setProcesando(false);
        setPaso(2);
      } catch(err) {
        console.error(err);
        alert("Error al leer el archivo: " + err.message);
        setProcesando(false);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const simularImport = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".xlsx,.xls,.csv";
    input.onchange = (e) => procesarArchivo(e.target.files[0]);
    input.click();
  };

  const confirmarImport = () => {
    setProcesando(true);
    setTimeout(()=>{
      setProcesando(false);
      setPaso(3);
    },1200);
  };

  const toggleSel = (i) => setSeleccionados(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i]);
  const ok = datos.filter(r=>r._estado==="OK");
  const err = datos.filter(r=>r._estado==="ERROR");

  return (
    <div className="fade-in">
      <div style={{marginBottom:20}}>
