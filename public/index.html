<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GranoSYS — Sistema de Comercialización</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8eaf0;font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.5;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0f1117}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px}
.mono{font-family:'IBM Plex Mono',monospace}
input,select,textarea{background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;padding:8px 12px;border-radius:6px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color 0.2s}
input:focus,select:focus{border-color:#f5a623}
input::placeholder{color:#565d7a}
select option{background:#1a1d27}
button{font-family:'IBM Plex Sans',sans-serif;cursor:pointer;border:none;transition:all 0.2s}
table{width:100%;border-collapse:collapse}
th{background:#0f1117;color:#8890a8;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:10px 14px;text-align:left;border-bottom:1px solid #2a2d3e;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #1e2133;font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.5s ease infinite}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:#8890a8;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:#e8eaf0}
.tab.active{color:#f5a623;border-bottom-color:#f5a623}
.tab-bar{display:flex;border-bottom:1px solid #2a2d3e;overflow-x:auto}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:stretch;justify-content:center;padding:0}
.modal{background:#1a1d27;border-left:1px solid #2a2d3e;border-right:1px solid #2a2d3e;width:100%;max-width:960px;height:100vh;display:flex;flex-direction:column;margin:0 auto;overflow:hidden;border-radius:0}
.modal-header{padding:14px 20px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#1a1d27;z-index:10}
.modal-body{padding:18px 20px 40px 20px;overflow-y:auto;flex:1;scroll-behavior:smooth}
.card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between}
.form-field{margin-bottom:11px}
.form-label{display:block;font-size:11px;font-weight:600;color:#8890a8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;align-items:start}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px;align-items:start}
.stat-card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;padding:18px 20px;position:relative;overflow:hidden}
.stat-top{position:absolute;top:0;left:0;right:0;height:2px;opacity:.6}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;margin-bottom:2px;background:transparent;color:#8890a8;border:1px solid transparent;font-size:13px;text-align:left;cursor:pointer;transition:all .15s}
.nav-btn:hover{color:#e8eaf0;background:rgba(255,255,255,.03)}
.nav-btn.active{background:rgba(245,166,35,.12);color:#f5a623;border-color:rgba(245,166,35,.2);font-weight:600}
.drop-zone{border:2px dashed #2a2d3e;border-radius:10px;padding:36px;text-align:center;cursor:pointer;transition:border-color .2s}
.drop-zone:hover{border-color:#f5a623}
.alert-info{padding:10px 14px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:6px;font-size:12px;color:#ffd280}
.alert-success{padding:10px 14px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:6px;font-size:12px;color:#27ae60}
.alert-danger{padding:10px 14px;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:6px;font-size:12px;color:#e74c3c}
.progress-bar{height:6px;background:#0f1117;border-radius:3px;overflow:hidden;min-width:60px}
.progress-fill{height:100%;border-radius:3px;background:#f5a623;transition:width .3s}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

// DATOS MOCK
const ESPECIES = ["Soja","Trigo","Maíz","Girasol","Sorgo","Cebada"];
const CAMPANAS = ["2023/2024","2024/2025","2025/2026"];
const PROVINCIAS = ["Buenos Aires","Córdoba","Santa Fe","Entre Ríos","Santiago del Estero","Chaco","La Pampa","Salta","Tucumán"];

const mockContrapartes = [
  {id:1,codigo:"P-0001",cuit:"20-12345678-9",razon_social:"García Juan Carlos",tipo:"PRODUCTOR",canal:"FORMAL",provincia:"Santiago del Estero",localidad:"Gramilla",activo:true},
  {id:2,codigo:"P-0002",cuit:null,razon_social:"Rodríguez Pedro",tipo:"PRODUCTOR",canal:"INFORMAL",provincia:"Chaco",localidad:"Presidencia Roque Sáenz Peña",activo:true},
  {id:3,codigo:"C-0001",cuit:"30-71234567-8",razon_social:"Bunge Argentina S.A.",tipo:"COMPRADOR",canal:"FORMAL",provincia:"Santa Fe",localidad:"Timbúes",activo:true},
  {id:4,codigo:"C-0002",cuit:"30-65432198-7",razon_social:"Aceitera General Deheza",tipo:"COMPRADOR",canal:"FORMAL",provincia:"Córdoba",localidad:"Gral. Deheza",activo:true},
  {id:5,codigo:"P-0003",cuit:"20-98765432-1",razon_social:"López María Elena",tipo:"PRODUCTOR",canal:"FORMAL",provincia:"Córdoba",localidad:"Marcos Juárez",activo:true},
];

const mockContratos = [
  {id:1,numero:"OC-2025-0001",tipo:"COMPRA",modalidad:"FORMAL",fecha:"2025-03-15",especie:"Soja",campana:"2024/2025",contraparte:"García Juan Carlos",toneladas:300,tipo_precio:"PRECIO_HECHO",precio:285000,moneda:"PESOS",tipo_entrega:"A_RETIRAR",estado:"EN_CURSO",asignadas:180,tipo_liq:"INCISO_A"},
  {id:2,numero:"OV-2025-0001",tipo:"VENTA",modalidad:"FORMAL",fecha:"2025-03-15",especie:"Soja",campana:"2024/2025",contraparte:"Bunge Argentina S.A.",toneladas:300,tipo_precio:"PRECIO_HECHO",precio:292000,moneda:"PESOS",tipo_entrega:"PUESTO_DESTINO",estado:"EN_CURSO",asignadas:180,tipo_liq:"INCISO_A"},
  {id:3,numero:"OC-2025-0002",tipo:"COMPRA",modalidad:"INFORMAL",fecha:"2025-04-02",especie:"Maíz",campana:"2024/2025",contraparte:"Rodríguez Pedro",toneladas:150,tipo_precio:"A_FIJAR",precio:null,moneda:"DOLARES",tipo_entrega:"A_RETIRAR",estado:"CONFIRMADO",asignadas:0,tipo_liq:null},
  {id:4,numero:"OC-2025-0003",tipo:"COMPRA",modalidad:"FORMAL",fecha:"2025-04-10",especie:"Trigo",campana:"2024/2025",contraparte:"García Juan Carlos",toneladas:200,tipo_precio:"PRECIO_HECHO",precio:180000,moneda:"PESOS",tipo_entrega:"A_RETIRAR",estado:"CONFIRMADO",asignadas:60,tipo_liq:"INCISO_B"},
  {id:5,numero:"OV-2025-0002",tipo:"VENTA",modalidad:"INFORMAL",fecha:"2025-04-05",especie:"Maíz",campana:"2024/2025",contraparte:"Rodríguez Pedro",toneladas:150,tipo_precio:"A_FIJAR",precio:null,moneda:"DOLARES",tipo_entrega:"PUESTO_DESTINO",estado:"CONFIRMADO",asignadas:0,tipo_liq:null},
];

const mockMovimientos = [
  {id:1,numero:"MOV-0001",nro_ctg:"10129526726",nro_cpe:"00000-00001444",especie:"Soja",campana:"2024/2025",contrato_compra:"OC-2025-0001",contrato_venta:"OV-2025-0001",productor:"García Juan Carlos",origen:"Gramilla, Sgo. del Estero",destino:"Timbúes, Santa Fe",transportista:"Logística Centro S.R.L.",chofer:"Zamora Pablo Leandro",patente_chasis:"AA496YI",patente_acoplado:"AD846IU",km:760,tarifa_catac:411,tarifa_real:395,peso_bruto_salida:52380,peso_tara_salida:17400,peso_neto_salida:34980,humedad_salida:13.2,peso_bruto_llegada:52320,peso_tara_llegada:17400,peso_neto_llegada:34920,humedad_llegada:13.0,faltante:60,estado:"DESCARGADO",estado_liq:"ASIGNADO",factor:0.98,kg_liquidables:34221.6,modalidad:"FORMAL"},
  {id:2,numero:"MOV-0002",nro_ctg:"10129526800",nro_cpe:"00000-00001445",especie:"Soja",campana:"2024/2025",contrato_compra:"OC-2025-0001",contrato_venta:"OV-2025-0001",productor:"García Juan Carlos",origen:"Gramilla, Sgo. del Estero",destino:"Timbúes, Santa Fe",transportista:"Logística Centro S.R.L.",chofer:"Zamora Pablo Leandro",patente_chasis:"AA496YI",patente_acoplado:"AD846IU",km:760,tarifa_catac:411,tarifa_real:395,peso_bruto_salida:52100,peso_tara_salida:17400,peso_neto_salida:34700,humedad_salida:13.5,peso_bruto_llegada:52100,peso_tara_llegada:17400,peso_neto_llegada:34700,humedad_llegada:13.1,faltante:0,estado:"LIQUIDADO",estado_liq:"LIQUIDADO",factor:0.985,kg_liquidables:34179.5,modalidad:"FORMAL"},
  {id:3,numero:"MOV-0003",nro_ctg:null,nro_cpe:null,especie:"Maíz",campana:"2024/2025",contrato_compra:"OC-2025-0002",contrato_venta:null,productor:"Rodríguez Pedro",origen:"Sáenz Peña, Chaco",destino:"Sin asignar",transportista:"Sin registrar",chofer:"Sin registrar",patente_chasis:"AC234BB",patente_acoplado:null,km:null,tarifa_catac:null,tarifa_real:null,peso_bruto_salida:48200,peso_tara_salida:16800,peso_neto_salida:31400,humedad_salida:14.0,peso_bruto_llegada:null,peso_tara_llegada:null,peso_neto_llegada:null,humedad_llegada:null,faltante:null,estado:"EN_TRANSITO",estado_liq:"SIN_ASIGNAR",factor:null,kg_liquidables:null,modalidad:"INFORMAL"},
];

const mockLiquidaciones = [
  {id:1,numero:"LIQ-2025-0001",tipo:"COMPRA",tipo_liq:"INCISO_A",contraparte:"García Juan Carlos",contrato:"OC-2025-0001",fecha:"2025-03-20",camiones:1,kg:34179,monto_bruto:9741165,descuentos:73000,retenciones:487058,monto_neto:9181107,estado:"PAGADA",modalidad:"FORMAL"},
  {id:2,numero:"LIQ-2025-0002",tipo:"COMPRA",tipo_liq:"INCISO_A",contraparte:"García Juan Carlos",contrato:"OC-2025-0001",fecha:"2025-03-28",camiones:1,kg:34221,monto_bruto:9753135,descuentos:68000,retenciones:484307,monto_neto:9200828,estado:"EMITIDA",modalidad:"FORMAL"},
];

// HELPERS
const Badge = ({label, color}) => {
  const colors = {
    green:{bg:"rgba(39,174,96,.15)",text:"#27ae60",border:"rgba(39,174,96,.3)"},
    red:{bg:"rgba(231,76,60,.15)",text:"#e74c3c",border:"rgba(231,76,60,.3)"},
    orange:{bg:"rgba(245,166,35,.15)",text:"#f5a623",border:"rgba(245,166,35,.3)"},
    blue:{bg:"rgba(52,152,219,.15)",text:"#3498db",border:"rgba(52,152,219,.3)"},
    purple:{bg:"rgba(155,89,182,.15)",text:"#9b59b6",border:"rgba(155,89,182,.3)"},
    gray:{bg:"rgba(136,144,168,.15)",text:"#8890a8",border:"rgba(136,144,168,.3)"},
  };
  const c = colors[color]||colors.gray;
  return <span className="badge" style={{background:c.bg,color:c.text,border:`1px solid ${c.border}`}}>{label}</span>;
};

const Btn = ({children,onClick,variant="primary",size="md",disabled=false,style={}}) => {
  const v = {
    primary:{background:"#f5a623",color:"#000",fontWeight:600},
    secondary:{background:"transparent",color:"#e8eaf0",border:"1px solid #2a2d3e"},
    ghost:{background:"transparent",color:"#8890a8"},
    danger:{background:"rgba(231,76,60,.15)",color:"#e74c3c",border:"1px solid rgba(231,76,60,.3)"},
    success:{background:"rgba(39,174,96,.15)",color:"#27ae60",border:"1px solid rgba(39,174,96,.3)"},
  };
  const s = {sm:{padding:"5px 12px",fontSize:12,borderRadius:5},md:{padding:"8px 16px",fontSize:13,borderRadius:6},lg:{padding:"11px 22px",fontSize:14,borderRadius:8}};
  return <button onClick={onClick} disabled={disabled} style={{...v[variant],...s[size],opacity:disabled?.4:1,display:"inline-flex",alignItems:"center",gap:6,fontWeight:500,...style}}>{children}</button>;
};

const Modal = ({title,onClose,children,width=600}) => (
  <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal fade-in" style={{maxWidth:width}}>
      <div className="modal-header">
        <span style={{fontWeight:600,fontSize:15}}>{title}</span>
        <button onClick={onClose} style={{background:"none",color:"#8890a8",fontSize:22,lineHeight:1,padding:"0 4px"}}>×</button>
      </div>
      <div className="modal-body">{children}</div>
    </div>
  </div>
);

const FF = ({label,children,required,span}) => (
  <div className="form-field" style={span?{gridColumn:`span ${span}`}:{}}>
    <label className="form-label">{label}{required&&<span style={{color:"#f5a623",marginLeft:3}}>*</span>}</label>
    {children}
  </div>
);

const StatCard = ({label,value,sub,color="#f5a623"}) => (
  <div className="stat-card">
    <div className="stat-top" style={{background:color}}/>
    <div style={{fontSize:11,color:"#8890a8",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>{label}</div>
    <div className="mono" style={{fontSize:24,fontWeight:700,color,letterSpacing:"-.02em"}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:"#565d7a",marginTop:4}}>{sub}</div>}
  </div>
);

// ── DASHBOARD ──
const Dashboard = ({modulo}) => {
  const contratos = mockContratos.filter(c=>c.modalidad===modulo);
  const movs = mockMovimientos.filter(m=>m.modalidad===modulo);
  const enTransito = movs.filter(m=>m.estado==="EN_TRANSITO").length;
  const aLiquidar = movs.filter(m=>m.estado==="DESCARGADO"&&m.estado_liq!=="LIQUIDADO").length;
  return (
    <div className="fade-in">
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Dashboard — {modulo==="FORMAL"?"Operaciones Formales":"Operaciones Informales"}</h2>
        <p style={{color:"#8890a8",fontSize:13}}>Resumen operativo</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
        <StatCard label="Contratos Activos" value={contratos.filter(c=>c.estado!=="CANCELADO").length} sub={`${contratos.filter(c=>c.tipo==="COMPRA").length} compra · ${contratos.filter(c=>c.tipo==="VENTA").length} venta`}/>
        <StatCard label="En Tránsito" value={enTransito} sub="camiones en ruta" color="#3498db"/>
        <StatCard label="A Liquidar" value={aLiquidar} sub="movimientos descargados" color="#27ae60"/>
        <StatCard label="A Fijar" value={contratos.filter(c=>c.tipo_precio==="A_FIJAR").length} sub="contratos sin precio" color="#9b59b6"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div className="card">
          <div className="card-header"><span style={{fontWeight:600,fontSize:14}}>Últimos Movimientos</span></div>
          <table><thead><tr><th>N° Mov</th>{modulo==="FORMAL"&&<th>CTG</th>}<th>Especie</th><th>Kg Neto</th><th>Estado</th></tr></thead>
          <tbody>{movs.slice(0,5).map(m=>(
            <tr key={m.id}>
              <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
              {modulo==="FORMAL"&&<td><span className="mono" style={{fontSize:11,color:"#8890a8"}}>{m.nro_ctg||"—"}</span></td>}
              <td>{m.especie}</td>
              <td><span className="mono">{m.peso_neto_llegada?m.peso_neto_llegada.toLocaleString():m.peso_neto_salida.toLocaleString()}</span></td>
              <td><Badge label={m.estado} color={m.estado==="EN_TRANSITO"?"orange":m.estado==="DESCARGADO"?"blue":"green"}/></td>
            </tr>
          ))}</tbody></table>
        </div>
        <div className="card">
          <div className="card-header"><span style={{fontWeight:600,fontSize:14}}>Contratos Abiertos</span></div>
          <table><thead><tr><th>Número</th><th>Tipo</th><th>Especie</th><th>Progreso</th></tr></thead>
          <tbody>{contratos.filter(c=>c.estado!=="CUMPLIDO"&&c.estado!=="CANCELADO").map(c=>(
            <tr key={c.id}>
              <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{c.numero}</span></td>
              <td><Badge label={c.tipo} color={c.tipo==="COMPRA"?"orange":"blue"}/></td>
              <td>{c.especie}</td>
              <td>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div className="progress-bar" style={{flex:1}}><div className="progress-fill" style={{width:`${(c.asignadas/c.toneladas)*100}%`}}/></div>
                  <span className="mono" style={{fontSize:11,color:"#8890a8",minWidth:60}}>{c.asignadas}/{c.toneladas}tn</span>
                </div>
              </td>
            </tr>
          ))}</tbody></table>
        </div>
      </div>
    </div>
  );
};

// ── CONTRAPARTES ──
const Contrapartes = ({modulo}) => {
  const [showForm,setShowForm]=useState(false);
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({cuit:"",razon_social:"",tipo:"PRODUCTOR",condicion_iva:"RI",provincia:"",localidad:"",telefono:"",email:""});
  const lista = mockContrapartes.filter(c=>{
    if(modulo==="FORMAL"&&!c.cuit) return false;
    return c.razon_social.toLowerCase().includes(search.toLowerCase())||(c.cuit&&c.cuit.includes(search));
  });
  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>{modulo==="FORMAL"?"Contrapartes Formales":"Contrapartes Informales"}</h2>
          <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>{modulo==="FORMAL"?"Con CUIT registrado en AFIP":"Identificación interna del sistema"}</p>
        </div>
        <Btn onClick={()=>setShowForm(true)}>+ Nueva Contraparte</Btn>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{padding:"12px 16px"}}>
          <input placeholder="Buscar por nombre o CUIT..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:360}}/>
        </div>
      </div>
      <div className="card">
        <table><thead><tr>
          <th>Código</th>{modulo==="FORMAL"&&<th>CUIT</th>}<th>Razón Social</th><th>Tipo</th><th>Provincia</th><th>Estado</th><th></th>
        </tr></thead>
        <tbody>{lista.map(c=>(
          <tr key={c.id}>
            <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{c.codigo}</span></td>
            {modulo==="FORMAL"&&<td><span className="mono" style={{fontSize:12}}>{c.cuit||"—"}</span></td>}
            <td style={{fontWeight:500}}>{c.razon_social}</td>
            <td><Badge label={c.tipo} color={c.tipo==="PRODUCTOR"?"orange":"blue"}/></td>
            <td style={{color:"#8890a8"}}>{c.provincia}</td>
            <td><Badge label={c.activo?"Activo":"Inactivo"} color={c.activo?"green":"gray"}/></td>
            <td><Btn variant="ghost" size="sm">Editar</Btn></td>
          </tr>
        ))}</tbody></table>
        {lista.length===0&&<div style={{padding:40,textAlign:"center",color:"#565d7a"}}>No se encontraron contrapartes</div>}
      </div>
      {showForm&&(
        <Modal title={`Nueva Contraparte ${modulo==="FORMAL"?"Formal":"Informal"}`} onClose={()=>setShowForm(false)} width={860}>
          <div className="form-grid-2">
            {modulo==="FORMAL"&&<FF label="CUIT" required><input placeholder="20-12345678-9" value={form.cuit} onChange={e=>setForm({...form,cuit:e.target.value})}/></FF>}
            <FF label="Razón Social / Nombre" required span={modulo==="INFORMAL"?2:1}><input placeholder="Nombre completo o razón social" value={form.razon_social} onChange={e=>setForm({...form,razon_social:e.target.value})}/></FF>

    return acc;

        <StatCard label="Trigo — Total" value={`${totalTrigo} tn`} sub="todas las posiciones" color="#e74c3c"/>

        const tnTotal = prod.items.reduce((a,s)=>a+s.tn_total,0);
        const tnConContrato = prod.items.reduce((a,s)=>a+s.con_contrato.reduce((b,c)=>b+c.tn,0),0);

                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{prod.productor}</div>
                  <div style={{fontSize:12,color:"#8890a8",marginTop:2}}>{prod.cuit||"Informal"}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:24,alignItems:"center"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#8890a8",textTransform:"uppercase",letterSpacing:".06em"}}>Total</div>
                  <div className="mono" style={{fontWeight:700,fontSize:18,color:"#e8eaf0"}}>{tnTotal.toFixed(3)} tn</div>

// ── REPORTE FLETES ──
const ReporteFletes = ({modulo}) => {
  const [seleccionados, setSeleccionados] = useState([]);
  const [tarifaMasiva, setTarifaMasiva] = useState("");
  const [showPreliq, setShowPreliq] = useState(false);

  const movs = mockMovimientos.filter(m => m.modalidad === modulo);

  const toggleSelect = (id) => {
    setSeleccionados(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  };
  const toggleAll = () => {
    setSeleccionados(seleccionados.length === movs.length ? [] : movs.map(m=>m.id));
  };

  const puedePreLiq = (m) => m.factor !== null && m.kg_liquidables !== null;
  const todosConCalidad = seleccionados.every(id => {
    const m = movs.find(x=>x.id===id);
    return m && puedePreLiq(m);
  });

  return (
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>Reporte de Fletes</h2>
          <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>Modificación masiva de tarifas y preliquidación</p>
        </div>
      </div>

      {/* ACCIONES MASIVAS */}
      {seleccionados.length > 0 && (
        <div style={{padding:"14px 18px",background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.25)",borderRadius:8,marginBottom:16,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
          <span style={{color:"#f5a623",fontWeight:600,fontSize:13}}>{seleccionados.length} movimiento(s) seleccionado(s)</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="number" placeholder="Nueva tarifa $" value={tarifaMasiva} onChange={e=>setTarifaMasiva(e.target.value)}
              style={{width:160,padding:"6px 10px",fontSize:13}}/>
            <Btn variant="secondary" size="sm" onClick={()=>tarifaMasiva&&alert(`✓ Tarifa $${tarifaMasiva} aplicada a ${seleccionados.length} movimiento(s)`)}>
              Aplicar Tarifa
            </Btn>
          </div>
          <Btn
            variant={todosConCalidad?"success":"secondary"}
            size="sm"
            disabled={!todosConCalidad}
            onClick={()=>{
              if(!todosConCalidad){alert("⚠ Hay movimientos sin calidad cargada. Cargá las calidades primero.");return;}
              setShowPreliq(true);
            }}
          >
            {todosConCalidad ? "✓ Preliquidar Fletes" : "⚠ Faltan Calidades"}
          </Btn>
        </div>
      )}

      <div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" onChange={toggleAll} checked={seleccionados.length===movs.length&&movs.length>0}/></th>
              <th>Fecha Carga</th>
              <th>N° Mov / CTG</th>
              <th>Productor</th>
              <th>Comprador</th>
              <th>Procedencia</th>
              <th>Destino</th>
              <th>Kg Carga</th>
              <th>Kg Descarga</th>
              <th>Transportista</th>
              <th>Chofer</th>
              <th>Patente</th>
              <th>Tarifa</th>
              <th>Calidad</th>
              <th>Estado Flete</th>
            </tr>
          </thead>
          <tbody>
            {movs.map(m=>(
              <tr key={m.id} style={{background:seleccionados.includes(m.id)?"rgba(245,166,35,.05)":""}}>
                <td><input type="checkbox" checked={seleccionados.includes(m.id)} onChange={()=>toggleSelect(m.id)}/></td>
                <td style={{color:"#8890a8",fontSize:12,whiteSpace:"nowrap"}}>16/02/2026</td>
                <td>
                  <div><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></div>
                  {m.nro_ctg&&<div><span className="mono" style={{fontSize:10,color:"#565d7a"}}>{m.nro_ctg}</span></div>}
                </td>
                <td style={{fontWeight:500,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.productor}</td>
                <td style={{color:"#8890a8",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.contrato_venta?mockContrapartes.find(c=>c.tipo==="COMPRADOR")?.razon_social:"—"}</td>
                <td style={{fontSize:12,color:"#8890a8",whiteSpace:"nowrap"}}>{m.origen}</td>
                <td style={{fontSize:12,color:"#8890a8",whiteSpace:"nowrap"}}>{m.destino}</td>
                <td><span className="mono">{m.peso_neto_salida?.toLocaleString()}</span></td>
                <td><span className="mono">{m.peso_neto_llegada?.toLocaleString()||<span style={{color:"#565d7a"}}>—</span>}</span></td>
                <td style={{fontSize:12,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.transportista}</td>
                <td style={{fontSize:12,whiteSpace:"nowrap"}}>{m.chofer}</td>
                <td><span className="mono" style={{fontSize:12}}>{m.patente_chasis}</span></td>
                <td>
                  <span className="mono" style={{fontSize:12}}>$ {m.tarifa_real||"—"}</span>
                </td>
                <td>
                  {puedePreLiq(m)
                    ? <Badge label="OK" color="green"/>
                    : <Badge label="Falta" color="red"/>
                  }
                </td>
                <td>
                  <Badge
                    label={m.estado_liq==="LIQUIDADO"?"Liquidado":m.estado_liq==="PRELIQUIDADO"?"Preliq.":"Pendiente"}
                    color={m.estado_liq==="LIQUIDADO"?"green":m.estado_liq==="PRELIQUIDADO"?"blue":"orange"}
                  />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* MODAL PRELIQUIDACION */}
      {showPreliq&&(
        <Modal title="Confirmar Preliquidación de Fletes" onClose={()=>setShowPreliq(false)}>
          <div className="alert-info" style={{marginBottom:16}}>
            Se van a preliquidar {seleccionados.length} flete(s). Una vez confirmado no se podrán modificar kilos ni calidad.
          </div>
          <table>
            <thead><tr><th>Movimiento</th><th>Transportista</th><th>Kg Liq.</th><th>Tarifa</th><th>Monto Est.</th></tr></thead>
            <tbody>
              {seleccionados.map(id=>{
                const m = movs.find(x=>x.id===id);
                if(!m) return null;
                const monto = m.km && m.tarifa_real && m.kg_liquidables
                  ? Math.round(m.km * m.tarifa_real * m.kg_liquidables/1000/100)
                  : 0;
                return (
                  <tr key={id}>
                    <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                    <td style={{fontSize:12}}>{m.transportista}</td>
                    <td><span className="mono">{m.kg_liquidables?.toLocaleString()}</span></td>
                    <td><span className="mono">$ {m.tarifa_real}</span></td>
                    <td><span className="mono" style={{color:"#f5a623",fontWeight:700}}>$ {monto.toLocaleString()}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
            <Btn variant="secondary" onClick={()=>setShowPreliq(false)}>Cancelar</Btn>
            <Btn variant="success" onClick={()=>{alert(`✓ ${seleccionados.length} flete(s) preliquidados. Kilos y calidad bloqueados.`);setShowPreliq(false);setSeleccionados([]);}}>
              Confirmar Preliquidación
            </Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

        </div>
        {movsSinCalidad.length===0?(
          <div style={{padding:30,textAlign:"center",color:"#27ae60",fontWeight:600}}>
            ✓ Todos los movimientos tienen calidad cargada
          </div>
        ):(
          <table>
            <thead>
              <tr>
                <th><input type="checkbox" onChange={toggleAll} checked={seleccionados.length===movsSinCalidad.length&&movsSinCalidad.length>0}/></th>
                <th>N° Mov</th><th>Especie</th><th>Productor</th>
                <th>Fecha Descarga</th><th>Kg Llegada</th><th>Humedad</th><th>Acción</th>
              </tr>
            </thead>
            <tbody>
              {movsSinCalidad.map(m=>(
                <tr key={m.id} style={{background:seleccionados.includes(m.id)?"rgba(231,76,60,.05)":""}}>
                  <td><input type="checkbox" checked={seleccionados.includes(m.id)} onChange={()=>toggleSelect(m.id)}/></td>
                  <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                  <td>{m.especie}</td>
                  <td>{m.productor}</td>
                  <td style={{color:"#8890a8",fontSize:12}}>—</td>
                  <td><span className="mono">{m.peso_neto_llegada?.toLocaleString()||"—"}</span></td>
                  <td><span className="mono">{m.humedad_llegada||"—"}</span></td>
                  <td><Btn variant="ghost" size="sm" onClick={()=>alert("Cargar calidad rubro a rubro para "+m.numero)}>Cargar Calidad</Btn></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* CON CALIDAD OK */}
      <div className="card">
        <div className="card-header"><span style={{fontWeight:600,fontSize:14}}>✓ Con Calidad Cargada</span></div>
        <table>
          <thead>
            <tr><th>N° Mov</th><th>Especie</th><th>Productor</th><th>Kg Liquidables</th><th>Factor</th><th>Estado Liq.</th></tr>
          </thead>
          <tbody>
            {movsConCalidad.map(m=>(
              <tr key={m.id}>
                <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                <td>{m.especie}</td>
                <td>{m.productor}</td>
                <td><span className="mono" style={{color:"#27ae60",fontWeight:600}}>{m.kg_liquidables?.toLocaleString()}</span></td>
                <td><span className="mono" style={{color:"#f5a623"}}>{m.factor}</span></td>
                <td><Badge label={m.estado_liq} color={m.estado_liq==="LIQUIDADO"?"green":m.estado_liq==="ASIGNADO"?"blue":"orange"}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ── POSICIÓN ABIERTA ──
const PosicionAbierta = ({modulo}) => {
  const [showAsignar, setShowAsignar] = useState(false);
  const [seleccionado, setSeleccionado] = useState(null);

  // Movimientos sin contrato asignado
  const movsSinContrato = mockMovimientos.filter(m =>
    m.modalidad === modulo && !m.contrato_compra
  );

  // Agrupar por productor y especie
  const posiciones = mockContrapartes
    .filter(c => c.tipo === "PRODUCTOR" || c.tipo === "AMBOS")
    .map(prod => {
      const movs = movsSinContrato.filter(m => m.productor === prod.razon_social);
      if (movs.length === 0) return null;
      const tn = movs.reduce((a, m) => a + (m.kg_liquidables || m.peso_neto_salida || 0) / 1000, 0);
      return { productor: prod, movs, tn };
    })
    .filter(Boolean);

  return (
    <div className="fade-in">
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Posición Abierta Sin Contrato</h2>
        <p style={{color:"#8890a8",fontSize:13,marginTop:2}}>
          Mercadería recibida sin contrato asignado — stock a fijar sin condiciones prepactadas
        </p>
      </div>

      {posiciones.length === 0 ? (
        <div style={{padding:40,textAlign:"center",color:"#27ae60",fontWeight:600,fontSize:15}}>
          ✓ No hay mercadería sin contrato asignado
        </div>
      ) : (
        posiciones.map(pos => (
          <div key={pos.productor.id} className="card" style={{marginBottom:14}}>
            <div className="card-header">
              <div>
                <span style={{fontWeight:700,fontSize:15}}>{pos.productor.razon_social}</span>
                <span style={{color:"#8890a8",fontSize:12,marginLeft:12}}>{pos.productor.cuit||"Informal"}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span className="mono" style={{color:"#f5a623",fontWeight:700,fontSize:16}}>
                  {pos.tn.toFixed(3)} tn sin asignar
                </span>
                <Badge label="A FIJAR" color="purple"/>
              </div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>N° Mov</th><th>Especie</th><th>Campaña</th>
                  <th>Comprador</th><th>Kg Liquidables</th>
                  <th>Humedad</th><th>Factor</th><th>Estado Calidad</th><th>Acción</th>
                </tr>
              </thead>
              <tbody>
                {pos.movs.map(m => (
                  <tr key={m.id}>
                    <td><span className="mono" style={{color:"#f5a623",fontSize:12}}>{m.numero}</span></td>
                    <td>{m.especie}</td>
                    <td><span className="mono" style={{fontSize:11}}>{m.campana}</span></td>
                    <td style={{color:"#8890a8",fontSize:12}}>{m.destino?.split(",")[0]||"—"}</td>
                    <td>
                      <span className="mono" style={{fontWeight:600}}>
                        {m.kg_liquidables?.toLocaleString() || <span style={{color:"#565d7a"}}>Sin calidad</span>}
                      </span>
                    </td>
                    <td><span className="mono">{m.humedad_llegada||"—"}</span></td>
                    <td>
                      {m.factor
                        ? <span className="mono" style={{color:"#f5a623"}}>{m.factor}</span>
                        : <Badge label="Falta" color="red"/>
                      }
                    </td>
                    <td>
                      {m.factor
                        ? <Badge label="OK" color="green"/>
                        : <Badge label="Sin calidad" color="red"/>
                      }
                    </td>
                    <td>
                      <div style={{display:"flex",gap:6}}>
                        <Btn variant="secondary" size="sm"
                          onClick={()=>{setSeleccionado(m);setShowAsignar(true);}}>
                          Asignar Contrato
                        </Btn>
                        <Btn variant="ghost" size="sm"
                          onClick={()=>alert("Crear venta directa desde posición abierta para "+m.numero)}>
                          Vender
                        </Btn>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ))
      )}

      {/* MODAL ASIGNAR CONTRATO */}
      {showAsignar && seleccionado && (
        <Modal title={`Asignar Contrato — ${seleccionado.numero}`} onClose={()=>setShowAsignar(false)}>
          <div className="alert-info" style={{marginBottom:16}}>
            Seleccioná un contrato existente o creá uno nuevo para asignar esta mercadería.
          </div>
          <div style={{padding:"12px 14px",background:"#0f1117",borderRadius:8,border:"1px solid #2a2d3e",marginBottom:16}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[
                ["Productor", seleccionado.productor],
                ["Especie", seleccionado.especie],
                ["Kg Liquidables", seleccionado.kg_liquidables?.toLocaleString()||"Sin calidad"],
              ].map(([l,v])=>(
                <div key={l}>
                  <div style={{fontSize:11,color:"#8890a8"}}>{l}</div>
                  <div style={{fontWeight:600,marginTop:2}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="form-grid-2">
            <FF label="Asignar a Contrato de Compra Existente">
              <select>
                <option value="">Seleccionar contrato...</option>
                {mockContratos.filter(c=>c.tipo==="COMPRA").map(c=>(
                  <option key={c.id}>{c.numero} — {c.contraparte} — {c.especie}</option>
                ))}
              </select>
            </FF>
            <FF label="Asignar a Contrato de Venta Existente">
              <select>
                <option value="">Seleccionar contrato...</option>
                {mockContratos.filter(c=>c.tipo==="VENTA").map(c=>(
                  <option key={c.id}>{c.numero} — {c.contraparte} — {c.especie}</option>
                ))}
              </select>
            </FF>
          </div>
          <div style={{padding:"12px 14px",background:"rgba(39,174,96,.06)",border:"1px solid rgba(39,174,96,.2)",borderRadius:6,marginTop:8,marginBottom:16,fontSize:12,color:"#27ae60"}}>
            ¿No hay contrato? → Podés crear uno nuevo desde el módulo de Contratos y después volver acá a asignarlo.
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <Btn variant="secondary" onClick={()=>setShowAsignar(false)}>Cancelar</Btn>
            <Btn onClick={()=>{alert("✓ Contrato asignado al movimiento "+seleccionado.numero);setShowAsignar(false);}}>
              Confirmar Asignación
            </Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ── APP PRINCIPAL ──
const MENU = [
  {id:"dashboard",label:"Dashboard",icon:"⊞"},
  {id:"contrapartes",label:"Contrapartes",icon:"👤"},
  {id:"contratos",label:"Contratos",icon:"📋"},
  {id:"movimientos",label:"Movimientos",icon:"🚛"},
  {id:"liquidaciones",label:"Liquidaciones",icon:"📊"},
  {id:"cc",label:"Cuenta Corriente",icon:"💰"},
  {id:"stock",label:"Stock",icon:"🌾"},
  {id:"rep_fletes",label:"Rep. Fletes",icon:"🚚"},
  {id:"rep_calidades",label:"Rep. Calidades",icon:"🔬"},
  {id:"posicion_abierta",label:"Posición Abierta",icon:"📌"},
];

function App() {
  const [modulo,setModulo]=useState("FORMAL");
  const [sec,setSec]=useState("dashboard");

  const render = () => {
    const p = {modulo};
    switch(sec){
      case "dashboard": return <Dashboard {...p}/>;
      case "contrapartes": return <Contrapartes {...p}/>;
      case "contratos": return <Contratos {...p}/>;
      case "movimientos": return <Movimientos {...p}/>;
      case "liquidaciones": return <Liquidaciones {...p}/>;
      case "cc": return <CuentaCorriente {...p}/>;
      case "stock": return <Stock/>;
      case "rep_fletes": return <ReporteFletes modulo={modulo}/>;
      case "rep_calidades": return <ReporteCalidades modulo={modulo}/>;
      case "posicion_abierta": return <PosicionAbierta modulo={modulo}/>;
      default: return <Dashboard {...p}/>;
    }
  };

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* SIDEBAR */}
      <div style={{width:215,background:"#1a1d27",borderRight:"1px solid #2a2d3e",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"18px 18px 14px",borderBottom:"1px solid #2a2d3e"}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:17,color:"#f5a623",letterSpacing:"-.02em"}}>GRANO<span style={{color:"#e8eaf0"}}>SYS</span></div>
          <div style={{fontSize:10,color:"#565d7a",marginTop:2,letterSpacing:".05em",textTransform:"uppercase"}}>Comercialización</div>
        </div>
        <div style={{padding:"10px 12px",borderBottom:"1px solid #2a2d3e"}}>
          <div style={{fontSize:10,color:"#565d7a",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Módulo</div>
          <div style={{display:"flex",background:"#0f1117",borderRadius:6,padding:3}}>
            {["FORMAL","INFORMAL"].map(m=>(
              <button key={m} onClick={()=>setModulo(m)} style={{flex:1,padding:"5px 0",fontSize:11,fontWeight:600,borderRadius:4,border:"none",cursor:"pointer",background:modulo===m?"#f5a623":"transparent",color:modulo===m?"#000":"#8890a8",transition:"all .2s"}}>
                {m}
              </button>
            ))}
          </div>
        </div>
        <nav style={{flex:1,padding:"8px 8px",overflowY:"auto"}}>
          {MENU.map(item=>(
            <button key={item.id} onClick={()=>setSec(item.id)} className={`nav-btn ${sec===item.id?"active":""}`}>
              <span style={{fontSize:14}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </nav>
        <div style={{padding:"10px 16px",borderTop:"1px solid #2a2d3e"}}>
          <div style={{fontSize:10,color:"#565d7a"}}>v1.0.0 — GranoSYS</div>
        </div>
      </div>
      {/* MAIN */}
      <div style={{flex:1,overflow:"auto",padding:22,background:"#0f1117"}}>
        {render()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
